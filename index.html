                              }
                            }
                          }

                          return (
                            <g key={n.id} transform={`translate(${n.x - 12}, ${n.y - 12})`} onPointerDown={(e) => handleNodePointerDown(e, n.id)} className={tool === 'select' ? "cursor-move" : "cursor-pointer"}>
                              <rect width="24" height="24" rx="4" fill={rectFill} stroke={rectStroke} strokeWidth={isSelected ? "2" : "1.5"} className="transition-colors duration-300" />
                              {n.type === 'fan' ? (
                                <>
                                  <Fan x="4" y="4" width="16" height="16" className={iconClass} />
                                  <text x="12" y="-4" textAnchor="middle" className={`text-[10px] font-bold print:block drop-shadow-md ${textFill}`}>{n.data.fanName}</text>
                                </>
                              ) : (
                                <>
                                  <Square x="4" y="4" width="16" height="16" className={iconClass} />
                                  <text x="12" y="34" textAnchor="middle" className={`text-[8px] font-bold print:block ${textFill}`}>{n.data.processName}</text>
                                </>
                              )}
                            </g>
                          );
                        })}
                      </svg>
                    </div>
                  </div>
                )}

                <div className="mb-8">
                  <div className="flex justify-between items-end border-l-4 border-blue-600 pl-2 mb-3 page-break-inside-avoid">
                    <h2 className="text-lg font-black">{useLayout ? '2.' : '1.'} 후드 배기 및 제어풍속 결과</h2>
                  </div>
                  {hoodsData.length === 0 ? (
                    <div className="p-8 border border-slate-200 rounded-lg text-center text-slate-400 text-sm print:hidden">등록된 후드가 없습니다.</div>
                  ) : (
                    <div className="overflow-x-auto print:overflow-visible">
                      <table className="w-full border-collapse border border-slate-300 text-[10px] lg:text-xs">
                        <thead>
                          <tr className="bg-slate-100 text-slate-700">
                            <th className="border border-slate-300 p-2 text-center w-6 sm:w-8">No</th>
                            <th className="border border-slate-300 p-2 text-center w-16 sm:w-24">연결 송풍기</th>
                            <th className="border border-slate-300 p-2 text-center w-12 sm:w-16">사진</th>
                            <th className="border border-slate-300 p-2 text-left">공정명 / 형식</th>
                            <th className="border border-slate-300 p-2 text-center w-16 sm:w-24">제어풍속 (m/s)<br/><span className="text-[8px] sm:text-[9px] text-slate-500">측정 / 법정</span></th>
                            <th className="border border-slate-300 p-2 text-center w-16 sm:w-24">배기량 (CMM)<br/><span className="text-[8px] sm:text-[9px] text-slate-500">현재 / 필요</span></th>
                            <th className="border border-slate-300 p-2 text-center w-10 sm:w-14">판정</th>
                          </tr>
                        </thead>
                        <tbody>
                          {(() => {
                            let globalIdx = 1;
                            const rows = [];
                            
                            const groupedHoods = {};
                            const unassignedHoods = [];

                            hoodsData.forEach(hood => {
                              const fName = hood.data.manualFanName && hood.data.manualFanName.trim() !== "" ? hood.data.manualFanName.trim() : null;
                              if (fName) {
                                if (!groupedHoods[fName]) groupedHoods[fName] = [];
                                groupedHoods[fName].push(hood);
                              } else {
                                unassignedHoods.push(hood);
                              }
                            });

                            Object.keys(groupedHoods).forEach(fanName => {
                              const hoodsInGroup = groupedHoods[fanName];
                              hoodsInGroup.forEach((hood, hIdx) => {
                                const { data, calc } = hood;
                                const typeLabel = data.hoodType === 'enclosure' ? '포위식' : data.hoodType === 'ext_up' ? '외부 상방' : data.hoodType === 'ext_side' ? '외부 측방' : '외부 하방';
                                const permitLabel = (data.hoodType === 'enclosure' && data.isPermitted) ? '(허가)' : '';
                                
                                rows.push(
                                  <tr key={hood.id} className={`${calc.isGood ? 'bg-white' : 'bg-red-50/30'} page-break-inside-avoid`}>
                                    <td className="border border-slate-300 p-1 sm:p-2 text-center font-bold text-slate-500">{globalIdx++}</td>
                                    
                                    {hIdx === 0 && (
                                      <td rowSpan={hoodsInGroup.length} className="border border-slate-300 p-1 sm:p-2 text-center align-middle font-black text-indigo-700 bg-indigo-50/30">
                                        {fanName}
                                      </td>
                                    )}

                                    <td className="border border-slate-300 p-1 text-center align-middle">
                                      {data.photo ? <img src={data.photo} alt="현장" className="w-10 h-6 sm:w-12 sm:h-8 object-cover mx-auto rounded shadow-sm print:w-16 print:h-10" /> : <span className="text-[8px] sm:text-[9px] text-slate-400">없음</span>}
                                    </td>
                                    <td className="border border-slate-300 p-1 sm:p-2">
                                      <div className="font-bold text-slate-800">{data.processName}</div>
                                      <div className="text-[9px] sm:text-[10px] text-slate-500 mt-0.5">
                                        {typeLabel} <span className="text-red-500">{permitLabel}</span>
                                        <div className="mt-1">{data.hoodType === 'enclosure' ? `개구 A=${calc.openingArea}㎡ | 측정부 A=${calc.area}㎡` : `측정부 A=${calc.area}㎡`}</div>
                                      </div>
                                    </td>
                                    <td className="border border-slate-300 p-1 sm:p-2 text-center">
                                      <div className="flex flex-col items-center"><span className={`font-bold ${calc.isVelocityGood ? 'text-blue-600' : 'text-red-600'}`}>{data.measuredControlVelocity || '0'}</span><hr className="w-6 sm:w-8 my-0.5 border-slate-300" /><span className="text-slate-500">{data.controlVelocity || '0'}</span></div>
                                    </td>
                                    <td className="border border-slate-300 p-1 sm:p-2 text-center">
                                      <div className="flex flex-col items-center"><span className={`font-bold ${calc.isVolumeGood ? 'text-blue-600' : 'text-red-600'}`}>{calc.currentQ}</span><hr className="w-8 sm:w-10 my-0.5 border-slate-300" /><span className="text-slate-500">{calc.requiredQ}</span></div>
                                    </td>
                                    <td className="border border-slate-300 p-1 sm:p-2 text-center font-black">
                                      {calc.isGood ? <span className="text-blue-600">양호</span> : <span className="text-red-600">불량</span>}
                                    </td>
                                  </tr>
                                );
                              });
                            });

                            unassignedHoods.forEach(hood => {
                              const { data, calc } = hood;
                              const typeLabel = data.hoodType === 'enclosure' ? '포위식' : data.hoodType === 'ext_up' ? '외부 상방' : data.hoodType === 'ext_side' ? '외부 측방' : '외부 하방';
                              const permitLabel = (data.hoodType === 'enclosure' && data.isPermitted) ? '(허가)' : '';
                              rows.push(
                                <tr key={hood.id} className={`${calc.isGood ? 'bg-white' : 'bg-red-50/30'} page-break-inside-avoid`}>
                                  <td className="border border-slate-300 p-1 sm:p-2 text-center font-bold text-slate-500">{globalIdx++}</td>
                                  <td className="border border-slate-300 p-1 sm:p-2 text-center align-middle font-bold text-slate-400 bg-slate-50/50">
                                    미연결
                                  </td>
                                  <td className="border border-slate-300 p-1 text-center align-middle">
                                    {data.photo ? <img src={data.photo} alt="현장" className="w-10 h-6 sm:w-12 sm:h-8 object-cover mx-auto rounded shadow-sm print:w-16 print:h-10" /> : <span className="text-[8px] sm:text-[9px] text-slate-400">없음</span>}
                                  </td>
                                  <td className="border border-slate-300 p-1 sm:p-2">
                                    <div className="font-bold text-slate-800">{data.processName}</div>
                                    <div className="text-[9px] sm:text-[10px] text-slate-500 mt-0.5">
                                      {typeLabel} <span className="text-red-500">{permitLabel}</span>
                                      <div className="mt-1">{data.hoodType === 'enclosure' ? `개구 A=${calc.openingArea}㎡ | 측정부 A=${calc.area}㎡` : `측정부 A=${calc.area}㎡`}</div>
                                    </div>
                                  </td>
                                  <td className="border border-slate-300 p-1 sm:p-2 text-center">
                                    <div className="flex flex-col items-center"><span className={`font-bold ${calc.isVelocityGood ? 'text-blue-600' : 'text-red-600'}`}>{data.measuredControlVelocity || '0'}</span><hr className="w-6 sm:w-8 my-0.5 border-slate-300" /><span className="text-slate-500">{data.controlVelocity || '0'}</span></div>
                                  </td>
                                  <td className="border border-slate-300 p-1 sm:p-2 text-center">
                                    <div className="flex flex-col items-center"><span className={`font-bold ${calc.isVolumeGood ? 'text-blue-600' : 'text-red-600'}`}>{calc.currentQ}</span><hr className="w-8 sm:w-10 my-0.5 border-slate-300" /><span className="text-slate-500">{calc.requiredQ}</span></div>
                                  </td>
                                  <td className="border border-slate-300 p-1 sm:p-2 text-center font-black">
                                    {calc.isGood ? <span className="text-blue-600">양호</span> : <span className="text-red-600">불량</span>}
                                  </td>
                                </tr>
                              );
                            });

                            return rows;
                          })()}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>

                {fansData.length > 0 && (
                  <div className="mb-8 page-break-inside-avoid">
                    <div className="flex justify-between items-end border-l-4 border-indigo-600 pl-2 mb-3">
                      <h2 className="text-lg font-black">{useLayout ? '3.' : '2.'} 송풍기 성능 및 시스템 밸런스 평가</h2>
                    </div>
                    <div className="overflow-x-auto print:overflow-visible">
                      <table className="w-full border-collapse border border-slate-300 text-[10px] lg:text-xs">
                        <thead>
                          <tr className="bg-indigo-50 text-indigo-900 border-b-2 border-indigo-200">
                            <th className="border border-slate-300 p-2 text-center w-8 sm:w-10">No</th>
                            <th className="border border-slate-300 p-2 text-left">송풍기 명칭</th>
                            <th className="border border-slate-300 p-2 text-center">정격 사양<br/><span className="text-[8px] sm:text-[9px] font-normal text-indigo-500">(풍량 CMM / 정압 mmAq)</span></th>
                            <th className="border border-slate-300 p-2 text-center">현장 측정<br/><span className="text-[8px] sm:text-[9px] font-normal text-indigo-500">(풍량 CMM / 정압 mmAq)</span></th>
                            <th className="border border-slate-300 p-2 text-center w-16 sm:w-24">후드 연결<br/><span className="text-[8px] sm:text-[9px] font-normal text-indigo-500">배기량 합계 / 흡입비</span></th>
                            <th className="border border-slate-300 p-2 text-center w-14 sm:w-20">송풍기 효율<br/><span className="text-[8px] sm:text-[9px] font-normal text-indigo-500">종합 판정</span></th>
                          </tr>
                        </thead>
                        <tbody>
                          {fansData.map((fan, idx) => {
                            const { data, calc } = fan;
                            return (
                              <tr key={fan.id} className={`${calc.status === '양호' ? 'bg-emerald-50/20' : calc.status === '미흡' ? 'bg-orange-50/20' : 'bg-red-50/20'} page-break-inside-avoid`}>
                                <td className="border border-slate-300 p-1 sm:p-2 text-center font-bold text-slate-500">{idx + 1}</td>
                                <td className="border border-slate-300 p-1 sm:p-2 font-black text-indigo-800">
                                  {data.fanName}
                                  <div className="text-[8px] sm:text-[9px] font-normal text-slate-500 mt-1">연결 후드: {calc.connectedHoods.length}개소</div>
                                </td>
                                <td className="border border-slate-300 p-1 sm:p-2 text-center font-bold text-slate-600">
                                  {data.ratedQ || '-'} / {data.ratedSP || '-'}
                                </td>
                                <td className="border border-slate-300 p-1 sm:p-2 text-center font-bold text-indigo-700">
                                  {data.measuredQ || '-'} / {data.measuredSP || '-'}
                                </td>
                                <td className="border border-slate-300 p-1 sm:p-2 text-center">
                                  <div className="font-bold text-slate-800">{calc.sumCurrentQ.toFixed(1)} CMM</div>
                                  <div className="text-[9px] sm:text-[10px] text-slate-500 mt-0.5">흡입비: {calc.suctionRatio.toFixed(1)}%</div>
                                </td>
                                <td className="border border-slate-300 p-1 sm:p-2 text-center">
                                  <div className={`font-black text-xs sm:text-sm ${calc.status === '양호' ? 'text-emerald-600' : calc.status === '미흡' ? 'text-orange-500' : 'text-red-600'}`}>
                                    {calc.eff > 0 ? `${calc.eff.toFixed(1)}%` : '-'}
                                  </div>
                                  <div className={`text-[9px] sm:text-[10px] inline-block font-bold mt-0.5 px-1.5 py-0.5 rounded ${calc.status === '양호' ? 'bg-emerald-100 text-emerald-700' : calc.status === '미흡' ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'}`}>
                                    {calc.status}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {(hoodsData.length > 0 || fansData.length > 0) && (
                  <div className="border-t-2 border-slate-800 pt-6 mt-6 page-break-inside-avoid">
                    <h2 className="text-lg font-black border-l-4 border-blue-600 pl-2 mb-4">
                      {useLayout ? (fansData.length > 0 ? '4.' : '3.') : (fansData.length > 0 ? '3.' : '2.')} 사업장 종합 평가
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 print:grid-cols-2 gap-6 bg-slate-50 border border-slate-200 rounded-xl p-4 sm:p-6">
                      
                      {hoodsData.length > 0 && (
                        <div className="flex items-center justify-center gap-6 page-break-inside-avoid">
                          <div className="relative w-24 h-24 sm:w-28 sm:h-28 transform -rotate-90">
                            <svg width="100%" height="100%" viewBox="0 0 36 36" className="drop-shadow-sm">
                              <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#fca5a5" strokeWidth="6" />
                              <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#3b82f6" strokeWidth="6" strokeDasharray={`${pieDashArray} ${100 - pieDashArray}`} strokeDashoffset="0" className="transition-all duration-1000 ease-out" />
                            </svg>
                            <div className="absolute inset-0 flex flex-col items-center justify-center transform rotate-90">
                              <span className="text-lg sm:text-xl font-black text-slate-700">{Math.round(pieDashArray)}%</span>
                              <span className="text-[8px] sm:text-[9px] font-bold text-slate-500">후드 적합률</span>
                            </div>
                          </div>
                          <div className="space-y-3">
                            <div className="flex items-center gap-2">
                              <div className="w-3 h-3 bg-blue-500 rounded-sm"></div>
                              <div>
                                <div className="text-xs font-bold text-slate-700">양호 후드</div>
                                <div className="text-base sm:text-lg font-black text-blue-600">{goodHoods} <span className="text-[9px] sm:text-[10px] font-normal text-slate-500">개소</span></div>
                              </div>
                            </div>
                            <div className="flex items-center gap-2">
                              <div className="w-3 h-3 bg-red-300 rounded-sm"></div>
                              <div>
                                <div className="text-xs font-bold text-slate-700">불량 후드</div>
                                <div className="text-base sm:text-lg font-black text-red-500">{badHoods} <span className="text-[9px] sm:text-[10px] font-normal text-slate-500">개소</span></div>
                              </div>
                            </div>
                          </div>
                        </div>
                      )}

                      {fansData.length > 0 && (
                        <div className={`flex items-center justify-center gap-4 page-break-inside-avoid ${hoodsData.length > 0 ? 'border-t md:border-t-0 print:border-t-0 md:border-l print:border-l border-slate-200 pt-6 md:pt-0 print:pt-0 pl-0 md:pl-4 print:pl-4' : ''}`}>
                          <div className="relative w-24 h-24 sm:w-28 sm:h-28 transform -rotate-90">
                            <svg width="100%" height="100%" viewBox="0 0 36 36" className="drop-shadow-sm">
                              <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#fca5a5" strokeWidth="6" />
                              <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#fb923c" strokeWidth="6" strokeDasharray={`${fanFairPct} ${100 - fanFairPct}`} strokeDashoffset={-fanGoodPct} className="transition-all duration-1000 ease-out" />
                              <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#10b981" strokeWidth="6" strokeDasharray={`${fanGoodPct} ${100 - fanGoodPct}`} strokeDashoffset="0" className="transition-all duration-1000 ease-out" />
                            </svg>
                            <div className="absolute inset-0 flex flex-col items-center justify-center transform rotate-90">
                              <span className="text-lg sm:text-xl font-black text-slate-700">{totalEvalFans > 0 ? Math.round(fanGoodPct) : 0}%</span>
                              <span className="text-[8px] sm:text-[9px] font-bold text-slate-500">송풍기 양호율</span>
                            </div>
                          </div>
                          <div className="space-y-1.5">
                            <div className="flex items-center gap-2">
                              <div className="w-3 h-3 bg-emerald-500 rounded-sm"></div>
                              <div>
                                <div className="text-[9px] sm:text-[10px] font-bold text-slate-700">양호 (80%↑)</div>
                                <div className="text-xs sm:text-sm font-black text-emerald-600">{goodFans} <span className="text-[8px] sm:text-[9px] font-normal text-slate-500">대</span></div>
                              </div>
                            </div>
                            <div className="flex items-center gap-2">
                              <div className="w-3 h-3 bg-orange-400 rounded-sm"></div>
                              <div>
                                <div className="text-[9px] sm:text-[10px] font-bold text-slate-700">미흡 (60~80%)</div>
                                <div className="text-xs sm:text-sm font-black text-orange-500">{fairFans} <span className="text-[8px] sm:text-[9px] font-normal text-slate-500">대</span></div>
                              </div>
                            </div>
                            <div className="flex items-center gap-2">
                              <div className="w-3 h-3 bg-red-400 rounded-sm"></div>
                              <div>
                                <div className="text-[9px] sm:text-[10px] font-bold text-slate-700">불량 (60%↓)</div>
                                <div className="text-xs sm:text-sm font-black text-red-500">{badFans} <span className="text-[8px] sm:text-[9px] font-normal text-slate-500">대</span></div>
                              </div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* 육안 및 기류 평가 (Step 2, 3) */}
                <div className="border-t-2 border-slate-800 pt-6 mt-6 page-break-inside-avoid">
                  <h2 className="text-lg font-black border-l-4 border-indigo-600 pl-2 mb-4">
                    {(() => {
                      let idx = useLayout ? 1 : 0;
                      idx++; // 후드 배기
                      if (fansData.length > 0) idx++; // 송풍기
                      if (hoodsData.length > 0 || fansData.length > 0) idx++; // 종합평가
                      return ++idx;
                    })()}. 육안평가 및 기류평가
                  </h2>
                  
                  {/* Step 2 육안평가 */}
                  <div className="mb-6 page-break-inside-avoid">
                    <div className="bg-[#7882c5] text-white font-bold p-1.5 px-3 text-sm rounded-t-sm">Step 2 육안평가</div>
                    <table className="w-full border-collapse border border-slate-300 text-[10px] sm:text-xs bg-white text-center">
                      <tbody>
                        {visualGroups.map((group, gIdx) => (
                          <React.Fragment key={`rep-g-${gIdx}`}>
                            {group.items.map((item, iIdx) => (
                              <tr key={`rep-${item.id}`} className="border-b border-slate-300">
                                {iIdx === 0 && (
                                  <th rowSpan={group.items.length} className="border-r border-slate-300 bg-slate-50 p-2 w-[15%] text-slate-800 font-bold whitespace-pre-line">
                                    {group.name}
                                  </th>
                                )}
                                <th className="border-r border-slate-300 bg-slate-50 p-2 w-[15%] text-slate-800 font-bold whitespace-pre-line">
                                  {item.name}
                                </th>
                                <td className="border-r border-slate-300 p-2 w-[25%] font-black align-middle">
                                  <div className="flex gap-4 justify-center">
                                    <span className={evaluationData.visual[item.id] === '양호' ? 'text-slate-900' : 'text-slate-300'}>
                                      {evaluationData.visual[item.id] === '양호' ? '☑ 양호' : '☐ 양호'}
                                    </span>
                                    <span className={evaluationData.visual[item.id] === '미흡' ? 'text-slate-900' : 'text-slate-300'}>
                                      {evaluationData.visual[item.id] === '미흡' ? '☑ 미흡' : '☐ 미흡'}
                                    </span>
                                  </div>
                                </td>
                                <td className="p-2 text-left text-slate-700 w-[45%] break-keep font-medium">
                                  {item.desc}
                                </td>
                              </tr>
                            ))}
                          </React.Fragment>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  {/* Step 3 기류평가 */}
                  <div className="page-break-inside-avoid">
                    <div className="bg-[#7882c5] text-white font-bold p-1.5 px-3 text-sm rounded-t-sm">Step 3 기류평가</div>
                    <table className="w-full border-collapse border border-slate-300 text-[10px] sm:text-xs bg-white">
                      <tbody>
                        <tr>
                          <th rowSpan={3} className="border-r border-b border-slate-300 bg-slate-50 p-2 w-[25%] text-center text-slate-800 font-bold whitespace-pre-line">
                            기류평가<br/>(연기발생기)
                          </th>
                          <td rowSpan={3} className="border-r border-b border-slate-300 p-2 w-[25%] font-black align-middle text-center">
                            <div className="flex gap-4 justify-center">
                              <span className={evaluationData.airflow.status === '양호' ? 'text-slate-900' : 'text-slate-300'}>
                                {evaluationData.airflow.status === '양호' ? '☑ 양호' : '☐ 양호'}
                              </span>
                              <span className={evaluationData.airflow.status === '미흡' ? 'text-slate-900' : 'text-slate-300'}>
                                {evaluationData.airflow.status === '미흡' ? '☑ 미흡' : '☐ 미흡'}
                              </span>
                            </div>
                          </td>
                          <td className="border-b border-slate-300 p-0 w-[50%]">
                            <table className="w-full border-collapse h-full">
                              <tbody>
                                <tr>
                                  <th className="bg-slate-50 border-b border-slate-300 p-1.5 font-bold text-slate-800 text-center">부적정 후드 위치</th>
                                </tr>
                                <tr>
                                  <td className="p-2 border-b border-slate-300 h-8 font-black text-red-600 text-center">
                                    {evaluationData.airflow.badLocation || '\u00A0'}
                                  </td>
                                </tr>
                              </tbody>
                            </table>
                          </td>
                        </tr>
                        <tr>
                          <td className="border-b border-slate-300 p-1.5 px-3">
                            <div className="flex justify-between items-center w-full">
                              <span className="text-slate-800 font-medium break-keep"><b className="font-black text-slate-900">• 흡인 속도:</b> 연기가 후드로 흡인되는 속도가 매우 빠르거나 빠름</span>
                              <span className={`font-bold text-sm sm:text-base ml-2 ${evaluationData.airflow.speedChecked ? 'text-slate-900' : 'text-slate-300'}`}>
                                {evaluationData.airflow.speedChecked ? '☑' : '☐'}
                              </span>
                            </div>
                          </td>
                        </tr>
                        <tr>
                          <td className="p-1.5 px-3">
                            <div className="flex justify-between items-center w-full">
                              <span className="text-slate-800 font-medium break-keep"><b className="font-black text-slate-900">• 흡인 상태:</b> 연기가 퍼져나가거나 확산되지 않고 후드로 모두 흡인</span>
                              <span className={`font-bold text-sm sm:text-base ml-2 ${evaluationData.airflow.statusChecked ? 'text-slate-900' : 'text-slate-300'}`}>
                                {evaluationData.airflow.statusChecked ? '☑' : '☐'}
                              </span>
                            </div>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* 점검자 종합 의견 출력란 */}
                <div className="border-t-2 border-slate-800 pt-6 mt-6 page-break-inside-avoid">
                  <h2 className="text-lg font-black border-l-4 border-slate-700 pl-2 mb-4">
                    {(() => {
                      let idx = useLayout ? 1 : 0;
                      idx++; // 후드 배기
                      if (fansData.length > 0) idx++; // 송풍기
                      if (hoodsData.length > 0 || fansData.length > 0) idx++; // 종합평가
                      idx++; // 육안 및 기류평가
                      return ++idx;
                    })()}. 점검자 종합 의견 (총평)
                  </h2>
                  <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 sm:p-6 min-h-[100px] whitespace-pre-wrap text-sm leading-relaxed text-slate-800">
                    {overallReview || <span className="text-slate-400">입력된 종합 의견이 없습니다.</span>}
                    {overallReviewImage && (
                      <div className="mt-4 pt-4 border-t border-slate-200 print:border-t-2 print:border-slate-300 page-break-inside-avoid">
                        <span className="text-xs font-bold text-slate-500 mb-2 block">▶ 첨부 자료 (현장 스케치 및 수기 기록)</span>
                        <img src={overallReviewImage} alt="종합 의견 첨부 자료" className="max-w-full h-auto rounded border border-slate-300 shadow-sm mx-auto object-contain max-h-[600px]" />
                      </div>
                    )}
                  </div>
                  
                  {/* 안내 문구 추가 */}
                  <div className="mt-4 p-3 bg-red-50 border border-red-200 rounded text-xs font-bold text-red-600 flex items-start gap-2 page-break-inside-avoid">
                    <span className="text-red-500 mt-0.5">※</span>
                    <span>해당 문제점 및 필요배기량의 경우 현재 기준으로 작성되었으며, 개선시에는 정밀진단 후 개선 필요</span>
                  </div>
                </div>

                {/* 5. 선택된 KOSHA 가이드라인 첨부 출력란 */}
                {selectedGuides.length > 0 && (
                  <div className="border-t-2 border-slate-800 pt-6 mt-6 page-break-inside-avoid">
                    <h2 className="text-lg font-black border-l-4 border-emerald-600 pl-2 mb-4">
                      [첨부자료] KOSHA 작업종류별 환기 표준 가이드
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 print:grid-cols-2 gap-4">
                      {selectedGuides.map(guideId => {
                        const guide = KOSHA_GUIDES.find(g => g.id === guideId);
                        if(!guide) return null;
                        return (
                          <div key={guide.id} className="border border-slate-300 p-4 rounded-lg bg-slate-50 shadow-sm page-break-inside-avoid">
                            <h3 className="font-bold text-slate-800 mb-2 flex items-center gap-2">
                              <CheckCircle2 className="w-4 h-4 text-emerald-600" /> {guide.title}
                            </h3>
                            <p className="text-xs text-slate-600 leading-relaxed">{guide.desc}</p>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

              </div>
            </div>

          </div>
        </div>
      );
    }

    // React 18 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
