                                                    <tr>
                                                        <th className="bg-slate-100 border border-slate-300 p-4 text-center font-bold text-slate-700">업종</th>
                                                        <td className="border border-slate-300 p-4 font-black text-slate-900 text-center text-lg bg-white">{industryType || "미입력"}</td>
                                                        <th className="bg-slate-100 border border-slate-300 p-4 text-center font-bold text-slate-700">소재지</th>
                                                        <td className="border border-slate-300 p-4 font-black text-slate-900 text-center text-lg bg-white">{address || "미입력"}</td>
                                                    </tr>
                                                    <tr>
                                                        <th className="bg-slate-100 border border-slate-300 p-4 text-center font-bold text-slate-700">측정일자</th>
                                                        <td colSpan="3" className="border border-slate-300 p-4 font-black text-slate-900 text-center text-lg bg-white">
                                                            {measurementDate ? `${measurementDate} (${measurementDuration}일간)` : "미입력"}
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>

                                        <div className="mt-auto flex justify-end page-break-inside-avoid w-full">
                                            <table className="border-collapse border-[2px] border-slate-800 text-[10px] w-[220px]">
                                                <tbody>
                                                    <tr>
                                                        <th rowSpan="2" className="bg-slate-100 border border-slate-800 p-1 w-6 text-center font-black text-slate-800 align-middle">결<br/>재</th>
                                                        <th className="bg-slate-100 border border-slate-800 p-1 text-center font-bold text-slate-800 w-[30%]">평가자</th>
                                                        <th className="bg-slate-100 border border-slate-800 p-1 text-center font-bold text-slate-800 w-[30%]">보건관리자</th>
                                                        <th className="bg-slate-100 border border-slate-800 p-1 text-center font-bold text-slate-800 w-[30%]">근로자대표</th>
                                                    </tr>
                                                    <tr>
                                                        <td className="border border-slate-800 h-[50px] text-center bg-white relative cursor-pointer hover:bg-blue-50/50 transition-colors" onClick={() => setSignModal({isOpen: true, role: 'evaluator'})}>
                                                            {signatures.evaluator ? <img src={signatures.evaluator} className="w-full h-full object-contain absolute inset-0 p-0.5" alt="평가자 서명" /> : <span className="text-slate-300 font-bold text-[9px] print-hide">클릭 서명</span>}
                                                        </td>
                                                        <td className="border border-slate-800 h-[50px] text-center bg-white relative cursor-pointer hover:bg-blue-50/50 transition-colors" onClick={() => setSignModal({isOpen: true, role: 'manager'})}>
                                                            {signatures.manager ? <img src={signatures.manager} className="w-full h-full object-contain absolute inset-0 p-0.5" alt="보건관리자 서명" /> : <span className="text-slate-300 font-bold text-[9px] print-hide">클릭 서명</span>}
                                                        </td>
                                                        <td className="border border-slate-800 h-[50px] text-center bg-white relative cursor-pointer hover:bg-blue-50/50 transition-colors" onClick={() => setSignModal({isOpen: true, role: 'worker'})}>
                                                            {signatures.worker ? <img src={signatures.worker} className="w-full h-full object-contain absolute inset-0 p-0.5" alt="근로자 대표 서명" /> : <span className="text-slate-300 font-bold text-[9px] print-hide">클릭 서명</span>}
                                                        </td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    
                                    {/* 보고서 본문 시작 */}

                                    {/* 1. 공정 Lay-out */}
                                    {useLayout && (
                                        <div className="mb-10 print:mb-8 print:pt-4 page-break-inside-avoid">
                                            <h2 className="text-base font-black border-l-[3px] border-[#3b82f6] pl-2.5 mb-3 text-slate-800">
                                                {sIdx.layout}. 공정 Lay-out
                                            </h2>
                                            <div className={`w-full h-[350px] sm:h-[400px] print:h-[400px] bg-slate-50 border ${tool === 'select' ? 'border-slate-200' : 'border-[#3b82f6] border-dashed bg-blue-50/20'} rounded-xl relative overflow-hidden pdf-layout-container`}>
                                                <svg ref={svgRef} className={`touch-none w-full h-full ${tool !== 'select' ? 'cursor-crosshair' : 'cursor-default'}`}
                                                    onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}
                                                    style={{ touchAction: 'none' }}>
                                                    <defs>
                                                        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                                                            <circle cx="10" cy="10" r="1.5" fill="#e2e8f0" className="print:hidden"/>
                                                        </pattern>
                                                    </defs>
                                                    <rect width="100%" height="100%" fill="url(#grid)" className="print:hidden" data-html2canvas-ignore="true" />
                                                    
                                                    {edges.map(e => {
                                                        const fromNode = nodes.find(n => n.id === e.from), toNode = nodes.find(n => n.id === e.to);
                                                        if(!fromNode || !toNode) return null;
                                                        const isSelected = selectedEdgeId === e.id;
                                                        return (
                                                            <g key={e.id}>
                                                                <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke="transparent" strokeWidth="20" className={tool === 'select' ? "cursor-move print:hidden" : "pointer-events-none"} data-html2canvas-ignore="true" onPointerDown={(ev) => handleEdgePointerDown(ev, e.id)} />
                                                                <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke={isSelected ? "#3b82f6" : "#64748b"} strokeWidth="4" strokeLinecap="round" className="pointer-events-none" />
                                                            </g>
                                                        );
                                                    })}
                                                    {drawingEdge && (
                                                        <g className="pointer-events-none" data-html2canvas-ignore="true">
                                                            {drawingEdge.cornerX !== null ? (
                                                                <>
                                                                    <line x1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.x} y1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.y} x2={drawingEdge.cornerX} y2={drawingEdge.cornerY} stroke="#3b82f6" strokeWidth="4" strokeDasharray="5,5" />
                                                                    <line x1={drawingEdge.cornerX} y1={drawingEdge.cornerY} x2={drawingEdge.x} y2={drawingEdge.y} stroke="#3b82f6" strokeWidth="4" strokeDasharray="5,5" />
                                                                </>
                                                            ) : <line x1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.x} y1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.y} x2={drawingEdge.x} y2={drawingEdge.y} stroke="#3b82f6" strokeWidth="4" strokeDasharray="5,5" />}
                                                            {drawingEdge.snapTarget?.type === 'edge' && <circle cx={drawingEdge.x} cy={drawingEdge.y} r="6" fill="#ef4444" />}
                                                            {drawingEdge.snapTarget?.type === 'node' && <circle cx={drawingEdge.x} cy={drawingEdge.y} r="14" fill="none" stroke="#ef4444" strokeWidth="2" />}
                                                        </g>
                                                    )}
                                                    {nodes.map(n => {
                                                        const isSelected = n.id === selectedNodeId;
                                                        if (n.type === 'joint') return <circle key={n.id} cx={n.x} cy={n.y} r="10" fill="transparent" data-html2canvas-ignore="true" onPointerDown={(e) => handleNodePointerDown(e, n.id)} className={tool === 'select' ? "cursor-move hover:fill-[#3b82f6]/20 print:hidden" : "cursor-pointer print:hidden"} />;
                                                        
                                                        let rectFill = n.type === 'fan' ? '#e0e7ff' : (isSelected ? '#eff6ff' : '#ffffff');
                                                        let rectStroke = isSelected ? '#3b82f6' : (n.type === 'fan' ? '#4f46e5' : '#94a3b8');
                                                        let iconClass = n.type === 'fan' ? "text-indigo-600" : "text-[#3b82f6]";
                                                        let textFill = n.type === 'fan' ? "fill-indigo-900" : "fill-slate-800";

                                                        if (n.type === 'hood') {
                                                            const hData = hoodsData.find(h => h.id === n.id);
                                                            if (hData && hData.calc) {
                                                                if (hData.calc.isGood) {
                                                                    rectFill = isSelected ? '#d1fae5' : '#ecfdf5'; 
                                                                    rectStroke = isSelected ? '#059669' : '#34d399';
                                                                    iconClass = "text-emerald-600"; textFill = "fill-emerald-900";
                                                                } else {
                                                                    rectFill = isSelected ? '#fee2e2' : '#fef2f2'; 
                                                                    rectStroke = isSelected ? '#dc2626' : '#f87171';
                                                                    iconClass = "text-red-500"; textFill = "fill-red-900";
                                                                }
                                                            }
                                                        } else if (n.type === 'hazard') {
                                                            rectFill = isSelected ? '#ffedd5' : '#fff7ed';
                                                            rectStroke = isSelected ? '#ea580c' : '#f97316';
                                                            iconClass = "text-orange-500"; textFill = "fill-orange-900";
                                                        }

                                                        return (
                                                            <g key={n.id} transform={`translate(${n.x - 12}, ${n.y - 12})`} onPointerDown={(e) => handleNodePointerDown(e, n.id)} className={tool === 'select' ? "cursor-move" : "cursor-pointer"}>
                                                                <rect width="24" height="24" rx="6" fill={rectFill} stroke={rectStroke} strokeWidth={isSelected ? "2.5" : "1.5"} className="transition-colors duration-200 shadow-sm" />
                                                                {n.type === 'fan' ? (
                                                                    <>
                                                                        <Fan x="4" y="4" width="16" height="16" className={iconClass} />
                                                                        <text x="12" y="-6" textAnchor="middle" className={`text-[10px] font-bold print:block drop-shadow-sm ${textFill}`}>{n.data.fanName}</text>
                                                                    </>
                                                                ) : n.type === 'hazard' ? (
                                                                    <>
                                                                        <AlertTriangle x="4" y="4" width="16" height="16" className={iconClass} />
                                                                        <text x="12" y="-6" textAnchor="middle" className={`text-[10px] font-bold print:block drop-shadow-sm ${textFill}`}>{n.data.hazardName || '유해인자'}</text>
                                                                        <text x="12" y="36" textAnchor="middle" className={`text-[9px] font-bold print:block ${textFill}`}>{n.data.processName || '공정명'}</text>
                                                                    </>
                                                                ) : (
                                                                    <>
                                                                        <Square x="4" y="4" width="16" height="16" className={iconClass} />
                                                                        <text x="12" y="36" textAnchor="middle" className={`text-[9px] font-bold print:block ${textFill}`}>{n.data.processName}</text>
                                                                    </>
                                                                )}
                                                            </g>
                                                        );
                                                    })}
                                                </svg>
                                            </div>
                                        </div>
                                    )}

                                    {/* 2. 후드 배기 결과 */}
                                    <div className="mb-10">
                                        <div className="flex justify-between items-end border-l-[3px] border-[#3b82f6] pl-2.5 mb-3 page-break-inside-avoid">
                                            <h2 className="text-base font-black text-slate-800">{sIdx.hood}. 후드 배기 및 제어풍속 결과</h2>
                                        </div>
                                        {hoodsData.length === 0 ? (
                                            <div className="p-8 border border-slate-200 bg-slate-50 rounded-xl text-center text-slate-400 text-sm font-medium print:hidden">등록된 후드가 없습니다.</div>
                                        ) : (
                                            <div className="overflow-x-auto print:overflow-visible rounded-xl border border-slate-200">
                                                <table className="w-full border-collapse text-[10px] lg:text-xs">
                                                    <thead>
                                                        <tr className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                                            <th className="p-2.5 text-center w-8">No</th>
                                                            <th className="p-2.5 text-center w-20 sm:w-24 border-l border-slate-200">연결 송풍기</th>
                                                            <th className="p-2.5 text-center w-14 sm:w-16 border-l border-slate-200">사진</th>
                                                            <th className="p-2.5 text-left border-l border-slate-200">공정명 / 형식</th>
                                                            <th className="p-2.5 text-center w-20 sm:w-24 border-l border-slate-200">제어풍속 <span className="font-normal">(m/s)</span><br/><span className="text-[9px] text-slate-400 font-medium">측정 / 법정</span></th>
                                                            <th className="p-2.5 text-center w-20 sm:w-24 border-l border-slate-200">배기량 <span className="font-normal">(CMM)</span><br/><span className="text-[9px] text-slate-400 font-medium">현재 / 필요</span></th>
                                                            <th className="p-2.5 text-center w-12 sm:w-14 border-l border-slate-200">판정</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {(() => {
                                                            let globalIdx = 1;
                                                            const rows = [];
                                                            const groupedHoods = {};
                                                            const unassignedHoods = [];

                                                            hoodsData.forEach(hood => {
                                                                const fName = hood.data.manualFanName && hood.data.manualFanName.trim() !== "" ? hood.data.manualFanName.trim() : null;
                                                                if (fName) {
                                                                    if (!groupedHoods[fName]) groupedHoods[fName] = [];
                                                                    groupedHoods[fName].push(hood);
                                                                } else {
                                                                    unassignedHoods.push(hood);
                                                                }
                                                            });

                                                            Object.keys(groupedHoods).forEach(fanName => {
                                                                const hoodsInGroup = groupedHoods[fanName];
                                                                hoodsInGroup.forEach((hood, hIdx) => {
                                                                    const { data, calc } = hood;
                                                                    const typeLabel = data.hoodType === 'enclosure' ? '포위식' : data.hoodType === 'ext_up' ? '외부 상방' : data.hoodType === 'ext_side' ? '외부 측방' : '외부 하방';
                                                                    const permitLabel = (data.hoodType === 'enclosure' && data.isPermitted) ? '(허가)' : '';
                                                                    
                                                                    rows.push(
                                                                        <tr key={hood.id} className={`${calc.isGood ? 'bg-white' : 'bg-red-50/30'} border-b border-slate-100 last:border-b-0 page-break-inside-avoid`}>
                                                                            <td className="p-2 text-center font-bold text-slate-500">{globalIdx++}</td>
                                                                            {hIdx === 0 && (
                                                                                <td rowSpan={hoodsInGroup.length} className="border-l border-slate-100 p-2 text-center align-middle font-black text-indigo-700 bg-indigo-50/40">
                                                                                    {fanName}
                                                                                </td>
                                                                            )}
                                                                            <td className="border-l border-slate-100 p-2 text-center align-middle">
                                                                                {data.photo ? <img src={data.photo} alt="현장" className="w-12 h-8 object-cover mx-auto rounded shadow-sm print:w-16 print:h-10 border border-slate-200" /> : <span className="text-[9px] font-medium text-slate-400">없음</span>}
                                                                            </td>
                                                                            <td className="border-l border-slate-100 p-2.5">
                                                                                <div className="font-bold text-slate-800">{data.processName}</div>
                                                                                <div className="text-[10px] text-slate-500 mt-1 font-medium">
                                                                                    {typeLabel} <span className="text-red-500 font-bold">{permitLabel}</span>
                                                                                    <div className="mt-0.5 text-slate-400">{data.hoodType === 'enclosure' ? `개구 A=${calc.openingArea}㎡ | 측정 A=${calc.area}㎡` : `측정 A=${calc.area}㎡`}</div>
                                                                                </div>
                                                                            </td>
                                                                            <td className="border-l border-slate-100 p-2 text-center">
                                                                                <div className="flex flex-col items-center justify-center h-full">
                                                                                    <span className={`font-black ${calc.isVelocityGood ? 'text-[#3b82f6]' : 'text-red-500'}`}>{data.measuredControlVelocity || '0'}</span>
                                                                                    <div className="w-8 h-[1px] bg-slate-200 my-1"></div>
                                                                                    <span className="text-slate-500 font-bold">{data.controlVelocity || '0'}</span>
                                                                                </div>
                                                                            </td>
                                                                            <td className="border-l border-slate-100 p-2 text-center">
                                                                                <div className="flex flex-col items-center justify-center h-full">
                                                                                    <span className={`font-black ${calc.isVolumeGood ? 'text-[#3b82f6]' : 'text-red-500'}`}>{calc.currentQ}</span>
                                                                                    <div className="w-10 h-[1px] bg-slate-200 my-1"></div>
                                                                                    <span className="text-slate-500 font-bold">{calc.requiredQ}</span>
                                                                                </div>
                                                                            </td>
                                                                            <td className="border-l border-slate-100 p-2 text-center align-middle">
                                                                                <span className={`inline-block px-2 py-1 rounded-md text-[10px] font-black ${calc.isGood ? 'bg-blue-50 text-[#3b82f6]' : 'bg-red-50 text-red-500'}`}>
                                                                                    {calc.isGood ? '양호' : '불량'}
                                                                                </span>
                                                                            </td>
                                                                        </tr>
                                                                    );
                                                                });
                                                            });

                                                            unassignedHoods.forEach(hood => {
                                                                const { data, calc } = hood;
                                                                const typeLabel = data.hoodType === 'enclosure' ? '포위식' : data.hoodType === 'ext_up' ? '외부 상방' : data.hoodType === 'ext_side' ? '외부 측방' : '외부 하방';
                                                                const permitLabel = (data.hoodType === 'enclosure' && data.isPermitted) ? '(허가)' : '';
                                                                rows.push(
                                                                    <tr key={hood.id} className={`${calc.isGood ? 'bg-white' : 'bg-red-50/30'} border-b border-slate-100 last:border-b-0 page-break-inside-avoid`}>
                                                                        <td className="p-2 text-center font-bold text-slate-500">{globalIdx++}</td>
                                                                        <td className="border-l border-slate-100 p-2 text-center align-middle font-bold text-slate-400 bg-slate-50/50">미연결</td>
                                                                        <td className="border-l border-slate-100 p-2 text-center align-middle">
                                                                            {data.photo ? <img src={data.photo} alt="현장" className="w-12 h-8 object-cover mx-auto rounded shadow-sm print:w-16 print:h-10 border border-slate-200" /> : <span className="text-[9px] font-medium text-slate-400">없음</span>}
                                                                        </td>
                                                                        <td className="border-l border-slate-100 p-2.5">
                                                                            <div className="font-bold text-slate-800">{data.processName}</div>
                                                                            <div className="text-[10px] text-slate-500 mt-1 font-medium">
                                                                                {typeLabel} <span className="text-red-500 font-bold">{permitLabel}</span>
                                                                                <div className="mt-0.5 text-slate-400">{data.hoodType === 'enclosure' ? `개구 A=${calc.openingArea}㎡ | 측정 A=${calc.area}㎡` : `측정 A=${calc.area}㎡`}</div>
                                                                            </div>
                                                                        </td>
                                                                        <td className="border-l border-slate-100 p-2 text-center">
                                                                            <div className="flex flex-col items-center justify-center h-full">
                                                                                <span className={`font-black ${calc.isVelocityGood ? 'text-[#3b82f6]' : 'text-red-500'}`}>{data.measuredControlVelocity || '0'}</span>
                                                                                <div className="w-8 h-[1px] bg-slate-200 my-1"></div>
                                                                                <span className="text-slate-500 font-bold">{data.controlVelocity || '0'}</span>
                                                                            </div>
                                                                        </td>
                                                                        <td className="border-l border-slate-100 p-2 text-center">
                                                                            <div className="flex flex-col items-center justify-center h-full">
                                                                                <span className={`font-black ${calc.isVolumeGood ? 'text-[#3b82f6]' : 'text-red-500'}`}>{calc.currentQ}</span>
                                                                                <div className="w-10 h-[1px] bg-slate-200 my-1"></div>
                                                                                <span className="text-slate-500 font-bold">{calc.requiredQ}</span>
                                                                            </div>
                                                                        </td>
                                                                        <td className="border-l border-slate-100 p-2 text-center align-middle">
                                                                            <span className={`inline-block px-2 py-1 rounded-md text-[10px] font-black ${calc.isGood ? 'bg-blue-50 text-[#3b82f6]' : 'bg-red-50 text-red-500'}`}>
                                                                                {calc.isGood ? '양호' : '불량'}
                                                                            </span>
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            });

                                                            return rows;
                                                        })()}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>

                                    {/* 3. 송풍기 결과 */}
                                    {fansData.length > 0 && (
                                        <div className="mb-10 page-break-inside-avoid">
                                            <div className="flex justify-between items-end border-l-[3px] border-indigo-500 pl-2.5 mb-3">
                                                <h2 className="text-base font-black text-slate-800">{sIdx.fan}. 송풍기 성능 및 시스템 밸런스 평가</h2>
                                            </div>
                                            <div className="overflow-x-auto print:overflow-visible rounded-xl border border-slate-200">
                                                <table className="w-full border-collapse text-[10px] lg:text-xs">
                                                    <thead>
                                                        <tr className="bg-indigo-50 text-indigo-800 border-b border-indigo-100">
                                                            <th className="p-2.5 text-center w-8">No</th>
                                                            <th className="p-2.5 text-left border-l border-indigo-100/50">송풍기 명칭</th>
                                                            <th className="p-2.5 text-center border-l border-indigo-100/50">배기량 <span className="font-normal">(CMM)</span><br/><span className="text-[9px] font-medium text-indigo-500/80">측정 / 정격</span></th>
                                                            <th className="p-2.5 text-center border-l border-indigo-100/50">정압 <span className="font-normal">(mmAq)</span><br/><span className="text-[9px] font-medium text-indigo-500/80">측정 / 정격</span></th>
                                                            <th className="p-2.5 text-center w-24 border-l border-indigo-100/50">후드 연결<br/><span className="text-[9px] font-medium text-indigo-500/80">배기량 합계 / 흡입비</span></th>
                                                            <th className="p-2.5 text-center w-20 border-l border-indigo-100/50">송풍기 효율<br/><span className="text-[9px] font-medium text-indigo-500/80">종합 판정</span></th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {fansData.map((fan, idx) => {
                                                            const { data, calc } = fan;
                                                            return (
                                                                <tr key={fan.id} className={`${calc.status === '양호' ? 'bg-white' : calc.status === '미흡' ? 'bg-orange-50/20' : 'bg-red-50/20'} border-b border-slate-100 last:border-b-0 page-break-inside-avoid`}>
                                                                    <td className="p-2.5 text-center font-bold text-slate-500">{idx + 1}</td>
                                                                    <td className="p-2.5 border-l border-slate-100 font-black text-indigo-700">
                                                                        {data.fanName}
                                                                        <div className="text-[9px] font-medium text-slate-400 mt-1">연결 후드: {calc.connectedHoods.length}개소</div>
                                                                        {data.hasPurifier && (
                                                                            <div className="text-[9px] font-bold mt-1.5 text-emerald-600 bg-emerald-50 p-1.5 rounded-lg border border-emerald-100 leading-tight">
                                                                                + {PURIFIER_TYPES.find(p=>p.id===data.purifierType)?.name.split(' ')[0]}<br/>
                                                                                (차압: {data.purifierDiffPress || '-'} mmH2O) <span className={calc.purifierStatus.includes('미흡') ? 'text-red-500' : 'text-emerald-700'}>[{calc.purifierStatus}]</span>
                                                                            </div>
                                                                        )}
                                                                    </td>
                                                                    <td className="p-2.5 border-l border-slate-100 text-center">
                                                                        <span className="font-black text-indigo-600">{data.measuredQ || '-'}</span> <span className="text-slate-300 font-bold mx-1">/</span> <span className="font-bold text-slate-500">{data.ratedQ || '-'}</span>
                                                                    </td>
                                                                    <td className="p-2.5 border-l border-slate-100 text-center">
                                                                        <span className="font-black text-indigo-600">{data.measuredSP || '-'}</span> <span className="text-slate-300 font-bold mx-1">/</span> <span className="font-bold text-slate-500">{data.ratedSP || '-'}</span>
                                                                    </td>
                                                                    <td className="p-2.5 border-l border-slate-100 text-center">
                                                                        <div className="font-black text-slate-700">{calc.sumCurrentQ.toFixed(1)} CMM</div>
                                                                        <div className="text-[10px] text-slate-500 mt-0.5 font-medium">흡입비: {calc.suctionRatio.toFixed(1)}%</div>
                                                                    </td>
                                                                    <td className="p-2.5 border-l border-slate-100 text-center align-middle">
                                                                        <div className={`font-black text-sm ${calc.status === '양호' ? 'text-emerald-500' : calc.status === '미흡' ? 'text-orange-500' : 'text-red-500'}`}>
                                                                            {calc.eff > 0 ? `${calc.eff.toFixed(1)}%` : '-'}
                                                                        </div>
                                                                        <div className={`text-[10px] inline-block font-black mt-1 px-2 py-0.5 rounded-md ${calc.status === '양호' ? 'bg-emerald-50 text-emerald-600' : calc.status === '미흡' ? 'bg-orange-50 text-orange-600' : 'bg-red-50 text-red-600'}`}>
                                                                            {calc.status}
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                    {/* 4. 종합 평가 요약 */}
                                    {(hoodsData.length > 0 || fansData.length > 0) && (
                                        <div className="mb-10 page-break-inside-avoid">
                                            <h2 className="text-base font-black border-l-[3px] border-[#3b82f6] pl-2.5 mb-4 text-slate-800">
                                                {sIdx.overall}. 종합 평가 요약
                                            </h2>
                                            <div className="flex flex-col md:flex-row print:flex-row gap-4">
                                                
                                                {hoodsData.length > 0 && (
                                                    <div className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-5 flex items-center justify-center gap-6 page-break-inside-avoid shadow-sm">
                                                        <div className="relative w-24 h-24 sm:w-28 sm:h-28 transform -rotate-90">
                                                            <svg width="100%" height="100%" viewBox="0 0 36 36" className="drop-shadow-sm">
                                                                <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#e2e8f0" strokeWidth="4" />
                                                                <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#3b82f6" strokeWidth="4.5" strokeDasharray={`${pieDashArray} ${100 - pieDashArray}`} strokeDashoffset="0" className="transition-all duration-1000 ease-out" strokeLinecap="round" />
                                                            </svg>
                                                            <div className="absolute inset-0 flex flex-col items-center justify-center transform rotate-90">
                                                                <span className="text-xl sm:text-2xl font-black text-slate-800">{Math.round(pieDashArray)}%</span>
                                                                <span className="text-[9px] sm:text-[10px] font-bold text-slate-500">후드 적합률</span>
                                                            </div>
                                                        </div>
                                                        <div className="space-y-3">
                                                            <div className="flex items-center gap-2.5">
                                                                <div className="w-2 h-8 bg-[#3b82f6] rounded-full"></div>
                                                                <div>
                                                                    <div className="text-[11px] font-bold text-slate-500">양호 후드</div>
                                                                    <div className="text-lg font-black text-slate-800">{goodHoods} <span className="text-[10px] font-bold text-slate-400">개소</span></div>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-2.5">
                                                                <div className="w-2 h-8 bg-slate-300 rounded-full"></div>
                                                                <div>
                                                                    <div className="text-[11px] font-bold text-slate-500">불량 후드</div>
                                                                    <div className="text-lg font-black text-slate-800">{badHoods} <span className="text-[10px] font-bold text-slate-400">개소</span></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}

                                                {fansData.length > 0 && (
                                                    <div className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-5 flex items-center justify-center gap-4 page-break-inside-avoid shadow-sm">
                                                        <div className="relative w-24 h-24 sm:w-28 sm:h-28 transform -rotate-90">
                                                            <svg width="100%" height="100%" viewBox="0 0 36 36" className="drop-shadow-sm">
                                                                <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#e2e8f0" strokeWidth="4" />
                                                                <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#fb923c" strokeWidth="4.5" strokeDasharray={`${fanFairPct} ${100 - fanFairPct}`} strokeDashoffset={-fanGoodPct} className="transition-all duration-1000 ease-out" />
                                                                <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#10b981" strokeWidth="4.5" strokeDasharray={`${fanGoodPct} ${100 - fanGoodPct}`} strokeDashoffset="0" className="transition-all duration-1000 ease-out" strokeLinecap="round" />
                                                            </svg>
                                                            <div className="absolute inset-0 flex flex-col items-center justify-center transform rotate-90">
                                                                <span className="text-xl sm:text-2xl font-black text-slate-800">{totalEvalFans > 0 ? Math.round(fanGoodPct) : 0}%</span>
                                                                <span className="text-[9px] sm:text-[10px] font-bold text-slate-500">송풍기 양호율</span>
                                                            </div>
                                                        </div>
                                                        <div className="space-y-2">
                                                            <div className="flex items-center gap-2">
                                                                <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
                                                                <div className="w-full flex justify-between gap-4">
                                                                    <div className="text-[10px] font-bold text-slate-500">양호 (80%↑)</div>
                                                                    <div className="text-xs font-black text-slate-800">{goodFans}대</div>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <div className="w-1.5 h-1.5 bg-orange-400 rounded-full"></div>
                                                                <div className="w-full flex justify-between gap-4">
                                                                    <div className="text-[10px] font-bold text-slate-500">미흡 (60~80%)</div>
                                                                    <div className="text-xs font-black text-slate-800">{fairFans}대</div>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <div className="w-1.5 h-1.5 bg-slate-300 rounded-full"></div>
                                                                <div className="w-full flex justify-between gap-4">
                                                                    <div className="text-[10px] font-bold text-slate-500">불량 (60%↓)</div>
                                                                    <div className="text-xs font-black text-slate-800">{badFans}대</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* 5. 육안평가 및 기류평가 */}
                                    <div className="mb-10 page-break-inside-avoid">
                                        <h2 className="text-base font-black border-l-[3px] border-[#3b82f6] pl-2.5 mb-3 text-slate-800">
                                            {sIdx.visual}. 육안평가 및 기류평가
                                        </h2>
                                        
                                        <div className="mb-8 page-break-inside-avoid">
                                            <div className="bg-slate-800 text-white font-bold p-2 px-4 text-xs rounded-t-lg inline-block">Step 1 육안평가</div>
                                            <div className="border border-slate-200 rounded-b-xl rounded-tr-xl overflow-hidden shadow-sm">
                                                <table className="w-full border-collapse text-[10px] sm:text-xs bg-white text-center">
                                                    <tbody>
                                                        {visualGroups.map((group, gIdx) => (
                                                            <React.Fragment key={`rep-g-${gIdx}`}>
                                                                {group.items.map((item, iIdx) => (
                                                                    <tr key={`rep-${item.id}`} className="border-b border-slate-100 last:border-b-0">
                                                                        {iIdx === 0 && (
                                                                            <th rowSpan={group.items.length} className="border-r border-slate-100 bg-slate-50 p-2.5 w-[15%] text-slate-700 font-black whitespace-pre-line">
                                                                                {group.name}
                                                                            </th>
                                                                        )}
                                                                        <th className="border-r border-slate-100 bg-slate-50 p-2.5 w-[15%] text-slate-600 font-bold whitespace-pre-line">
                                                                            {item.name}
                                                                        </th>
                                                                        <td className="border-r border-slate-100 p-2.5 w-[20%] font-black align-middle">
                                                                            <div className="flex gap-4 justify-center">
                                                                                <span className={evaluationData.visual[item.id] === '양호' ? 'text-[#3b82f6]' : 'text-slate-300'}>
                                                                                    {evaluationData.visual[item.id] === '양호' ? '☑ 양호' : '☐ 양호'}
                                                                                </span>
                                                                                <span className={evaluationData.visual[item.id] === '미흡' ? 'text-red-500' : 'text-slate-300'}>
                                                                                    {evaluationData.visual[item.id] === '미흡' ? '☑ 미흡' : '☐ 미흡'}
                                                                                </span>
                                                                            </div>
                                                                        </td>
                                                                        <td className="p-2.5 text-left text-slate-600 w-[50%] break-keep font-medium">
                                                                            {item.desc}
                                                                            {/* 출력용 보고서에 결함 타겟 후드 명시 */}
                                                                            {evaluationData.visual[item.id] === '미흡' && evaluationData.visualTargets?.[item.id]?.length > 0 && (
                                                                                <div className="mt-1.5 text-[10px] text-red-500 font-bold">
                                                                                    * 해당 설비: {evaluationData.visualTargets[item.id].map(id => nodes.find(n => n.id === id)?.data.processName).filter(Boolean).join(', ')}
                                                                                </div>
                                                                            )}
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </React.Fragment>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                        <div className="page-break-inside-avoid">
                                            <div className="bg-slate-800 text-white font-bold p-2 px-4 text-xs rounded-t-lg inline-block">Step 2 기류평가</div>
                                            <div className="border border-slate-200 rounded-b-xl rounded-tr-xl overflow-hidden shadow-sm">
                                                <table className="w-full border-collapse text-[10px] sm:text-xs bg-white">
                                                    <tbody>
                                                        <tr className="border-b border-slate-100">
                                                            <th rowSpan={3} className="border-r border-slate-100 bg-slate-50 p-3 w-[25%] text-center text-slate-700 font-black whitespace-pre-line">
                                                                기류평가<br/><span className="font-medium text-[10px] text-slate-500">(연기발생기)</span>
                                                            </th>
                                                            <td rowSpan={3} className="border-r border-slate-100 p-3 w-[25%] font-black align-middle text-center">
                                                                <div className="flex flex-col gap-3 justify-center">
                                                                    <span className={evaluationData.airflow.status === '양호' ? 'text-[#3b82f6]' : 'text-slate-300'}>
                                                                        {evaluationData.airflow.status === '양호' ? '☑ 양호' : '☐ 양호'}
                                                                    </span>
                                                                    <span className={evaluationData.airflow.status === '미흡' ? 'text-red-500' : 'text-slate-300'}>
                                                                        {evaluationData.airflow.status === '미흡' ? '☑ 미흡' : '☐ 미흡'}
                                                                    </span>
                                                                </div>
                                                            </td>
                                                            <td className="border-b border-slate-100 p-0 w-[50%] bg-slate-50/50">
                                                                <table className="w-full border-collapse h-full">
                                                                    <tbody>
                                                                        <tr><th className="border-b border-slate-100 p-2 text-center font-bold text-slate-700">부적정 위치</th></tr>
                                                                        <tr>
                                                                            <td className="p-2 h-10 font-black text-red-500 text-center flex flex-col justify-center items-center">
                                                                                {evaluationData.airflow.badLocation || '\u00A0'}
                                                                                {/* 출력용 보고서에 기류 불량 타겟 후드 명시 */}
                                                                                {evaluationData.airflow.status === '미흡' && evaluationData.airflowTargets?.length > 0 && (
                                                                                    <div className="mt-1 text-[10px] text-red-500 font-bold leading-tight px-2">
                                                                                        * 불량 대상: {evaluationData.airflowTargets.map(id => nodes.find(n => n.id === id)?.data.processName).filter(Boolean).join(', ')}
                                                                                    </div>
                                                                                )}
                                                                            </td>
                                                                        </tr>
                                                                    </tbody>
                                                                </table>
                                                            </td>
                                                        </tr>
                                                        <tr className="border-b border-slate-100">
                                                            <td className="p-2.5 px-4">
                                                                <div className="flex justify-between items-center w-full">
                                                                    <span className="text-slate-600 font-medium break-keep"><b className="font-bold text-slate-800 mr-1">• 흡인 속도:</b> 연기가 흡인되는 속도가 매우 빠름</span>
                                                                    <span className={`font-bold text-sm ml-2 ${evaluationData.airflow.speedChecked ? 'text-[#3b82f6]' : 'text-slate-300'}`}>
                                                                        {evaluationData.airflow.speedChecked ? '☑' : '☐'}
                                                                    </span>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                        <tr>
                                                            <td className="p-2.5 px-4">
                                                                <div className="flex justify-between items-center w-full">
                                                                    <span className="text-slate-600 font-medium break-keep"><b className="font-bold text-slate-800 mr-1">• 흡인 상태:</b> 연기가 확산되지 않고 모두 흡인</span>
                                                                    <span className={`font-bold text-sm ml-2 ${evaluationData.airflow.statusChecked ? 'text-[#3b82f6]' : 'text-slate-300'}`}>
                                                                        {evaluationData.airflow.statusChecked ? '☑' : '☐'}
                                                                    </span>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 6. AI 스마트 진단 리포트 (출력용) */}
                                    {smartDiagnostics && smartDiagnostics.length > 0 && (
                                        <div className="mb-10 page-break-inside-avoid">
                                            <h2 className="text-base font-black border-l-[3px] border-[#3b82f6] pl-2.5 mb-3 text-slate-800">
                                                {sIdx.smart}. [스마트 국소배기 진단]
                                            </h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 print:grid-cols-2 gap-4">
                                                {smartDiagnostics.map((diag, idx) => (
                                                    <div key={idx} className={`p-4 rounded-xl border ${diag.status === 'success' ? 'bg-emerald-50/30 border-emerald-200' : diag.status === 'danger' ? 'bg-red-50/30 border-red-200' : diag.status === 'info' ? 'bg-slate-50 border-slate-200' : 'bg-orange-50/30 border-orange-200'} page-break-inside-avoid shadow-sm`}>
                                                        <h4 className={`text-sm font-black mb-2 flex items-center gap-2 ${diag.status === 'success' ? 'text-emerald-700' : diag.status === 'danger' ? 'text-red-700' : diag.status === 'info' ? 'text-slate-700' : 'text-orange-700'}`}>
                                                            {diag.status === 'success' ? <CheckCircle2 className="w-4 h-4" /> : diag.status === 'info' ? <InfoIcon className="w-4 h-4" /> : <ZapIcon className="w-4 h-4" />}
                                                            [{diag.type === 'hood' ? '후드' : diag.type === 'fan' ? '송풍기' : '시스템'}] {diag.name}
                                                        </h4>
                                                        {diag.issues.length > 0 && (
                                                            <div className="mb-2 space-y-1">
                                                                {diag.issues.map((issue, i) => (
                                                                    <p key={i} className="text-[11px] text-slate-600 font-bold flex items-start gap-1.5 break-keep"><span className="text-red-400 mt-0.5">•</span> {issue}</p>
                                                                ))}
                                                            </div>
                                                        )}
                                                        {diag.solutions.length > 0 && (
                                                            <div className={`p-2.5 rounded-lg mt-2 space-y-1 ${diag.status === 'success' ? 'bg-emerald-100/30' : diag.status === 'info' ? 'bg-white' : 'bg-white'}`}>
                                                                <p className="text-[9px] font-black text-slate-400 mb-0.5">AI 솔루션 제안</p>
                                                                {diag.solutions.map((sol, i) => (
                                                                    <p key={i} className="text-[11px] text-slate-700 font-bold flex items-start gap-1.5 break-keep"><span className="text-[#3b82f6] mt-0.5">▶</span> {sol}</p>
                                                                ))}
                                                                {diag.references && diag.references.length > 0 && (
                                                                    <div className="mt-1.5 pt-1.5 border-t border-slate-100 flex flex-wrap gap-1">
                                                                        {diag.references.map((ref, i) => (
                                                                            <span key={i} className="bg-slate-100 text-slate-500 text-[8px] px-1.5 py-0.5 rounded font-bold">📘 {ref}</span>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* 7. 점검자 종합 의견 */}
                                    <div className="mb-10 page-break-inside-avoid">
                                        <h2 className="text-base font-black border-l-[3px] border-[#3b82f6] pl-2.5 mb-3 text-slate-800">
                                            {sIdx.review}. 점검자 종합 의견 (총평)
                                        </h2>
                                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-6 min-h-[120px] whitespace-pre-wrap text-sm font-medium leading-relaxed text-slate-700 shadow-sm">
                                            {overallReview || <span className="text-slate-400 font-normal">입력된 종합 의견이 없습니다.</span>}
                                            {overallReviewImage && (
                                                <div className="mt-6 pt-5 border-t border-slate-200 print:border-t-2 print:border-slate-300 page-break-inside-avoid">
                                                    <span className="text-xs font-bold text-slate-500 mb-3 block">▶ 현장 스케치 및 수기 기록</span>
                                                    <img src={overallReviewImage} alt="종합 의견 첨부 자료" className="max-w-full h-auto rounded-lg border border-slate-200 shadow-sm mx-auto object-contain max-h-[500px]" />
                                                </div>
                                            )}
                                        </div>
                                        
                                        <div className="mt-3 p-3 bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-500 flex items-start gap-2 page-break-inside-avoid">
                                            <span className="text-slate-400 mt-0.5">※</span>
                                            <span>해당 문제점 및 필요배기량의 경우 현재 기준으로 작성되었으며, 개선시에는 정밀진단 후 개선 필요</span>
                                        </div>
                                    </div>

                                    {/* 8. 가이드라인 첨부 */}
                                    {selectedGuides.length > 0 && (
                                        <div className="mt-10 page-break-inside-avoid">
                                            <h2 className="text-base font-black border-l-[3px] border-emerald-500 pl-2.5 mb-4 text-slate-800">
                                                [첨부자료] KOSHA 작업종류별 환기 표준 가이드
                                            </h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 print:grid-cols-2 gap-4">
                                                {selectedGuides.map(guideId => {
                                                    const guide = KOSHA_GUIDES.find(g => g.id === guideId);
                                                    if(!guide) return null;
                                                    return (
                                                        <div key={guide.id} className="border border-slate-200 p-4 rounded-xl bg-slate-50 page-break-inside-avoid shadow-sm">
                                                            <h3 className="font-bold text-slate-800 mb-2 flex items-center gap-2 text-sm">
                                                                <CheckCircle2 className="w-4 h-4 text-emerald-500" /> {guide.title}
                                                            </h3>
                                                            <p className="text-xs text-slate-600 font-medium leading-relaxed break-keep">{guide.desc}</p>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {/* --- 출력용 보고서 하단 저작권 표기 --- */}
                                    <div className="mt-16 pt-6 border-t-2 border-slate-100 text-center page-break-inside-avoid print-force-block">
                                        <p className="text-[10px] text-slate-400 font-bold">
                                            © Copyright 2022582@kiha21.or.kr. All rights reserved.
                                        </p>
                                    </div>

                                </div>
                            </div>

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
