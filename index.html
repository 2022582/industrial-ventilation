<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>국소배기 전문가용 진단 앱</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저에서 JSX 실행을 위함) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- PDF 생성 라이브러리 (html2pdf) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">
  
  <!-- 리액트 앱이 렌더링될 루트 요소 -->
  <div id="root"></div>

  <!-- 메인 애플리케이션 코드 -->
  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    // 아이콘 컴포넌트
    const Factory = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></svg>;
    const MousePointer2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/></svg>;
    const Fan = ({className, x, y, width, height}) => <svg className={className||""} x={x} y={y} width={width||24} height={height||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.827 16.379a6.082 6.082 0 0 1-8.618-7.002l5.412 1.45a6.082 6.082 0 0 1 7.002-8.618l-1.45 5.412a6.082 6.082 0 0 1 8.618 7.002l-5.412-1.45a6.082 6.082 0 0 1-7.002 8.618l1.45-5.412Z"/><path d="M12 12v.01"/></svg>;
    const Square = ({className, x, y, width, height}) => <svg className={className||""} x={x} y={y} width={width||24} height={height||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>;
    const Minus = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>;
    const Trash2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const Camera = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
    const CheckCircle2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const XCircle = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const Printer = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const Activity = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
    const Download = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const Upload = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const Share2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>;

    // KOSHA 작업종류별 환기 표준 가이드 데이터
    const KOSHA_GUIDES = [
      { id: 'steam_small', title: '증기세척기 (소형)', desc: '제어풍속 0.5 ~ 1.0 m/s 이상 확보. 개구면적을 최소화하고 측방/하방 흡인 방식 권장.' },
      { id: 'steam_large', title: '증기세척기 (중대형)', desc: '제어풍속 1.0 m/s 이상 확보. 작업물 인양 시 증기 비산을 막기 위한 포위식 후드 또는 부스 형태 권장.' },
      { id: 'dipping', title: '디핑(Dipping) 세척기', desc: '제어풍속 0.5 ~ 1.0 m/s (유기용제 취급 시 1.0m/s 이상). 슬롯형 후드 설치 시 세척조 길이에 맞게 균일한 흡인 설계 필요.' },
      { id: 'wipe', title: '와이프(Wipe) 세척기', desc: '제어풍속 0.5 m/s 이상. 하방 흡인식 테이블 후드 또는 작업대 밀착형 측방 흡인식 적용 권장.' },
      { id: 'wet_process', title: '습식가공공정', desc: '가공 중 발생하는 미스트 및 증기가 작업자 호흡기 내로 유입되지 않도록 포위식 또는 밀착형 외부식 후드 설치. 오일미스트 필터 적용 권장.' },
      { id: 'plating', title: '도금작업', desc: '제어풍속 0.5 ~ 1.0 m/s (푸쉬풀 후드 권장). 흄 및 미스트 발생량이 많으므로 부식 방지 재질(PVC/FRP 등) 사용 필수.' },
      { id: 'welding', title: '용접작업', desc: '제어풍속 0.5 ~ 1.0 m/s 이상. 플렉시블(국소배기) 암 후드 사용 시 용접점으로부터 30cm 이내 위치시켜 흄(Fume) 포집 극대화.' },
      { id: 'fumehood', title: '실험실 흄후드', desc: '제어풍속 0.4 ~ 0.5 m/s (샤시 개방 시 기준). 샤시 높이 조절에 따른 풍속 변화 방지를 위해 VAV 시스템 권장.' },
      { id: 'powder', title: '분체투입/혼합작업', desc: '제어풍속 1.0 ~ 1.2 m/s. 포위식 후드를 기본으로 하되, 작업자 호흡기 방향으로 분진이 비산되지 않도록 설계.' }
    ];

    function App() {
      // 캔버스 환경을 위한 커스텀 토스트 알림 상태
      const [toastMessage, setToastMessage] = useState("");
      
      // 외부 html2pdf 라이브러리 동적 로드 (PDF 공유 기능용)
      useEffect(() => {
        if (!window.html2pdf) {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
          script.async = true;
          document.body.appendChild(script);
        }
      }, []);
      
      const showAlert = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(""), 3000);
      };

      // 기본 정보
      const [factoryName, setFactoryName] = useState("");
      const [representativeName, setRepresentativeName] = useState("");
      const [address, setAddress] = useState("");
      const [useLayout, setUseLayout] = useState(true); 
      const [overallReview, setOverallReview] = useState(""); // 점검자 종합 의견
      const [overallReviewImage, setOverallReviewImage] = useState(null); // 첨부 이미지 추가
      
      // 다중 선택 상태 추가
      const [selectedGuides, setSelectedGuides] = useState([]);
      
      // 도면 데이터
      const [nodes, setNodes] = useState([]);
      const [edges, setEdges] = useState([]); 
      
      // 도구 및 상태
      const [tool, setTool] = useState("select"); 
      const [selectedNodeId, setSelectedNodeId] = useState(null);
      const [selectedEdgeId, setSelectedEdgeId] = useState(null);
      const [draggingNodeId, setDraggingNodeId] = useState(null);
      const [draggingEdgeId, setDraggingEdgeId] = useState(null);
      const [drawingEdge, setDrawingEdge] = useState(null);
      
      // 모바일 & 부가 기능 상태
      const [mobileTab, setMobileTab] = useState('edit'); // 'edit' | 'report'
      const [leftTab, setLeftTab] = useState('input'); // 'input' | 'eval' 추가
      const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
      
      // 육안 및 기류 평가 상태 추가
      const [evaluationData, setEvaluationData] = useState({
        visual: {
          hoodApp: '양호', hoodInst: '양호',
          ductApp: '양호', ductConn: '양호', ductDamper: '양호', ductExhaust: '양호',
          purifierApp: '양호', purifierPress: '양호', purifierConn: '양호',
          fanApp: '양호', fanBelt: '양호', fanConn: '양호'
        },
        airflow: {
          status: '양호',
          badLocation: '',
          speedChecked: true,
          statusChecked: true
        }
      });

      // 평가 업데이트 핸들러
      const updateEval = (category, field, value) => {
        setEvaluationData(prev => ({
          ...prev,
          [category]: {
            ...prev[category],
            [field]: value
          }
        }));
      };

      const visualGroups = [
        {
          name: '후드',
          items: [
            { id: 'hoodApp', name: '외관', desc: '부식, 변형 등이 없이 최초 설치 상태를 유지' },
            { id: 'hoodInst', name: '설치상태', desc: '개구면 주변 방해물이 없이 발생원 비산방향으로 설치' }
          ]
        },
        {
          name: '덕트·\n배기구',
          items: [
            { id: 'ductApp', name: '외관', desc: '부식, 변형 등 외관상태 점검' },
            { id: 'ductConn', name: '접속부', desc: '접속부 파손, 변형으로 인한 공기 유입여부 등' },
            { id: 'ductDamper', name: '댐퍼', desc: '댐퍼의 손상 및 정상작동 유무 등' },
            { id: 'ductExhaust', name: '배기구', desc: '배출공기 작업장 재유입 가능 여부 등' }
          ]
        },
        {
          name: '공기\n정화장치',
          items: [
            { id: 'purifierApp', name: '외관', desc: '부식, 변형 등 외관상태 점검' },
            { id: 'purifierPress', name: '차압', desc: '공기정화장치 정상운행 가능한 차압 유지 여부' },
            { id: 'purifierConn', name: '접속부', desc: '접속부 파손, 변형으로 인한 공기 유입여부 등' }
          ]
        },
        {
          name: '배풍기',
          items: [
            { id: 'fanApp', name: '외관', desc: '케이싱, 임펠러, 모터 파손, 부식 등' },
            { id: 'fanBelt', name: '벨트', desc: '벨트의 헐거움, 베어링의 마모 등' },
            { id: 'fanConn', name: '연결부', desc: '송풍기 연결부(캔버스) 파손 등으로 인한 공기유입 여부' }
          ]
        }
      ];

      const svgRef = useRef(null);
      const fileInputRef = useRef(null);

      /* 데이터 파일 저장/불러오기 로직 */
      const handleSaveFile = () => {
        const data = { factoryName, representativeName, address, useLayout, overallReview, overallReviewImage, selectedGuides, nodes, edges, evaluationData };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `국소배기_진단데이터_${factoryName || '사업장'}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showAlert("데이터가 저장되었습니다.");
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data && data.nodes) {
              setFactoryName(data.factoryName || "");
              setRepresentativeName(data.representativeName || "");
              setAddress(data.address || "");
              setOverallReview(data.overallReview || "");
              setOverallReviewImage(data.overallReviewImage || null);
              setSelectedGuides(data.selectedGuides || []);
              setUseLayout(data.useLayout !== false);
              setNodes(data.nodes || []);
              setEdges(data.edges || []);
              if (data.evaluationData) setEvaluationData(data.evaluationData);
              showAlert("데이터를 성공적으로 불러왔습니다.");
            } else {
              showAlert("유효하지 않은 데이터 양식입니다.");
            }
          } catch(err) {
            showAlert("파일 읽기 실패: 올바른 JSON 파일이 아닙니다.");
          }
          if (fileInputRef.current) fileInputRef.current.value = '';
        };
        reader.readAsText(file);
      };

      /* PDF 생성 및 모바일 카카오톡/앱 공유 로직 */
      const handleSharePDF = async () => {
        setMobileTab('report'); // 모바일에서 '입력' 탭일 때 캡처하면 빈 화면이 나오는 현상 방지
        setIsGeneratingPDF(true);
        
        // UI 렌더링 후 PDF 생성을 위해 약간의 딜레이
        setTimeout(async () => {
          const element = document.getElementById('report-content-wrapper');
          if(!window.html2pdf) {
              showAlert("PDF 라이브러리를 불러오고 있습니다. 잠시 후 다시 시도해주세요.");
              setIsGeneratingPDF(false);
              return;
          }
          const opt = {
            margin:       10,
            filename:     `국소배기보고서_${factoryName || '사업장'}.pdf`,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, windowWidth: 1024 }, // 모바일에서도 A4 비율 붕괴 방지
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
          };

          try {
            // PDF Blob 생성
            const pdfBlob = await window.html2pdf().set(opt).from(element).outputPdf('blob');
            const file = new File([pdfBlob], opt.filename, { type: 'application/pdf' });
            
            // 모바일 Web Share API (카카오톡, 메일 전송 등)
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({
                title: '국소배기장치 성능평가 보고서',
                text: `${factoryName || '사업장'} 국소배기장치 성능평가 보고서입니다.`,
                files: [file]
              });
            } else {
              // Share API 미지원 브라우저/PC의 경우 단순 다운로드
              window.html2pdf().set(opt).from(element).save();
              showAlert("파일이 다운로드 되었습니다.");
            }
          } catch(err) {
            console.error(err);
            showAlert("PDF 생성 중 오류가 발생했습니다.");
          } finally {
            setIsGeneratingPDF(false);
          }
        }, 100);
      };

      // 🖨️ 인쇄 기능 (빈 화면 방지를 위해 탭 전환 후 실행)
      const handlePrint = () => {
        setMobileTab('report'); // 반드시 먼저 탭 전환
        // 탭이 전환되고 DOM이 업데이트될 시간을 충분히 줌
        setTimeout(() => {
          window.print();
        }, 300);
      };

      // 법정 제어풍속 자동 산출 로직
      const getAutoControlVelocity = (type, state, isPermitted) => {
        if (type === 'enclosure' && isPermitted) return state === 'gas' ? 0.5 : 1.0;
        if (state === 'gas') {
          if (type === 'enclosure') return 0.4;
          if (type === 'ext_up') return 1.0;
          return 0.5;
        } else {
          if (type === 'enclosure') return 0.7;
          if (type === 'ext_up') return 1.2;
          return 1.0;
        }
      };

      // 마우스/터치 위치 좌표 계산
      const getMousePos = (e) => {
        if (!useLayout || !svgRef.current) return { rawX: 0, rawY: 0, x: 0, y: 0 };
        const svg = svgRef.current;
        const CTM = svg.getScreenCTM();
        let clientX = e.clientX, clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
        }
        const rawX = (clientX - CTM.e) / CTM.a;
        const rawY = (clientY - CTM.f) / CTM.d;
        return { rawX, rawY, x: Math.round((rawX - 10) / 20) * 20 + 10, y: Math.round((rawY - 10) / 20) * 20 + 10 };
      };

      const findSnapTarget = (rawX, rawY, excludeNodeId) => {
        const nearbyNodes = nodes.filter(n => n.id !== excludeNodeId && Math.abs(n.x - rawX) < 20 && Math.abs(n.y - rawY) < 20);
        if (nearbyNodes.length > 0) {
          const mainNode = nearbyNodes.find(n => n.type !== 'joint');
          const snapNode = mainNode || nearbyNodes[0];
          return { type: 'node', node: snapNode, x: snapNode.x, y: snapNode.y };
        }
        for (let e of edges) {
          if (e.from === excludeNodeId || e.to === excludeNodeId) continue;
          const fromNode = nodes.find(n => n.id === e.from);
          const toNode = nodes.find(n => n.id === e.to);
          if (!fromNode || !toNode) continue;
          const isHorizontal = Math.abs(fromNode.y - toNode.y) < 1;
          const isVertical = Math.abs(fromNode.x - toNode.x) < 1;
          if (isHorizontal && rawX >= Math.min(fromNode.x, toNode.x) && rawX <= Math.max(fromNode.x, toNode.x) && Math.abs(rawY - fromNode.y) < 20) 
            return { type: 'edge', edge: e, x: Math.round((rawX - 10) / 20) * 20 + 10, y: fromNode.y };
          else if (isVertical && rawY >= Math.min(fromNode.y, toNode.y) && rawY <= Math.max(fromNode.y, toNode.y) && Math.abs(rawX - fromNode.x) < 20) 
            return { type: 'edge', edge: e, x: fromNode.x, y: Math.round((rawY - 10) / 20) * 20 + 10 };
        }
        return null;
      };

      const createHood = (x = 110, y = 110) => {
        const newNode = {
          id: `hood-${Date.now()}`, type: 'hood', x, y,
          data: {
            processName: `공정-${nodes.filter(n => n.type === 'hood').length + 1}`, photo: null, 
            hoodType: "enclosure", materialState: "gas", isPermitted: false, distanceX: 0, 
            controlVelocity: 0.4, measuredControlVelocity: "", shape: "rect",
            width: "", height: "", diameter: "", measuredVelocity: "",
            openingWidth: "", openingHeight: "", 
            manualFanName: ""
          }
        };
        setNodes([...nodes, newNode]);
        setSelectedNodeId(newNode.id);
      };

      const createFan = (x = 210, y = 110) => {
        const newNode = {
          id: `fan-${Date.now()}`, type: 'fan', x, y,
          data: {
            fanName: `송풍기-${nodes.filter(n => n.type === 'fan').length + 1}`,
            ratedQ: "", ratedSP: "", measuredQ: "", measuredSP: ""
          }
        };
        setNodes([...nodes, newNode]);
        setSelectedNodeId(newNode.id);
      };

      const handlePointerDown = (e) => {
        if (!useLayout) return;
        const { x, y } = getMousePos(e);
        if (tool === 'select') {
          setSelectedNodeId(null); setSelectedEdgeId(null);
        } else if (tool === 'hood') {
          createHood(x, y); setTool('select');
        } else if (tool === 'fan') {
          createFan(x, y); setTool('select');
        } else if (tool === 'line') {
          const snapTarget = findSnapTarget(x, y, null);
          let startNodeId = snapTarget && snapTarget.type === 'node' ? snapTarget.node.id : (() => {
            const n = { id: `joint-${Date.now()}`, type: 'joint', x, y, data: {} };
            setNodes([...nodes, n]); return n.id;
          })();
          setDrawingEdge({ startNodeId, x, y, cornerX: null, cornerY: null, snapTarget: null });
        }
      };

      const handlePointerMove = (e) => {
        if (!useLayout) return;
        let { x, y, rawX, rawY } = getMousePos(e);

        if (draggingNodeId) {
          setNodes(prev => prev.map(n => n.id === draggingNodeId ? { ...n, x, y } : n)); return;
        }
        if (draggingEdgeId) {
          const edge = edges.find(ed => ed.id === draggingEdgeId);
          if (!edge) return;
          const fromNode = nodes.find(n => n.id === edge.from), toNode = nodes.find(n => n.id === edge.to);
          if (!fromNode || !toNode) return;
          if (Math.abs(fromNode.y - toNode.y) < 1) setNodes(prev => prev.map(n => (n.id === edge.from || n.id === edge.to) ? { ...n, y } : n));
          else if (Math.abs(fromNode.x - toNode.x) < 1) setNodes(prev => prev.map(n => (n.id === edge.from || n.id === edge.to) ? { ...n, x } : n));
          return;
        }

        if (!drawingEdge) return;
        const startNode = nodes.find(n => n.id === drawingEdge.startNodeId);
        if (!startNode) return;

        const isHorizontal = Math.abs(rawX - startNode.x) > Math.abs(rawY - startNode.y);
        let currentX = isHorizontal ? x : startNode.x, currentY = isHorizontal ? startNode.y : y;
        let cornerX = null, cornerY = null, snapTarget = findSnapTarget(rawX, rawY, startNode.id);

        if (snapTarget) {
          currentX = snapTarget.x; currentY = snapTarget.y;
          if (startNode.x !== currentX && startNode.y !== currentY) {
            cornerX = isHorizontal ? currentX : startNode.x; cornerY = isHorizontal ? startNode.y : currentY;
          }
        }
        setDrawingEdge({ ...drawingEdge, x: currentX, y: currentY, cornerX, cornerY, snapTarget });
      };

      const handlePointerUp = (e) => {
        if (!useLayout) return;
        if (draggingNodeId || draggingEdgeId) { setDraggingNodeId(null); setDraggingEdgeId(null); return; }
        if (!drawingEdge) return;
        
        let { x, y, rawX, rawY } = getMousePos(e);
        const startNode = nodes.find(n => n.id === drawingEdge.startNodeId);
        if (!startNode) return;

        const isHorizontal = Math.abs(rawX - startNode.x) > Math.abs(rawY - startNode.y);
        let currentX = isHorizontal ? x : startNode.x, currentY = isHorizontal ? startNode.y : y;
        let cornerX = null, cornerY = null;
        let finalSnapTarget = findSnapTarget(rawX, rawY, startNode.id);

        if (finalSnapTarget) {
          currentX = finalSnapTarget.x; currentY = finalSnapTarget.y;
          if (startNode.x !== currentX && startNode.y !== currentY) {
            cornerX = isHorizontal ? currentX : startNode.x; 
            cornerY = isHorizontal ? startNode.y : currentY;
          }
        }

        let newNodes = [...nodes], newEdges = [...edges], lastEndId = startNode.id;

        if (cornerX !== null) {
          const cornerNode = { id: `joint-${Date.now()}-c`, type: 'joint', x: cornerX, y: cornerY, data: {} };
          newNodes.push(cornerNode); newEdges.push({ id: `edge-${Date.now()}-c`, from: lastEndId, to: cornerNode.id });
          lastEndId = cornerNode.id;
        }

        let targetNodeId;
        if (finalSnapTarget) {
          if (finalSnapTarget.type === 'node') targetNodeId = finalSnapTarget.node.id;
          else {
            const splitEdge = finalSnapTarget.edge;
            const splitJoint = { id: `joint-${Date.now()}-s`, type: 'joint', x: currentX, y: currentY, data: {} };
            newNodes.push(splitJoint);
            newEdges = newEdges.filter(e => e.id !== splitEdge.id);
            newEdges.push({ id: `edge-${Date.now()}-s1`, from: splitEdge.from, to: splitJoint.id });
            newEdges.push({ id: `edge-${Date.now()}-s2`, from: splitJoint.id, to: splitEdge.to });
            targetNodeId = splitJoint.id;
          }
        } else {
          const endJoint = { id: `joint-${Date.now()}-e`, type: 'joint', x: currentX, y: currentY, data: {} };
          newNodes.push(endJoint); targetNodeId = endJoint.id;
        }

        if (lastEndId !== targetNodeId) newEdges.push({ id: `edge-${Date.now()}-e`, from: lastEndId, to: targetNodeId });

        setNodes(newNodes); setEdges(newEdges); setDrawingEdge(null); setTool('select');
      };

      const handleNodePointerDown = (e, id) => {
        if (!useLayout) return;
        e.stopPropagation();
        if (tool === 'select') { setSelectedEdgeId(null); setSelectedNodeId(id); setDraggingNodeId(id); } 
        else if (tool === 'line' && !drawingEdge) {
          const node = nodes.find(n => n.id === id);
          setDrawingEdge({ startNodeId: id, x: node.x, y: node.y, cornerX: null, cornerY: null, snapTarget: null });
        }
      };

      const handleEdgePointerDown = (e, id) => {
        if (!useLayout) return;
        e.stopPropagation();
        if (tool === 'select') { setSelectedNodeId(null); setSelectedEdgeId(id); setDraggingEdgeId(id); }
      };

      const deleteSelected = () => {
        if (selectedNodeId) {
          setNodes(nodes.filter(n => n.id !== selectedNodeId));
          setEdges(edges.filter(e => e.from !== selectedNodeId && e.to !== selectedNodeId));
          setSelectedNodeId(null);
        } else if (selectedEdgeId) {
          setEdges(edges.filter(e => e.id !== selectedEdgeId));
          setSelectedEdgeId(null);
        }
      };

      const updateNodeData = (field, value) => {
        if (!selectedNodeId) return;
        setNodes(nodes.map(n => {
          if (n.id === selectedNodeId) {
            let newData = { ...n.data, [field]: value };
            if (field === 'hoodType' && value !== 'enclosure') newData.isPermitted = false;
            if (['hoodType', 'materialState', 'isPermitted'].includes(field) || (field === 'hoodType' && newData.isPermitted)) {
              newData.controlVelocity = getAutoControlVelocity(newData.hoodType, newData.materialState, newData.isPermitted || false);
            }
            return { ...n, data: newData };
          }
          return n;
        }));
      };

      const handlePhotoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => updateNodeData('photo', ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handleReviewPhotoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => setOverallReviewImage(ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      // 데이터 계산 로직
      const calculateResult = (data) => {
        const { hoodType, distanceX, controlVelocity, measuredControlVelocity, shape, width, height, diameter, measuredVelocity, openingWidth, openingHeight } = data;
        let area = shape === 'rect' ? (parseFloat(width) || 0) * (parseFloat(height) || 0) : Math.PI * Math.pow(((parseFloat(diameter) || 0) / 1000) / 2, 2);
        const vc = parseFloat(controlVelocity) || 0, vmc = parseFloat(measuredControlVelocity) || 0, vm = parseFloat(measuredVelocity) || 0, x = parseFloat(distanceX) || 0;
        
        let openingArea = (parseFloat(openingWidth) || 0) * (parseFloat(openingHeight) || 0);
        let requiredQ = hoodType === 'enclosure' ? 60 * vc * openingArea : 60 * vc * (10 * Math.pow(x, 2) + area);
        const currentQ = 60 * vm * area;

        const isVelocityGood = vmc >= vc;
        const isVolumeGood = currentQ >= requiredQ;
        const isGood = isVelocityGood && isVolumeGood && currentQ > 0;

        return { 
          area: area.toFixed(3), openingArea: openingArea.toFixed(3), 
          requiredQ: requiredQ.toFixed(2), currentQ: currentQ.toFixed(2), 
          isVelocityGood, isVolumeGood, isGood 
        };
      };

      const hoodsData = useMemo(() => {
        return nodes.filter(n => n.type === 'hood').map(n => {
          const calc = calculateResult(n.data);
          return { ...n, calc };
        });
      }, [nodes]);

      const fansData = useMemo(() => {
        return nodes.filter(n => n.type === 'fan').map(fan => {
          const connectedHoods = hoodsData.filter(h => h.data.manualFanName && h.data.manualFanName.trim() === fan.data.fanName.trim());
          const sumCurrentQ = connectedHoods.reduce((sum, h) => sum + parseFloat(h.calc.currentQ || 0), 0);
          
          const rQ = parseFloat(fan.data.ratedQ) || 0, mQ = parseFloat(fan.data.measuredQ) || 0;
          const eff = rQ > 0 ? (mQ / rQ) * 100 : 0;
          const suctionRatio = mQ > 0 ? (sumCurrentQ / mQ) * 100 : (rQ > 0 ? (sumCurrentQ / rQ) * 100 : 0);

          let status = '-';
          if (rQ > 0 && mQ > 0) {
             if (eff >= 80) status = '양호';
             else if (eff >= 60) status = '미흡';
             else status = '불량';
          }
          return { ...fan, calc: { connectedHoods, sumCurrentQ, eff, suctionRatio, status } };
        });
      }, [nodes, hoodsData]);

      const selectedNode = nodes.find(n => n.id === selectedNodeId);
      const selectedNodeCalc = selectedNode?.type === 'hood' ? calculateResult(selectedNode.data) : null;
      
      const totalHoods = hoodsData.length, goodHoods = hoodsData.filter(h => h.calc.isGood).length, badHoods = totalHoods - goodHoods;
      const pieDashArray = totalHoods > 0 ? (goodHoods / totalHoods) * 100 : 0;

      const evaluatedFans = fansData.filter(f => f.calc.status !== '-');
      const totalEvalFans = evaluatedFans.length;
      const goodFans = evaluatedFans.filter(f => f.calc.status === '양호').length;
      const fairFans = evaluatedFans.filter(f => f.calc.status === '미흡').length;
      const badFans = evaluatedFans.filter(f => f.calc.status === '불량').length;
      const fanGoodPct = totalEvalFans > 0 ? (goodFans / totalEvalFans) * 100 : 0;
      const fanFairPct = totalEvalFans > 0 ? (fairFans / totalEvalFans) * 100 : 0;

      return (
        <div className="flex flex-col h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden print-force-block relative">
          <style dangerouslySetInnerHTML={{__html: `
            @media print {
              @page { size: A4 portrait; margin: 15mm 10mm; }
              body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; font-size: 11pt !important; color: black !important; }
              .print-hide { display: none !important; }
              html, body, #root, .print-force-block { display: block !important; height: auto !important; min-height: auto !important; max-height: none !important; width: 100% !important; max-width: none !important; overflow: visible !important; position: static !important; margin: 0 !important; padding: 0 !important; background: transparent !important; }
              #report-content-wrapper { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; }
              .page-break-inside-avoid { page-break-inside: avoid !important; break-inside: avoid !important; }
              table { page-break-inside: auto; width: 100% !important; }
              tr { page-break-inside: avoid !important; page-break-after: auto !important; }
              thead { display: table-header-group !important; }
              tfoot { display: table-footer-group !important; }
              ::-webkit-scrollbar { display: none; }
            }
            .touch-none-svg { touch-action: none; }
          `}} />
          
          {/* 토스트 알림 메시지 */}
          {toastMessage && (
            <div className="fixed top-5 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-2xl z-[10000] text-sm font-bold">
              {toastMessage}
            </div>
          )}

          {/* PDF 로딩 오버레이 */}
          {isGeneratingPDF && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center print-hide">
              <div className="bg-white p-6 rounded-lg shadow-2xl flex flex-col items-center">
                <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <h3 className="text-lg font-bold text-slate-800">PDF 문서 생성 중...</h3>
                <p className="text-sm text-slate-500 mt-2">잠시만 기다려주세요.</p>
              </div>
            </div>
          )}

          {/* 파일 불러오기 숨김 Input */}
          <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleFileUpload} />

          {/* 전체 상단 헤더 (액션바) */}
          <header className="flex-shrink-0 p-3 lg:p-4 bg-blue-800 text-white flex justify-between items-center z-20 print-hide">
            <div>
              <h1 className="text-base lg:text-lg font-black flex items-center gap-1.5 lg:gap-2">
                <Activity className="w-4 h-4 lg:w-5 lg:h-5" /> 
                <span className="hidden sm:inline">국소배기 자체검사 앱</span>
                <span className="inline sm:hidden">국소배기 진단</span>
                <span className="bg-blue-600 text-[10px] px-1.5 py-0.5 rounded">Expert</span>
              </h1>
            </div>
            
            <div className="flex gap-1 lg:gap-2">
              <button onClick={() => fileInputRef.current.click()} className="p-2 bg-blue-700 hover:bg-blue-600 rounded text-white text-xs font-bold flex items-center gap-1 transition">
                <Upload className="w-4 h-4"/><span className="hidden sm:inline">불러오기</span>
              </button>
              <button onClick={handleSaveFile} className="p-2 bg-blue-700 hover:bg-blue-600 rounded text-white text-xs font-bold flex items-center gap-1 transition">
                <Download className="w-4 h-4"/><span className="hidden sm:inline">저장</span>
              </button>
              <button onClick={handleSharePDF} className="p-2 bg-blue-700 hover:bg-blue-600 rounded text-white text-xs font-bold flex items-center gap-1 transition">
                <Share2 className="w-4 h-4"/><span className="hidden sm:inline">PDF 공유</span>
              </button>
              <button onClick={handlePrint} className="p-2 bg-blue-700 hover:bg-blue-600 rounded text-white text-xs font-bold flex items-center gap-1 transition">
                <Printer className="w-4 h-4"/><span className="hidden sm:inline">출력</span>
              </button>
            </div>
          </header>

          {/* 모바일 하단/상단 탭 (핸드폰 사이즈 전용) */}
          <div className="flex lg:hidden flex-shrink-0 bg-blue-900 text-white text-sm font-bold z-10 shadow-md print-hide">
            <button onClick={() => setMobileTab('edit')} className={`flex-1 py-3 transition-colors ${mobileTab === 'edit' ? 'bg-blue-600 border-b-4 border-white' : 'text-blue-300'}`}>입력 및 도면</button>
            <button onClick={() => setMobileTab('report')} className={`flex-1 py-3 transition-colors ${mobileTab === 'report' ? 'bg-blue-600 border-b-4 border-white' : 'text-blue-300'}`}>보고서 확인</button>
          </div>

          {/* 메인 작업 영역 */}
          <div className="flex flex-1 overflow-hidden relative print-force-block">
            
            {/* 좌측 패널 (입력 및 평가 컨트롤) */}
            <div className={`w-full lg:w-[400px] flex-shrink-0 bg-white lg:border-r border-slate-200 shadow-xl z-10 flex flex-col h-full print-hide ${mobileTab === 'edit' ? 'flex' : 'hidden lg:flex'}`}>
              
              {/* 좌측 패널 탭 (제원/도면 vs 육안/기류평가) */}
              <div className="flex bg-slate-200 p-1 mx-4 mt-4 rounded-lg font-bold text-sm flex-shrink-0 shadow-inner">
                <button onClick={() => setLeftTab('input')} className={`flex-1 py-2 rounded-md transition-colors ${leftTab === 'input' ? 'bg-white shadow text-blue-700' : 'text-slate-500 hover:bg-slate-300'}`}>제원 및 도면</button>
                <button onClick={() => setLeftTab('eval')} className={`flex-1 py-2 rounded-md transition-colors ${leftTab === 'eval' ? 'bg-white shadow text-blue-700' : 'text-slate-500 hover:bg-slate-300'}`}>육안 및 기류 평가</button>
              </div>

              {leftTab === 'input' ? (
                <div className="p-4 sm:p-5 space-y-6 flex-1 overflow-y-auto">
                  
                  {/* 1. 기본 정보 설정 */}
                  <div>
                    <h2 className="text-sm font-bold text-slate-400 mb-2">1. 기본 정보 설정</h2>
                    <div className="space-y-2 mb-3">
                      <div className="relative">
                        <Factory className="absolute left-3 top-3 w-5 h-5 text-slate-400" />
                        <input type="text" placeholder="사업장 명칭을 입력하세요" 
                          value={factoryName} onChange={e => setFactoryName(e.target.value)}
                          className="w-full pl-10 p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700" />
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="대표자 성명" 
                          value={representativeName} onChange={e => setRepresentativeName(e.target.value)}
                          className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold text-slate-700" />
                        <input type="text" placeholder="소재지(주소)" 
                          value={address} onChange={e => setAddress(e.target.value)}
                          className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-bold text-slate-700" />
                      </div>
                    </div>
                    <div className="flex items-center justify-between bg-slate-50 p-3 rounded-lg border border-slate-200">
                      <div className="flex flex-col">
                        <span className="text-sm font-bold text-slate-700">도면(Lay-out) 사용</span>
                        <span className="text-[10px] text-slate-500">끄면 도면 없이 목록으로만 관리합니다</span>
                      </div>
                      <label className="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" className="sr-only peer" checked={useLayout} onChange={e => {
                          setUseLayout(e.target.checked);
                          if (!e.target.checked) setTool('select');
                        }} />
                        <div className="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                      </label>
                    </div>
                  </div>

                  <hr className="border-slate-100" />

                  {useLayout ? (
                    <div>
                      <h2 className="text-sm font-bold text-slate-400 mb-2 flex justify-between items-center">
                        2. Lay-out (도면) 도구
                      </h2>
                      <div className="grid grid-cols-4 gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
                        <button onClick={() => setTool('select')} className={`flex flex-col items-center p-2 rounded transition-colors ${tool === 'select' ? 'bg-blue-100 text-blue-700 border-blue-300 border shadow-inner' : 'hover:bg-slate-200'}`}>
                          <MousePointer2 className="w-5 h-5 mb-1" /> <span className="text-[10px] font-bold">선택/이동</span>
                        </button>
                        <button onClick={() => setTool('fan')} className={`flex flex-col items-center p-2 rounded transition-colors ${tool === 'fan' ? 'bg-blue-100 text-blue-700 border-blue-300 border shadow-inner' : 'hover:bg-slate-200'}`}>
                          <Fan className="w-5 h-5 mb-1" /> <span className="text-[10px] font-bold">송풍기</span>
                        </button>
                        <button onClick={() => setTool('hood')} className={`flex flex-col items-center p-2 rounded transition-colors ${tool === 'hood' ? 'bg-blue-100 text-blue-700 border-blue-300 border shadow-inner' : 'hover:bg-slate-200'}`}>
                          <Square className="w-5 h-5 mb-1" /> <span className="text-[10px] font-bold">후드</span>
                        </button>
                        <button onClick={() => setTool('line')} className={`flex flex-col items-center p-2 rounded transition-colors ${tool === 'line' ? 'bg-blue-100 text-blue-700 border-blue-300 border shadow-inner' : 'hover:bg-slate-200'}`}>
                          <Minus className="w-5 h-5 mb-1" /> <span className="text-[10px] font-bold">직선(덕트)</span>
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      <div>
                        <h2 className="text-sm font-bold text-slate-400 mb-2 flex justify-between items-center">
                          2-1. 송풍기 목록
                          <button onClick={() => createFan()} className="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-bold border border-indigo-300 hover:bg-indigo-200 transition-colors">+ 추가</button>
                        </h2>
                        <div className="grid grid-cols-2 gap-2">
                          {nodes.filter(n => n.type === 'fan').map(n => (
                            <button key={n.id} onClick={() => setSelectedNodeId(n.id)} className={`p-2 text-xs font-bold rounded border text-left truncate transition-colors ${selectedNodeId === n.id ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                              <Fan className="w-3 h-3 inline mr-1"/>{n.data.fanName}
                            </button>
                          ))}
                        </div>
                      </div>
                      <div>
                        <h2 className="text-sm font-bold text-slate-400 mb-2 flex justify-between items-center">
                          2-2. 후드 목록
                          <button onClick={() => createHood()} className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold border border-blue-300 hover:bg-blue-200 transition-colors">+ 추가</button>
                        </h2>
                        <div className="grid grid-cols-2 gap-2">
                          {nodes.filter(n => n.type === 'hood').map(n => (
                            <button key={n.id} onClick={() => setSelectedNodeId(n.id)} className={`p-2 text-xs font-bold rounded border text-left truncate transition-colors ${selectedNodeId === n.id ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                              {n.data.processName}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                  <hr className="border-slate-100" />

                  <div className="pb-10">
                    <div className="flex justify-between items-center mb-3">
                      <h2 className="text-sm font-bold text-slate-400">3. 선택 객체 제원 입력</h2>
                      {(selectedNodeId || selectedEdgeId) && (
                        <button onClick={deleteSelected} className="text-red-500 hover:text-red-700 flex items-center gap-1 text-xs font-bold bg-red-50 px-2 py-1 rounded transition-colors">
                          <Trash2 className="w-3 h-3" /> 삭제
                        </button>
                      )}
                    </div>

                    {!selectedNode && !selectedEdgeId ? (
                      <div className="bg-slate-50 border border-dashed border-slate-300 rounded-lg p-6 text-center text-slate-400 text-sm">
                        목록이나 도면에서<br/>송풍기 또는 후드를 선택해주세요.
                      </div>
                    ) : selectedEdgeId || (selectedNode && selectedNode.type === 'joint') ? (
                      <div className="bg-slate-50 border border-slate-200 rounded-lg p-6 text-center text-slate-500 text-sm font-bold">
                        {selectedEdgeId ? '배관(직선)이 선택되었습니다.' : '배관 조인트가 선택되었습니다.'}
                      </div>
                    ) : selectedNode.type === 'fan' ? (
                      <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2">
                        <div>
                          <label className="block text-xs font-bold mb-1">송풍기 명칭</label>
                          <input type="text" value={selectedNode.data.fanName || ""} onChange={e => updateNodeData('fanName', e.target.value)}
                                 className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:border-indigo-500" />
                        </div>
                        <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg space-y-3">
                          <h3 className="text-xs font-bold text-slate-500 border-b pb-2">정격 사양 (명판 기준)</h3>
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold mb-1 text-slate-600">정격 송풍량 (CMM)</label>
                              <input type="number" step="0.1" value={selectedNode.data.ratedQ || ""} onChange={e => updateNodeData('ratedQ', e.target.value)}
                                     className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold mb-1 text-slate-600">정격 정압 (mmAq)</label>
                              <input type="number" step="0.1" value={selectedNode.data.ratedSP || ""} onChange={e => updateNodeData('ratedSP', e.target.value)}
                                     className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                            </div>
                          </div>
                        </div>
                        <div className="p-3 bg-indigo-50 border border-indigo-200 rounded-lg space-y-3">
                          <h3 className="text-xs font-bold text-indigo-800 border-b border-indigo-200 pb-2">현장 측정 결과</h3>
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[10px] font-bold mb-1 text-indigo-700">측정 송풍량 (CMM)</label>
                              <input type="number" step="0.1" value={selectedNode.data.measuredQ || ""} onChange={e => updateNodeData('measuredQ', e.target.value)}
                                     className="w-full p-2 border border-indigo-300 rounded text-sm outline-none focus:border-indigo-500 bg-white" />
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold mb-1 text-indigo-700">측정 정압 (mmAq)</label>
                              <input type="number" step="0.1" value={selectedNode.data.measuredSP || ""} onChange={e => updateNodeData('measuredSP', e.target.value)}
                                     className="w-full p-2 border border-indigo-300 rounded text-sm outline-none focus:border-indigo-500 bg-white" />
                            </div>
                          </div>
                        </div>
                        {(() => {
                          const fData = fansData.find(f => f.id === selectedNode.id);
                          if (!fData || !fData.data.ratedQ) return null;
                          return (
                            <div className={`p-3 rounded border font-bold text-sm flex items-center justify-between ${fData.calc.status === '양호' ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : fData.calc.status === '미흡' ? 'bg-orange-50 border-orange-300 text-orange-700' : 'bg-red-50 border-red-300 text-red-700'}`}>
                               <span>송풍기 종합 효율: {fData.calc.eff.toFixed(1)}%</span>
                               <span>{fData.calc.status}</span>
                            </div>
                          );
                        })()}
                      </div>
                    ) : (
                      <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2">
                        
                        <div className="bg-indigo-50 p-2.5 rounded border border-indigo-200 shadow-sm mb-4">
                          <label className="block text-[10px] font-bold mb-1 text-indigo-700">연결 송풍기 명칭 (입력 시 자동 그룹화)</label>
                          <input 
                            type="text" 
                            list="fan-list" 
                            placeholder="예: 송풍기-1 (미입력 시 미연결)" 
                            value={selectedNode.data.manualFanName || ""} 
                            onChange={e => updateNodeData('manualFanName', e.target.value)} 
                            className="w-full p-2 border border-indigo-300 rounded text-sm font-bold outline-none bg-white text-indigo-900" 
                          />
                          <datalist id="fan-list">
                            {nodes.filter(n => n.type === 'fan').map(f => <option key={f.id} value={f.data.fanName} />)}
                          </datalist>
                        </div>

                        <div>
                          <label className="block text-xs font-bold mb-1">공정명</label>
                          <input type="text" value={selectedNode.data.processName} onChange={e => updateNodeData('processName', e.target.value)}
                            className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:border-blue-500" />
                        </div>

                        <div>
                          <label className="block text-xs font-bold mb-1">현장 사진</label>
                          <div className="flex gap-2">
                            <label className="flex-1 bg-slate-100 hover:bg-slate-200 border border-slate-300 rounded p-2 flex justify-center items-center gap-2 cursor-pointer transition-colors text-sm font-bold">
                              <Camera className="w-4 h-4 text-slate-600" /> 촬영 또는 첨부
                              <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoUpload} />
                            </label>
                          </div>
                          {selectedNode.data.photo && (
                            <div className="mt-2 relative rounded overflow-hidden border border-slate-200">
                              <img src={selectedNode.data.photo} alt="현장" className="w-full h-32 object-cover" />
                              <button onClick={() => updateNodeData('photo', null)} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 shadow"><XCircle className="w-4 h-4" /></button>
                            </div>
                          )}
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-xs font-bold mb-1">후드 형식</label>
                            <select value={selectedNode.data.hoodType} onChange={e => updateNodeData('hoodType', e.target.value)}
                              className="w-full p-2 border border-slate-300 rounded text-xs outline-none bg-white">
                              <option value="enclosure">포위식/부스식</option>
                              <option value="ext_up">외부식 상방형</option>
                              <option value="ext_side">외부식 측방형</option>
                              <option value="ext_down">외부식 하방형</option>
                            </select>
                          </div>
                          <div>
                            <label className="block text-xs font-bold mb-1">물질 상태</label>
                            <select value={selectedNode.data.materialState} onChange={e => updateNodeData('materialState', e.target.value)}
                              className="w-full p-2 border border-slate-300 rounded text-xs outline-none bg-white">
                              <option value="gas">가스상</option>
                              <option value="particle">입자상</option>
                            </select>
                          </div>
                        </div>

                        <div className={`mt-2 p-2 rounded flex items-center gap-2 transition-colors ${selectedNode.data.hoodType === 'enclosure' ? 'bg-red-50 border border-red-200 cursor-pointer' : 'bg-slate-100 border border-slate-200 opacity-50 cursor-not-allowed'}`}>
                          <input type="checkbox" id={`permit-${selectedNode.id}`} checked={selectedNode.data.isPermitted || false} onChange={e => updateNodeData('isPermitted', e.target.checked)} disabled={selectedNode.data.hoodType !== 'enclosure'}
                            className={`w-4 h-4 rounded focus:ring-red-500 ${selectedNode.data.hoodType === 'enclosure' ? 'text-red-600 border-red-300' : 'text-slate-400 border-slate-300'}`} />
                          <label htmlFor={`permit-${selectedNode.id}`} className={`text-xs font-bold select-none ${selectedNode.data.hoodType === 'enclosure' ? 'text-red-700 cursor-pointer' : 'text-slate-500 cursor-not-allowed'}`}>
                            허가대상 유해물질 취급 (포위식 전용)
                          </label>
                        </div>

                        <div className="grid grid-cols-2 gap-3 mt-4">
                          <div>
                            <label className="block text-xs font-bold mb-1 text-indigo-700">법정 제어풍속 (m/s)</label>
                            <input type="number" step="0.1" value={selectedNode.data.controlVelocity} onChange={e => updateNodeData('controlVelocity', e.target.value)}
                              className="w-full p-2 border border-indigo-300 rounded text-sm outline-none bg-indigo-50 text-indigo-900 font-bold" />
                          </div>
                          {selectedNode.data.hoodType !== 'enclosure' && (
                            <div>
                              <label className="block text-xs font-bold mb-1">제어거리 X (m)</label>
                              <input type="number" step="0.1" value={selectedNode.data.distanceX} onChange={e => updateNodeData('distanceX', e.target.value)}
                                className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                            </div>
                          )}
                        </div>

                        {selectedNode.data.hoodType === 'enclosure' && (
                          <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                            <label className="block text-[10px] font-bold mb-2 text-blue-800">▶ 포위식 개구면 크기 (필요 배기량 산정용)</label>
                            <div className="flex gap-2">
                              <div className="flex-1 flex items-center gap-1">
                                <input type="number" step="0.1" placeholder="가로" value={selectedNode.data.openingWidth || ""} onChange={e => updateNodeData('openingWidth', e.target.value)} className="w-full p-2 border border-blue-300 rounded text-sm outline-none bg-white" />
                                <span className="text-xs font-bold text-blue-700">m</span>
                              </div>
                              <div className="flex-1 flex items-center gap-1">
                                <input type="number" step="0.1" placeholder="세로" value={selectedNode.data.openingHeight || ""} onChange={e => updateNodeData('openingHeight', e.target.value)} className="w-full p-2 border border-blue-300 rounded text-sm outline-none bg-white" />
                                <span className="text-xs font-bold text-blue-700">m</span>
                              </div>
                            </div>
                          </div>
                        )}
                        
                        <div className="mt-4">
                          <label className="block text-xs font-bold mb-1 text-emerald-700">▶ 현장 측정 제어풍속 (m/s)</label>
                          <input type="number" step="0.1" placeholder="현장에서 측정한 제어풍속" value={selectedNode.data.measuredControlVelocity} onChange={e => updateNodeData('measuredControlVelocity', e.target.value)}
                            className="w-full p-2 border-2 border-emerald-400 rounded text-sm outline-none bg-emerald-50 text-emerald-900 font-bold" />
                        </div>

                        <div className="pt-2">
                          <h2 className="text-sm font-bold text-slate-400 mb-3 border-t border-slate-200 pt-4">4. 현재 배기량 산정 (덕트 등 측정부)</h2>
                          <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg space-y-3">
                            <div className="flex gap-4">
                              <label className="text-xs font-bold flex items-center gap-1 cursor-pointer">
                                <input type="radio" checked={selectedNode.data.shape === 'rect'} onChange={() => updateNodeData('shape', 'rect')} /> 사각형
                              </label>
                              <label className="text-xs font-bold flex items-center gap-1 cursor-pointer">
                                <input type="radio" checked={selectedNode.data.shape === 'circle'} onChange={() => updateNodeData('shape', 'circle')} /> 원형
                              </label>
                            </div>
                            
                            {selectedNode.data.shape === 'rect' ? (
                              <div className="flex gap-4">
                                <div className="flex-1 flex items-center gap-2"><input type="number" step="0.1" placeholder="가로" value={selectedNode.data.width} onChange={e => updateNodeData('width', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" /><span className="text-slate-500 font-bold text-sm">m</span></div>
                                <div className="flex-1 flex items-center gap-2"><input type="number" step="0.1" placeholder="세로" value={selectedNode.data.height} onChange={e => updateNodeData('height', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" /><span className="text-slate-500 font-bold text-sm">m</span></div>
                              </div>
                            ) : (
                              <div className="flex items-center gap-2"><input type="number" step="1" placeholder="직경" value={selectedNode.data.diameter} onChange={e => updateNodeData('diameter', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" /><span className="text-slate-500 font-bold text-sm">mm</span></div>
                            )}

                            <div>
                              <label className="block text-[10px] font-bold mb-1 text-blue-700">▶ 배기량 산출용 측정 풍속 (m/s)</label>
                              <input type="number" step="0.1" placeholder="개구면/덕트 내 측정 풍속" value={selectedNode.data.measuredVelocity} onChange={e => updateNodeData('measuredVelocity', e.target.value)}
                                className="w-full p-2 border border-blue-300 rounded text-sm outline-none bg-white" />
                            </div>
                          </div>
                        </div>

                        {selectedNodeCalc && (
                          <div className={`p-3 rounded border font-bold text-sm flex items-center justify-between ${selectedNodeCalc.isGood ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : 'bg-red-50 border-red-300 text-red-700'}`}>
                            <span className="flex items-center gap-1">
                              {selectedNodeCalc.isGood ? <CheckCircle2 className="w-4 h-4" /> : <XCircle className="w-4 h-4" />}
                              {selectedNodeCalc.isGood ? '풍속 및 배기량 만족' : '기준 미달 (개선 필요)'}
                            </span>
                            <span>{selectedNodeCalc.currentQ} CMM</span>
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                  <hr className="border-slate-100" />

                  {/* 4. 점검자 종합 의견 (총평) 입력 */}
                  <div>
                    <h2 className="text-sm font-bold text-slate-400 mb-3">4. 점검자 종합 의견 (총평)</h2>
                    <textarea
                      value={overallReview}
                      onChange={e => setOverallReview(e.target.value)}
                      placeholder="사업장의 국소배기장치 성능 상태 및 개선 권고 사항을 자유롭게 작성해주세요."
                      className="w-full p-3 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 min-h-[120px] resize-y bg-white"
                    ></textarea>
                    <div className="mt-3">
                      <label className="flex bg-slate-100 hover:bg-slate-200 border border-slate-300 rounded p-2 justify-center items-center gap-2 cursor-pointer transition-colors text-sm font-bold w-full">
                        <Camera className="w-4 h-4 text-slate-600" /> 스케치 또는 수기 자료 촬영/첨부
                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleReviewPhotoUpload} />
                      </label>
                      {overallReviewImage && (
                        <div className="mt-2 relative rounded overflow-hidden border border-slate-200">
                          <img src={overallReviewImage} alt="첨부 자료" className="w-full object-contain max-h-64 bg-slate-50" />
                          <button onClick={() => setOverallReviewImage(null)} className="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1 shadow"><XCircle className="w-4 h-4" /></button>
                        </div>
                      )}
                    </div>
                  </div>
                  
                  {/* 5. KOSHA 환기 표준 가이드 다중선택 입력 */}
                  <div className="pb-6 mt-6 border-t border-slate-200 pt-6">
                    <h2 className="text-sm font-bold text-slate-400 mb-2">5. KOSHA 환기 표준 가이드 첨부</h2>
                    <p className="text-[10px] text-slate-500 mb-3">보고서에 첨부할 해당 사업장의 작업 종류를 다중 선택하세요.</p>
                    <div className="grid grid-cols-2 gap-2">
                      {KOSHA_GUIDES.map(guide => {
                        const isSelected = selectedGuides.includes(guide.id);
                        return (
                          <button 
                            key={guide.id}
                            onClick={() => {
                              if (isSelected) setSelectedGuides(selectedGuides.filter(id => id !== guide.id));
                              else setSelectedGuides([...selectedGuides, guide.id]);
                            }}
                            className={`p-2 text-xs font-bold text-left rounded border transition-colors ${isSelected ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-600 hover:bg-slate-50 border-slate-300'}`}
                          >
                            <div className="flex items-center gap-1.5">
                              {isSelected ? <CheckCircle2 className="w-3 h-3" /> : <Square className="w-3 h-3 text-slate-300" />}
                              {guide.title}
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  </div>

                </div>
              ) : (
                <div className="p-4 sm:p-5 space-y-6 flex-1 overflow-y-auto">
                  
                  {/* Step 2 육안평가 입력부 */}
                  <div>
                    <h2 className="text-sm font-bold text-white mb-2 bg-[#7882c5] p-2 rounded shadow-sm">Step 2 육안평가</h2>
                    <div className="border border-slate-300 rounded overflow-hidden shadow-sm">
                      <table className="w-full text-[10px] sm:text-xs text-left border-collapse">
                        <tbody>
                          {visualGroups.map((group, gIdx) => (
                            <React.Fragment key={gIdx}>
                              {group.items.map((item, iIdx) => (
                                <tr key={item.id} className="border-b border-slate-200 last:border-b-0 hover:bg-slate-50">
                                  {iIdx === 0 && (
                                    <td rowSpan={group.items.length} className="border-r border-slate-200 bg-slate-100 font-black p-2 text-center w-14 whitespace-pre-line text-slate-700">
                                      {group.name}
                                    </td>
                                  )}
                                  <td className="p-2 border-r border-slate-200 bg-slate-50 font-bold text-center whitespace-nowrap text-slate-700">
                                    {item.name}
                                  </td>
                                  <td className="p-2 border-r border-slate-200 whitespace-nowrap">
                                    <div className="flex flex-col sm:flex-row gap-2">
                                      <label className="cursor-pointer inline-flex items-center gap-1 font-bold">
                                        <input type="radio" name={item.id} checked={evaluationData.visual[item.id] === '양호'} onChange={() => updateEval('visual', item.id, '양호')} className="text-indigo-600 focus:ring-indigo-500 w-3 h-3 sm:w-4 sm:h-4" /> 양호
                                      </label>
                                      <label className="cursor-pointer inline-flex items-center gap-1 font-bold">
                                        <input type="radio" name={item.id} checked={evaluationData.visual[item.id] === '미흡'} onChange={() => updateEval('visual', item.id, '미흡')} className="text-red-500 focus:ring-red-500 w-3 h-3 sm:w-4 sm:h-4" /> 미흡
                                      </label>
                                    </div>
                                  </td>
                                  <td className="p-2 text-slate-600 min-w-[120px] break-keep leading-relaxed">
                                    {item.desc}
                                  </td>
                                </tr>
                              ))}
                            </React.Fragment>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  {/* Step 3 기류평가 입력부 */}
                  <div>
                    <h2 className="text-sm font-bold text-white mb-2 bg-[#7882c5] p-2 rounded shadow-sm mt-6">Step 3 기류평가</h2>
                    <div className="border border-slate-300 rounded overflow-hidden shadow-sm">
                      <table className="w-full text-[10px] sm:text-xs text-left border-collapse">
                        <tbody>
                          <tr className="border-b border-slate-200 bg-white">
                            <td className="p-2 border-r border-slate-200 bg-slate-100 font-black text-center w-[25%] whitespace-pre-line text-slate-700">
                              기류평가<br/>(연기발생기)
                            </td>
                            <td className="p-2 border-r border-slate-200 whitespace-nowrap w-[25%] text-center align-middle">
                              <div className="flex flex-col gap-2 items-center">
                                <label className="cursor-pointer inline-flex items-center gap-1 font-bold">
                                  <input type="radio" name="airflow_status" checked={evaluationData.airflow.status === '양호'} onChange={() => updateEval('airflow', 'status', '양호')} className="text-indigo-600 focus:ring-indigo-500 w-3 h-3 sm:w-4 sm:h-4" /> 양호
                                </label>
                                <label className="cursor-pointer inline-flex items-center gap-1 font-bold">
                                  <input type="radio" name="airflow_status" checked={evaluationData.airflow.status === '미흡'} onChange={() => updateEval('airflow', 'status', '미흡')} className="text-red-500 focus:ring-red-500 w-3 h-3 sm:w-4 sm:h-4" /> 미흡
                                </label>
                              </div>
                            </td>
                            <td className="p-0 w-[50%]">
                              <table className="w-full border-collapse">
                                <tbody>
                                  <tr>
                                    <th className="bg-slate-100 border-b border-slate-200 p-1.5 text-center font-bold text-slate-700">부적정 후드 위치</th>
                                  </tr>
                                  <tr>
                                    <td className="p-1">
                                      <input type="text" value={evaluationData.airflow.badLocation} onChange={e => updateEval('airflow', 'badLocation', e.target.value)} className="w-full border border-slate-300 p-2 rounded outline-none focus:border-indigo-500 font-bold text-center" placeholder="예: 후드-2" />
                                    </td>
                                  </tr>
                                </tbody>
                              </table>
                            </td>
                          </tr>
                          <tr className="border-b border-slate-200 bg-white">
                            <td colSpan="3" className="p-2 sm:p-3">
                              <label className="flex items-center justify-between cursor-pointer gap-2">
                                <span className="text-slate-700 font-medium break-keep flex-1"><b className="text-indigo-800">• 흡인 속도:</b> 연기가 후드로 흡인되는 속도가 매우 빠르거나 빠름</span>
                                <input type="checkbox" checked={evaluationData.airflow.speedChecked} onChange={e => updateEval('airflow', 'speedChecked', e.target.checked)} className="w-5 h-5 text-indigo-600 rounded flex-shrink-0" />
                              </label>
                            </td>
                          </tr>
                          <tr className="bg-white">
                            <td colSpan="3" className="p-2 sm:p-3">
                              <label className="flex items-center justify-between cursor-pointer gap-2">
                                <span className="text-slate-700 font-medium break-keep flex-1"><b className="text-indigo-800">• 흡인 상태:</b> 연기가 퍼져나가거나 확산되지 않고 후드로 모두 흡인</span>
                                <input type="checkbox" checked={evaluationData.airflow.statusChecked} onChange={e => updateEval('airflow', 'statusChecked', e.target.checked)} className="w-5 h-5 text-indigo-600 rounded flex-shrink-0" />
                              </label>
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>

                </div>
              )}
            </div>

            {/* 우측 패널 (보고서 영역) */}
            <div className={`flex-1 bg-slate-200 overflow-y-auto relative p-4 lg:p-8 print-force-block ${mobileTab === 'report' ? 'block' : 'hidden lg:block'}`}>
              
              {/* html2pdf가 타겟팅 할 감싸는 영역 */}
              <div id="report-content-wrapper" className="w-full max-w-[210mm] min-h-[297mm] mx-auto bg-white shadow-2xl p-[15mm] sm:p-[20mm] print-force-block">
                
                <div className="border-b-4 border-slate-800 pb-4 mb-6 text-center relative page-break-inside-avoid">
                  <h1 className="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight">국소배기장치 성능평가 보고서</h1>
                  <p className="text-xs sm:text-sm text-slate-400 mt-2 font-bold">(본 결과는 법적 효력이 없으며 참고용입니다)</p>
                </div>

                {/* 사업장 현황 */}
                <div className="mb-8 page-break-inside-avoid">
                  <h2 className="text-lg font-black border-l-4 border-slate-700 pl-2 mb-3">사업장 현황</h2>
                  <table className="w-full border-collapse border border-slate-300 text-xs sm:text-sm">
                    <tbody>
                      <tr>
                        <th className="bg-slate-100 border border-slate-300 p-2 w-[20%] text-center font-bold text-slate-700">사업장명</th>
                        <td className="border border-slate-300 p-2 w-[30%] text-center font-bold text-slate-900">{factoryName || "미입력"}</td>
                        <th className="bg-slate-100 border border-slate-300 p-2 w-[20%] text-center font-bold text-slate-700">대표자</th>
                        <td className="border border-slate-300 p-2 w-[30%] text-center font-bold text-slate-900">{representativeName || "미입력"}</td>
                      </tr>
                      <tr>
                        <th className="bg-slate-100 border border-slate-300 p-2 text-center font-bold text-slate-700">소재지</th>
                        <td colSpan="3" className="border border-slate-300 p-2 font-bold text-slate-900 text-center">{address || "미입력"}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>

                {/* 도면 렌더링 */}
                {useLayout && (
                  <div className="mb-8 print:mb-6 page-break-inside-avoid">
                    <h2 className="text-lg font-black border-l-4 border-blue-600 pl-2 mb-3">1. 공정 Lay-out</h2>
                    <div className={`w-full h-[300px] sm:h-[400px] bg-slate-50 border-2 ${tool === 'select' ? 'border-slate-300' : 'border-blue-400 border-dashed'} rounded-xl relative overflow-hidden print:border-slate-300 print:bg-white print:border-solid`}>
                      <svg ref={svgRef} className={`touch-none-svg w-full h-full ${tool !== 'select' ? 'cursor-crosshair' : 'cursor-default'}`}
                           onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}>
                        <defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1" fill="#cbd5e1" className="print:hidden"/></pattern></defs>
                        {/* data-html2canvas-ignore="true" 로 PDF/인쇄에 제외될 요소 명시 */}
                        <rect width="100%" height="100%" fill="url(#grid)" className="print:hidden" data-html2canvas-ignore="true" />
                        {edges.map(e => {
                          const fromNode = nodes.find(n => n.id === e.from), toNode = nodes.find(n => n.id === e.to);
                          if(!fromNode || !toNode) return null;
                          const isSelected = selectedEdgeId === e.id;
                          return (
                            <g key={e.id}>
                              <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke="transparent" strokeWidth="20" className={tool === 'select' ? "cursor-move print:hidden" : "pointer-events-none"} data-html2canvas-ignore="true" onPointerDown={(ev) => handleEdgePointerDown(ev, e.id)} />
                              <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke={isSelected ? "#3b82f6" : "#475569"} strokeWidth="4" strokeLinecap="round" className="pointer-events-none" />
                            </g>
                          );
                        })}
                        {drawingEdge && (
                          <g className="pointer-events-none" data-html2canvas-ignore="true">
                            {drawingEdge.cornerX !== null ? (
                              <>
                                <line x1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.x} y1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.y} x2={drawingEdge.cornerX} y2={drawingEdge.cornerY} stroke="#3b82f6" strokeWidth="4" strokeDasharray="5,5" />
                                <line x1={drawingEdge.cornerX} y1={drawingEdge.cornerY} x2={drawingEdge.x} y2={drawingEdge.y} stroke="#3b82f6" strokeWidth="4" strokeDasharray="5,5" />
                              </>
                            ) : <line x1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.x} y1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.y} x2={drawingEdge.x} y2={drawingEdge.y} stroke="#3b82f6" strokeWidth="4" strokeDasharray="5,5" />}
                            {drawingEdge.snapTarget?.type === 'edge' && <circle cx={drawingEdge.x} cy={drawingEdge.y} r="6" fill="#ef4444" />}
                            {drawingEdge.snapTarget?.type === 'node' && <circle cx={drawingEdge.x} cy={drawingEdge.y} r="14" fill="none" stroke="#ef4444" strokeWidth="2" />}
                          </g>
                        )}
                        {nodes.map(n => {
                          const isSelected = n.id === selectedNodeId;
                          if (n.type === 'joint') return <circle key={n.id} cx={n.x} cy={n.y} r="10" fill="transparent" data-html2canvas-ignore="true" onPointerDown={(e) => handleNodePointerDown(e, n.id)} className={tool === 'select' ? "cursor-move hover:fill-blue-500/20 print:hidden" : "cursor-pointer print:hidden"} />;
                          
                          let rectFill = n.type === 'fan' ? '#e0e7ff' : (isSelected ? '#eff6ff' : '#ffffff');
                          let rectStroke = isSelected ? '#3b82f6' : (n.type === 'fan' ? '#4f46e5' : '#94a3b8');
                          let iconClass = n.type === 'fan' ? "text-indigo-700" : "text-blue-600";
                          let textFill = n.type === 'fan' ? "fill-indigo-900" : "fill-slate-700";

                          // 후드 객체일 경우 계산 결과(isGood)에 따라 동적으로 색상 부여
                          if (n.type === 'hood') {
                            const hData = hoodsData.find(h => h.id === n.id);
                            if (hData && hData.calc) {
                              if (hData.calc.isGood) {
                                rectFill = isSelected ? '#d1fae5' : '#ecfdf5'; // emerald (양호)
                                rectStroke = isSelected ? '#059669' : '#34d399';
                                iconClass = "text-emerald-600";
                                textFill = "fill-emerald-800";
                              } else {
                                rectFill = isSelected ? '#fee2e2' : '#fef2f2'; // red (불량)
                                rectStroke = isSelected ? '#dc2626' : '#f87171';
                                iconClass = "text-red-500";
                                textFill = "fill-red-800";
