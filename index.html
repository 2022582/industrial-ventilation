<!DOCTYPE html>
<html lang="ko"">
<head>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        /* 모바일 터치 액션 제어 (서명 패드 등) */
        .touch-none { touch-action: none; }
        
        /* 스크롤바 숨기기 (대시보드 내부 요소용) */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* 페이지 나누기 옵션 (html2pdf 인식용으로 전역 설정) */
        .page-break-inside-avoid { page-break-inside: avoid !important; break-inside: avoid !important; }
        .page-break-after-always { page-break-after: always !important; break-after: page !important; }
        .cover-page { padding-top: 2.5rem; padding-bottom: 2.5rem; margin-bottom: 3rem; }

        /* --- 인쇄 및 PDF 생성 시 스타일 --- */
        @media print {
            @page { size: A4 portrait; margin: 15mm 10mm; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; font-size: 11pt !important; color: black !important; overflow: visible !important; }
            .print-hide, #dashboard-sidebar { display: none !important; }
            /* 최상위 래퍼를 포함하여 모든 요소의 높이 제약을 해제 */
            html, body, #root, #app-container, #app-content, #dashboard-main, .print-force-block { display: block !important; height: auto !important; min-height: auto !important; max-height: none !important; width: 100% !important; max-width: none !important; overflow: visible !important; position: static !important; margin: 0 !important; padding: 0 !important; background: transparent !important; border: none !important; border-radius: 0 !important; box-shadow: none !important;}
            #tool-container { display: block !important; gap: 0 !important; padding: 0 !important; }
            #input-panel, #mobile-nav-scroll { display: none !important; }
            #report-panel { width: 100% !important; flex: none !important; overflow: visible !important; background: white !important; padding: 0 !important; border: none !important; box-shadow: none !important;}
            #report-content-wrapper { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; border-radius: 0 !important;}
            table { page-break-inside: auto; width: 100% !important; }
            tr { page-break-inside: avoid !important; page-break-after: auto !important; }
            thead { display: table-header-group !important; }
            tfoot { display: table-footer-group !important; }
            ::-webkit-scrollbar { display: none; }
            .cover-page { padding-top: 20mm !important; padding-bottom: 10mm !important; height: auto !important; min-height: 260mm !important; margin-bottom: 0 !important; }
            .pdf-layout-container { border-color: #cbd5e1 !important; background-color: white !important; border-style: solid !important; }
        }

        /* PDF 생성 시 임시 화면 레이아웃 완전 해제 */
        .pdf-generating,
        .pdf-generating body,
        .pdf-generating #app-container,
        .pdf-generating #app-content,
        .pdf-generating #root,
        .pdf-generating #dashboard-main,
        .pdf-generating #tool-container,
        .pdf-generating #report-panel,
        .pdf-generating .print-force-block {
            display: block !important;
            height: auto !important;
            min-height: auto !important;
            max-height: none !important;
            overflow: visible !important;
            position: static !important;
        }
        .pdf-generating #dashboard-sidebar,
        .pdf-generating #input-panel,
        .pdf-generating #mobile-nav-scroll,
        .pdf-generating header,
        .pdf-generating .print-hide { display: none !important; }
        .pdf-generating #tool-container { padding: 0 !important; }
        .pdf-generating #report-panel { padding: 0 !important; border: none !important; box-shadow: none !important; width: 100% !important; background: white !important; }
        .pdf-generating .cover-page { padding-top: 20mm !important; padding-bottom: 10mm !important; height: auto !important; min-height: 260mm !important; margin-bottom: 0 !important; }
        .pdf-generating .pdf-layout-container { border-color: #cbd5e1 !important; background-color: white !important; border-style: solid !important; }
    </style>
</head>

        const KOSHA_GUIDES = [
            { id: 'us_small', title: '초음파 세척기(소형)', desc: '세척조 상부에 포위식 또는 외부식 후드 설치. 제어풍속 0.5 ~ 1.0 m/s 이상 확보. 증기 비산 방지를 위해 덮개 사용 권장.' },
            { id: 'us_medium', title: '초음파 세척기(중형)', desc: '포위식 후드를 기본으로 하며 측방 또는 하방 흡인 방식 적용. 개구면적을 최소화하고 제어풍속 0.5 ~ 1.0 m/s 이상 확보.' },

            { id: 'steam_small', title: '증기 세척기(소형)', desc: '밀폐식 또는 포위식 후드 설치. 작업 구역 내 제어풍속 0.5 ~ 1.0 m/s 이상 확보. 응축 영역(Freeboard) 유지 관리.' },

            { id: 'plating', title: '도금작업', desc: '제어풍속 0.5 ~ 1.0 m/s. 조 폭이 넓을 경우 푸쉬풀(Push-pull) 후드 권장. 흄/미스트 발생량이 많으므로 부식 방지 재질(PVC/FRP 등) 사용 필수.' },

            { id: 'mix_powder', title: '배합 및 혼합작업 (분체)', desc: '분진 비산을 막기 위해 포위식/부스식 적용. 기류가 작업자에서 발생원으로 향하도록 제어풍속 1.0 ~ 1.2 m/s 이상 확보.' },
            { id: 'powder_pack', title: '분체투입 및 포장작업', desc: '투입/포장구 주변에 포위식 부스 또는 슬롯형 후드 설치. 분진의 비산속도를 이겨낼 수 있도록 제어풍속 1.0 ~ 1.2 m/s 이상 확보.' },
            { id: 'cutting_grind', title: '절단 및 연마작업', desc: '고속 회전체에 의한 분진 비산 방향을 고려하여 포위식 또는 하방/측방 외부식 후드 설치. 제어풍속 1.2 m/s 이상 (미세분진 시 강화).' },
            { id: 'woodwork', title: '목공작업', desc: '톱밥 및 목재 분진 포집을 위해 톱날 하부 및 가공부에 밀착형 포위식 후드 설치. 덕트 내 퇴적 방지를 위해 반송속도 15 m/s 이상 유지.' },
            { id: 'casting', title: '주물작업 (용해/주입)', desc: '용해로 상부에 열 상승 기류를 포집하는 수전형(캐노피) 또는 측방 후드 설치. 제어풍속 1.0 ~ 1.2 m/s 이상 (유해 흄 발생 시 상향 조정).' },
            { id: 'fumehood', title: '실험실 흄후드', desc: '제어풍속 0.4 ~ 0.5 m/s (샤시 개방면적 기준). 샤시 높이 조절에 따른 챔버 내 난기류 및 풍속 변화 방지를 위해 VAV 시스템 또는 바이패스 설계.' },
            { id: 'welding', title: '용접작업', desc: '플렉시블(국소배기) 암 후드를 용접 발생점으로부터 30cm 이내에 위치시켜 흄 포집 극대화. 부스식/포위식 적용 시 제어풍속 0.5 ~ 1.0 m/s 이상.' }
        ];

        // --- 앱 메뉴 ---
        const APP_MENUS = [
            { id: 'info', label: '사업장 현황', icon: <InfoIcon className="w-5 h-5"/> },
            { id: 'layout', label: 'Lay-out', icon: <LayoutIcon className="w-5 h-5"/> },
            { id: 'eval', label: '육안 및 기류', icon: <CheckCircle2 className="w-5 h-5"/> },
            { id: 'smart', label: '스마트 국소배기진단', icon: <ZapIcon className="w-5 h-5"/> },
            { id: 'review', label: '점검자 총평', icon: <EditIcon className="w-5 h-5"/> },
            { id: 'guide', label: '가이드라인 첨부', icon: <FileTextIcon className="w-5 h-5"/> },
        ];

        // --- 메인 컴포넌트 ---
        function App() {
            // [State] UI & 알림
            const [toastMessage, setToastMessage] = useState("");
            const showAlert = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(""), 3000);
            };

            // 오늘 날짜 구하기 (YYYY-MM-DD 형식)
            const getLocalToday = () => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            // [State] 사업장 및 기본 정보
            const [factoryName, setFactoryName] = useState("");
            const [representativeName, setRepresentativeName] = useState("");
            const [industryType, setIndustryType] = useState("");
            const [address, setAddress] = useState("");
            const [measurementDate, setMeasurementDate] = useState(getLocalToday());
            const [measurementDuration, setMeasurementDuration] = useState("1");
            const [useLayout, setUseLayout] = useState(true); 
            const [overallReview, setOverallReview] = useState("");
            const [overallReviewImage, setOverallReviewImage] = useState(null);

            // [State] 서명(결재란)
            const [signatures, setSignatures] = useState({ evaluator: null, manager: null, worker: null });
            const [signModal, setSignModal] = useState({ isOpen: false, role: null });
            const signCanvasRef = useRef(null);
            const isDrawingRef = useRef(false);
            
            // [State] 가이드 선택
            const [selectedGuides, setSelectedGuides] = useState([]);
            const [guidePhotos, setGuidePhotos] = useState({});
            
            // [State] 도면 데이터 (Nodes, Edges)
            const [nodes, setNodes] = useState([]);
            const [edges, setEdges] = useState([]); 
            
            // [State] 도면 에디터 도구 및 선택 상태
            const [tool, setTool] = useState("select"); 
            const [selectedNodeId, setSelectedNodeId] = useState(null);
            const [selectedEdgeId, setSelectedEdgeId] = useState(null);
            const [draggingNodeId, setDraggingNodeId] = useState(null);
            const [draggingEdgeId, setDraggingEdgeId] = useState(null);
            const [drawingEdge, setDrawingEdge] = useState(null);
            
            // [State] 진단 및 평가 데이터
            const [smartDiagnostics, setSmartDiagnostics] = useState([]);
            const [evaluationData, setEvaluationData] = useState({
                visual: { hoodApp: '양호', hoodInst: '양호', ductApp: '양호', ductConn: '양호', ductDamper: '양호', ductExhaust: '양호', purifierApp: '양호', purifierPress: '양호', purifierConn: '양호', fanApp: '양호', fanBelt: '양호', fanConn: '양호' },
                visualTargets: {}, 
                airflow: { status: '양호', badLocation: '', speedChecked: true, statusChecked: true },
                airflowTargets: []
            });

            // [State] 화면 제어
            const [mobileTab, setMobileTab] = useState('edit');
            const [activeMenu, setActiveMenu] = useState('info');
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            
            const visualGroups = [
                { name: '후드', items: [ { id: 'hoodApp', name: '외관', desc: '부식, 변형 등이 없이 최초 설치 상태를 유지' }, { id: 'hoodInst', name: '설치상태', desc: '개구면 주변 방해물이 없이 발생원 비산방향으로 설치' } ]},
                { name: '덕트·\n배기구', items: [ { id: 'ductApp', name: '외관', desc: '부식, 변형 등 외관상태 점검' }, { id: 'ductConn', name: '접속부', desc: '접속부 파손, 변형으로 인한 공기 유입여부 등' }, { id: 'ductDamper', name: '댐퍼', desc: '댐퍼의 손상 및 정상작동 유무 등' }, { id: 'ductExhaust', name: '배기구', desc: '배출공기 작업장 재유입 가능 여부 등' } ]},
                { name: '공기\n정화장치', items: [ { id: 'purifierApp', name: '외관', desc: '부식, 변형 등 외관상태 점검' }, { id: 'purifierPress', name: '차압', desc: '공기정화장치 정상운행 가능한 차압 유지 여부' }, { id: 'purifierConn', name: '접속부', desc: '접속부 파손, 변형으로 인한 공기 유입여부 등' } ]},
                { name: '배풍기', items: [ { id: 'fanApp', name: '외관', desc: '케이싱, 임펠러, 모터 파손, 부식 등' }, { id: 'fanBelt', name: '벨트', desc: '벨트의 헐거움, 베어링의 마모 등' }, { id: 'fanConn', name: '연결부', desc: '송풍기 연결부(캔버스) 파손 등으로 인한 공기유입 여부' } ]}
            ];

            const svgRef = useRef(null);
            const fileInputRef = useRef(null);

            // [Effect] 브라우저 기본 인쇄 감지하여 CSS 클래스 추가
            useEffect(() => {
                const beforePrint = () => document.documentElement.classList.add('pdf-generating');
                const afterPrint = () => document.documentElement.classList.remove('pdf-generating');
                window.addEventListener('beforeprint', beforePrint);
                window.addEventListener('afterprint', afterPrint);
                return () => {
                    window.removeEventListener('beforeprint', beforePrint);
                    window.removeEventListener('afterprint', afterPrint);
                };
            }, []);

            // --- 데이터 저장 및 불러오기 ---
            const handleSaveFile = () => {
                const data = { factoryName, representativeName, industryType, address, measurementDate, measurementDuration, useLayout, overallReview, overallReviewImage, selectedGuides, guidePhotos, nodes, edges, evaluationData, smartDiagnostics, signatures };
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `국소배기_진단데이터_${factoryName || '사업장'}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showAlert("데이터가 저장되었습니다.");
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data && data.nodes) {
                            setFactoryName(data.factoryName || "");
                            setRepresentativeName(data.representativeName || "");
                            setIndustryType(data.industryType || "");
                            setAddress(data.address || "");
                            setMeasurementDate(data.measurementDate || getLocalToday());
                            setMeasurementDuration(data.measurementDuration || "1");
                            setOverallReview(data.overallReview || "");
                            setOverallReviewImage(data.overallReviewImage || null);
                            setSelectedGuides(data.selectedGuides || []);
                            setGuidePhotos(data.guidePhotos || {});
                            setUseLayout(data.useLayout !== false);
                            setNodes(data.nodes || []);
                            setEdges(data.edges || []);
                            if (data.evaluationData) {
                                setEvaluationData({
                                    ...data.evaluationData,
                                    visualTargets: data.evaluationData.visualTargets || {},
                                    airflowTargets: data.evaluationData.airflowTargets || []
                                });
                            }
                            if (data.smartDiagnostics) setSmartDiagnostics(data.smartDiagnostics);
                            if (data.signatures) setSignatures(data.signatures);
                            showAlert("데이터를 성공적으로 불러왔습니다.");
                        } else {
                            showAlert("유효하지 않은 데이터 양식입니다.");
                        }
                    } catch(err) {
                        showAlert("파일 읽기 실패: 올바른 JSON 파일이 아닙니다.");
                    }
                    if (fileInputRef.current) fileInputRef.current.value = '';
                };
                reader.readAsText(file);
            };

            // --- PDF 공유 및 출력 ---
            const handleSharePDF = async () => {
                setMobileTab('report'); 
                setIsGeneratingPDF(true);
                document.documentElement.classList.add('pdf-generating');
                
                setTimeout(() => {
                    requestAnimationFrame(async () => {
                        const element = document.getElementById('report-content-wrapper');
                        if(!window.html2pdf) {
                            showAlert("PDF 라이브러리를 불러오고 있습니다. 잠시 후 다시 시도해주세요.");
                            setIsGeneratingPDF(false);
                            document.documentElement.classList.remove('pdf-generating');
                            return;
                        }
                        const opt = {
                            margin:       [15, 10, 15, 10], 
                            filename:     `국소배기보고서_${factoryName || '사업장'}.pdf`,
                            image:        { type: 'jpeg', quality: 1 },
                            html2canvas:  { scale: 2, useCORS: true, scrollY: 0, windowWidth: 1024 },
                            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                            pagebreak:    { mode: ['css', 'legacy'] }
                        };

                        try {
                            const pdfBlob = await window.html2pdf().set(opt).from(element).outputPdf('blob');
                            const file = new File([pdfBlob], opt.filename, { type: 'application/pdf' });
                            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                                await navigator.share({
                                    title: '국소배기장치 성능평가 보고서',
                                    text: `${factoryName || '사업장'} 국소배기장치 성능평가 보고서입니다.`,
                                    files: [file]
                                });
                            } else {
                                window.html2pdf().set(opt).from(element).save();
                                showAlert("파일이 다운로드 되었습니다.");
                            }
                        } catch(err) {
                            console.error(err);
                            showAlert("PDF 생성 중 오류가 발생했습니다.");
                        } finally {
                            setIsGeneratingPDF(false);
                            document.documentElement.classList.remove('pdf-generating');
                        }
                    });
                }, 800);
            };

            const handlePrint = () => {
                setMobileTab('report');
                document.documentElement.classList.add('pdf-generating');
                setTimeout(() => {
                    window.print();
                    document.documentElement.classList.remove('pdf-generating');
                }, 500);
            };

            // --- Canvas 서명 핸들러 ---
            const startDrawingSignature = (e) => {
                e.preventDefault();
                const canvas = signCanvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.strokeStyle = "#1e293b"; 
                ctx.beginPath();
                ctx.moveTo(x, y);
                isDrawingRef.current = true;
            };

            const drawSignature = (e) => {
                e.preventDefault();
                if (!isDrawingRef.current) return;
                const canvas = signCanvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const stopDrawingSignature = (e) => {
                if(e) e.preventDefault();
                isDrawingRef.current = false;
            };

            const clearSignature = () => {
                const canvas = signCanvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            const saveSignature = () => {
                const canvas = signCanvasRef.current;
                const dataUrl = canvas.toDataURL('image/png');
                setSignatures(prev => ({ ...prev, [signModal.role]: dataUrl }));
                setSignModal({ isOpen: false, role: null });
            };

            // --- 계산 및 로직 유틸리티 ---
            const updateEval = (category, field, value) => {
                setEvaluationData(prev => ({ ...prev, [category]: { ...prev[category], [field]: value } }));
            };

            const getAutoControlVelocity = (type, state, isPermitted) => {
                if (type === 'enclosure' && isPermitted) return state === 'gas' ? 0.5 : 1.0;
                if (state === 'gas') {
                    if (type === 'enclosure') return 0.4;
                    if (type === 'ext_up') return 1.0;
                    return 0.5;
                } else {
                    if (type === 'enclosure') return 0.7;
                    if (type === 'ext_up') return 1.2;
                    return 1.0;
                }
            };

            // --- SVG 도면 핸들러 ---
            const getMousePos = (e) => {
                if (!useLayout || !svgRef.current) return { rawX: 0, rawY: 0, x: 0, y: 0 };
                const svg = svgRef.current;
                const CTM = svg.getScreenCTM();
                let clientX = e.clientX, clientY = e.clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
                }
                const rawX = (clientX - CTM.e) / CTM.a;
                const rawY = (clientY - CTM.f) / CTM.d;
                return { rawX, rawY, x: Math.round((rawX - 10) / 20) * 20 + 10, y: Math.round((rawY - 10) / 20) * 20 + 10 };
            };

            const findSnapTarget = (rawX, rawY, excludeNodeId) => {
                const nearbyNodes = nodes.filter(n => n.id !== excludeNodeId && Math.abs(n.x - rawX) < 20 && Math.abs(n.y - rawY) < 20);
                if (nearbyNodes.length > 0) {
                    const mainNode = nearbyNodes.find(n => n.type !== 'joint');
                    const snapNode = mainNode || nearbyNodes[0];
                    return { type: 'node', node: snapNode, x: snapNode.x, y: snapNode.y };
                }
                for (let e of edges) {
                    if (e.from === excludeNodeId || e.to === excludeNodeId) continue;
                    const fromNode = nodes.find(n => n.id === e.from);
                    const toNode = nodes.find(n => n.id === e.to);
                    if (!fromNode || !toNode) continue;
                    const isHorizontal = Math.abs(fromNode.y - toNode.y) < 1;
                    const isVertical = Math.abs(fromNode.x - toNode.x) < 1;
                    if (isHorizontal && rawX >= Math.min(fromNode.x, toNode.x) && rawX <= Math.max(fromNode.x, toNode.x) && Math.abs(rawY - fromNode.y) < 20) 
                        return { type: 'edge', edge: e, x: Math.round((rawX - 10) / 20) * 20 + 10, y: fromNode.y };
                    else if (isVertical && rawY >= Math.min(fromNode.y, toNode.y) && rawY <= Math.max(fromNode.y, toNode.y) && Math.abs(rawX - fromNode.x) < 20) 
                        return { type: 'edge', edge: e, x: fromNode.x, y: Math.round((rawY - 10) / 20) * 20 + 10 };
                }
                return null;
            };

            const createHood = (x = 110, y = 110) => {
                const newNode = {
                    id: `hood-${Date.now()}`, type: 'hood', x, y,
                    data: {
                        processName: `공정-${nodes.filter(n => n.type === 'hood').length + 1}`, photo: null, 
                        hoodType: "enclosure", materialState: "gas", isPermitted: false, distanceX: 0, 
                        controlVelocity: 0.4, measuredControlVelocity: "", shape: "rect",
                        width: "", height: "", diameter: "", measuredVelocity: "",
                        openingWidth: "", openingHeight: "", manualFanName: ""
                    }
                };
                setNodes([...nodes, newNode]);
                setSelectedNodeId(newNode.id);
            };

            const createFan = (x = 210, y = 110) => {
                const newNode = {
                    id: `fan-${Date.now()}`, type: 'fan', x, y,
                    data: {
                        fanName: `송풍기-${nodes.filter(n => n.type === 'fan').length + 1}`,
                        ratedQ: "", ratedSP: "", measuredQ: "", measuredSP: "",
                        hasPurifier: false, purifierType: "bag_filter", purifierDiffPress: ""
                    }
                };
                setNodes([...nodes, newNode]);
                setSelectedNodeId(newNode.id);
            };

            const createHazard = (x = 110, y = 210) => {
                const newNode = {
                    id: `hazard-${Date.now()}`, type: 'hazard', x, y,
                    data: { processName: "", hazardName: "" }
                };
                setNodes([...nodes, newNode]);
                setSelectedNodeId(newNode.id);
            };

            const handlePointerDown = (e) => {
                if (!useLayout) return;
                const { x, y } = getMousePos(e);
                if (tool === 'select') {
                    setSelectedNodeId(null); setSelectedEdgeId(null);
                } else if (tool === 'hood') {
                    createHood(x, y); setTool('select');
                } else if (tool === 'fan') {
                    createFan(x, y); setTool('select');
                } else if (tool === 'hazard') {
                    createHazard(x, y); setTool('select');
                } else if (tool === 'line') {
                    const snapTarget = findSnapTarget(x, y, null);
                    let startNodeId = snapTarget && snapTarget.type === 'node' ? snapTarget.node.id : (() => {
                        const n = { id: `joint-${Date.now()}`, type: 'joint', x, y, data: {} };
                        setNodes([...nodes, n]); return n.id;
                    })();
                    setDrawingEdge({ startNodeId, x, y, cornerX: null, cornerY: null, snapTarget: null });
                }
            };

            const handlePointerMove = (e) => {
                if (!useLayout) return;
                let { x, y, rawX, rawY } = getMousePos(e);

                if (draggingNodeId) {
                    setNodes(prev => prev.map(n => n.id === draggingNodeId ? { ...n, x, y } : n)); return;
                }
                if (draggingEdgeId) {
                    const edge = edges.find(ed => ed.id === draggingEdgeId);
                    if (!edge) return;
                    const fromNode = nodes.find(n => n.id === edge.from), toNode = nodes.find(n => n.id === edge.to);
                    if (!fromNode || !toNode) return;
                    if (Math.abs(fromNode.y - toNode.y) < 1) setNodes(prev => prev.map(n => (n.id === edge.from || n.id === edge.to) ? { ...n, y } : n));
                    else if (Math.abs(fromNode.x - toNode.x) < 1) setNodes(prev => prev.map(n => (n.id === edge.from || n.id === edge.to) ? { ...n, x } : n));
                    return;
                }

                if (!drawingEdge) return;
                const startNode = nodes.find(n => n.id === drawingEdge.startNodeId);
                if (!startNode) return;

                const isHorizontal = Math.abs(rawX - startNode.x) > Math.abs(rawY - startNode.y);
                let currentX = isHorizontal ? x : startNode.x, currentY = isHorizontal ? startNode.y : y;
                let cornerX = null, cornerY = null, snapTarget = findSnapTarget(rawX, rawY, startNode.id);

                if (snapTarget) {
                    currentX = snapTarget.x; currentY = snapTarget.y;
                    if (startNode.x !== currentX && startNode.y !== currentY) {
                        cornerX = isHorizontal ? currentX : startNode.x; cornerY = isHorizontal ? startNode.y : currentY;
                    }
                }
                setDrawingEdge({ ...drawingEdge, x: currentX, y: currentY, cornerX, cornerY, snapTarget });
            };

            const handlePointerUp = (e) => {
                if (!useLayout) return;
                if (draggingNodeId || draggingEdgeId) { setDraggingNodeId(null); setDraggingEdgeId(null); return; }
                if (!drawingEdge) return;
                
                let { x, y, rawX, rawY } = getMousePos(e);
                const startNode = nodes.find(n => n.id === drawingEdge.startNodeId);
                if (!startNode) return;

                const isHorizontal = Math.abs(rawX - startNode.x) > Math.abs(rawY - startNode.y);
                let currentX = isHorizontal ? x : startNode.x, currentY = isHorizontal ? startNode.y : y;
                let cornerX = null, cornerY = null;
                let finalSnapTarget = findSnapTarget(rawX, rawY, startNode.id);

                if (finalSnapTarget) {
                    currentX = finalSnapTarget.x; currentY = finalSnapTarget.y;
                    if (startNode.x !== currentX && startNode.y !== currentY) {
                        cornerX = isHorizontal ? currentX : startNode.x; 
                        cornerY = isHorizontal ? startNode.y : currentY;
                    }
                }

                let newNodes = [...nodes], newEdges = [...edges], lastEndId = startNode.id;

                if (cornerX !== null) {
                    const cornerNode = { id: `joint-${Date.now()}-c`, type: 'joint', x: cornerX, y: cornerY, data: {} };
                    newNodes.push(cornerNode); newEdges.push({ id: `edge-${Date.now()}-c`, from: lastEndId, to: cornerNode.id });
                    lastEndId = cornerNode.id;
                }

                let targetNodeId;
                if (finalSnapTarget) {
                    if (finalSnapTarget.type === 'node') targetNodeId = finalSnapTarget.node.id;
                    else {
                        const splitEdge = finalSnapTarget.edge;
                        const splitJoint = { id: `joint-${Date.now()}-s`, type: 'joint', x: currentX, y: currentY, data: {} };
                        newNodes.push(splitJoint);
                        newEdges = newEdges.filter(e => e.id !== splitEdge.id);
                        newEdges.push({ id: `edge-${Date.now()}-s1`, from: splitEdge.from, to: splitJoint.id });
                        newEdges.push({ id: `edge-${Date.now()}-s2`, from: splitJoint.id, to: splitEdge.to });
                        targetNodeId = splitJoint.id;
                    }
                } else {
                    const endJoint = { id: `joint-${Date.now()}-e`, type: 'joint', x: currentX, y: currentY, data: {} };
                    newNodes.push(endJoint); targetNodeId = endJoint.id;
                }

                if (lastEndId !== targetNodeId) newEdges.push({ id: `edge-${Date.now()}-e`, from: lastEndId, to: targetNodeId });

                setNodes(newNodes); setEdges(newEdges); setDrawingEdge(null); setTool('select');
            };

            const handleNodePointerDown = (e, id) => {
                if (!useLayout) return;
                e.stopPropagation();
                if (tool === 'select') { setSelectedEdgeId(null); setSelectedNodeId(id); setDraggingNodeId(id); } 
                else if (tool === 'line' && !drawingEdge) {
                    const node = nodes.find(n => n.id === id);
                    setDrawingEdge({ startNodeId: id, x: node.x, y: node.y, cornerX: null, cornerY: null, snapTarget: null });
                }
            };

            const handleEdgePointerDown = (e, id) => {
                if (!useLayout) return;
                e.stopPropagation();
                if (tool === 'select') { setSelectedNodeId(null); setSelectedEdgeId(id); setDraggingEdgeId(id); }
            };

            const deleteSelected = () => {
                if (selectedNodeId) {
                    setNodes(nodes.filter(n => n.id !== selectedNodeId));
                    setEdges(edges.filter(e => e.from !== selectedNodeId && e.to !== selectedNodeId));
                    setSelectedNodeId(null);
                } else if (selectedEdgeId) {
                    setEdges(edges.filter(e => e.id !== selectedEdgeId));
                    setSelectedEdgeId(null);
                }
            };

            // --- 노드 데이터 업데이트 및 계산 로직 ---
            const updateNodeData = (field, value) => {
                if (!selectedNodeId) return;
                setNodes(prev => prev.map(n => {
                    if (n.id === selectedNodeId) {
                        let newData = { ...n.data, [field]: value };
                        if (field === 'hoodType' && value !== 'enclosure') newData.isPermitted = false;
                        if (['hoodType', 'materialState', 'isPermitted'].includes(field) || (field === 'hoodType' && newData.isPermitted)) {
                            newData.controlVelocity = getAutoControlVelocity(newData.hoodType, newData.materialState, newData.isPermitted || false);
                        }
                        // 공기정화장치 유무 해제 시 입력값 초기화
                        if (field === 'hasPurifier' && !value) {
                            newData.purifierType = "bag_filter";
                            newData.purifierDiffPress = "";
                        }
                        return { ...n, data: newData };
                    }
                    return n;
                }));
            };

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => updateNodeData('photo', ev.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleReviewPhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setOverallReviewImage(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };
            
            // 데이터 연산 Memoization
            const calculateResult = (data) => {
                const { hoodType, distanceX, controlVelocity, measuredControlVelocity, shape, width, height, diameter, measuredVelocity, openingWidth, openingHeight } = data;
                let area = shape === 'rect' ? (parseFloat(width) || 0) * (parseFloat(height) || 0) : Math.PI * Math.pow(((parseFloat(diameter) || 0) / 1000) / 2, 2);
                const vc = parseFloat(controlVelocity) || 0, vmc = parseFloat(measuredControlVelocity) || 0, vm = parseFloat(measuredVelocity) || 0, x = parseFloat(distanceX) || 0;
                
                let openingArea = (parseFloat(openingWidth) || 0) * (parseFloat(openingHeight) || 0);
                let requiredQ = hoodType === 'enclosure' ? 60 * vc * openingArea : 60 * vc * (10 * Math.pow(x, 2) + area);
                const currentQ = 60 * vm * area;

                const isVelocityGood = vmc >= vc;
                const isVolumeGood = currentQ >= requiredQ;
                const isGood = isVelocityGood && isVolumeGood && currentQ > 0;

                return { 
                    area: area.toFixed(3), openingArea: openingArea.toFixed(3), 
                    requiredQ: requiredQ.toFixed(2), currentQ: currentQ.toFixed(2), 
                    isVelocityGood, isVolumeGood, isGood 
                };
            };

            const hoodsData = useMemo(() => {
                return nodes.filter(n => n.type === 'hood').map(n => {
                    const calc = calculateResult(n.data);
                    return { ...n, calc };
                });
            }, [nodes]);

            const fansData = useMemo(() => {
                return nodes.filter(n => n.type === 'fan').map(fan => {
                    const connectedHoods = hoodsData.filter(h => h.data.manualFanName && h.data.manualFanName.trim() === fan.data.fanName.trim());
                    const sumCurrentQ = connectedHoods.reduce((sum, h) => sum + parseFloat(h.calc.currentQ || 0), 0);
                    const sumRequiredQ = connectedHoods.reduce((sum, h) => sum + parseFloat(h.calc.requiredQ || 0), 0); 
                    
                    const rQ = parseFloat(fan.data.ratedQ) || 0, mQ = parseFloat(fan.data.measuredQ) || 0;
                    const eff = rQ > 0 ? (mQ / rQ) * 100 : 0;
                    const suctionRatio = mQ > 0 ? (sumCurrentQ / mQ) * 100 : (rQ > 0 ? (sumCurrentQ / rQ) * 100 : 0);

                    let status = '-';
                    if (rQ > 0 && mQ > 0) {
                        if (eff >= 80) status = '양호';
                        else if (eff >= 60) status = '미흡';
                        else status = '불량';
                    }

                    // --- 공기정화장치 차압 판정 ---
                    let purifierStatus = '-';
                    if (fan.data.hasPurifier && fan.data.purifierType && fan.data.purifierDiffPress !== "") {
                        const pType = PURIFIER_TYPES.find(p => p.id === fan.data.purifierType);
                        const dp = parseFloat(fan.data.purifierDiffPress);
                        if (pType) {
                            if (dp < pType.min) purifierStatus = '미흡(미만)';
                            else if (dp > pType.max) purifierStatus = '미흡(초과)';
                            else purifierStatus = '양호';
                        }
                    }

                    return { ...fan, calc: { connectedHoods, sumCurrentQ, sumRequiredQ, eff, suctionRatio, status, purifierStatus } };
                });
            }, [nodes, hoodsData]);

            // --- AI 스마트 진단 로직 ---
            const runSmartDiagnostics = () => {
                let diagnostics = [];
                
                const hazardNodes = nodes.filter(n => n.type === 'hazard');
                
                if (hoodsData.length === 0 && fansData.length === 0 && hazardNodes.length === 0) {
                    setSmartDiagnostics([{
                        type: 'system', name: '데이터 부족', status: 'info',
                        issues: ['입력된 후드, 송풍기 또는 유해물질 데이터가 없습니다.'],
                        solutions: ['Lay-out 메뉴 또는 목록에서 객체를 추가하고 제원을 상세히 입력해 주세요.'],
                        references: []
                    }]);
                    return;
                }

                // 1. 후드 성능 진단
                let hoodIssueMap = {
                    velocity: { hoods: [], issue: "측정 제어풍속 미달", sols: new Set(), refs: new Set() },
                    volume: { hoods: [], issue: "필요 배기량 대비 현재 배기량 부족", sols: new Set(), refs: new Set() },
                    particle: { hoods: [], issue: "후드 형태 부적합 (캐노피)", sols: new Set(), refs: new Set() }
                };
                let goodHoodsList = [];

                hoodsData.forEach(hood => {
                    const { data, calc } = hood;
                    if (!calc.isGood) {
                        if (!calc.isVelocityGood) {
                            hoodIssueMap.velocity.hoods.push(data.processName);
                            if (data.hoodType !== 'enclosure') {
                                hoodIssueMap.velocity.sols.add("외부식 후드는 제어거리의 제곱에 비례해 필요 배기량이 급증하므로, 제어거리를 최소화하거나 포위식으로 변경 권장.");
                                hoodIssueMap.velocity.refs.add('ACGIH 산업환기 매뉴얼');
                            } else {
                                hoodIssueMap.velocity.sols.add("포위식 후드의 개구면적을 최소화(가림막 설치 등)하여 유입 속도 증가 필요.");
                                hoodIssueMap.velocity.refs.add('KOSHA GUIDE W-1-2019');
                            }
                            hoodIssueMap.velocity.refs.add('산업안전보건기준에 관한 규칙 (별표 16)');
                        }
                        if (!calc.isVolumeGood) {
                            hoodIssueMap.volume.hoods.push(data.processName);
                            if (data.manualFanName) {
                                hoodIssueMap.volume.sols.add("덕트 마찰 손실 과다 또는 곡관부 압력 손실 점검. 필요 시 송풍기 용량 증대 요망.");
                            } else {
                                hoodIssueMap.volume.sols.add("송풍기 매핑 누락. 배기 시스템 밸런스 점검 필요.");
                            }
                            hoodIssueMap.volume.refs.add('KOSHA GUIDE W-1-2019');
                        }
                        if (data.hoodType === 'ext_up' && data.materialState === 'particle') {
                            hoodIssueMap.particle.hoods.push(data.processName);
                            hoodIssueMap.particle.sols.add("입자상 물질은 비산 방향 흡인이 원칙이므로 측방형/하방형 후드로 구조 변경 강력 권고.");
                            hoodIssueMap.particle.refs.add('KOSHA GUIDE W-1-2019');
                        }
                    } else {
                        goodHoodsList.push(data.processName);
                    }
                });

                if (hoodIssueMap.velocity.hoods.length > 0) {
                    diagnostics.push({
                        type: 'hood', name: '제어풍속 미달', status: 'danger',
                        issues: [`[${hoodIssueMap.velocity.hoods.join(', ')}] 측정 제어풍속이 법정 기준에 미달합니다.`],
                        solutions: Array.from(hoodIssueMap.velocity.sols),
                        references: Array.from(hoodIssueMap.velocity.refs)
                    });
                }
                if (hoodIssueMap.volume.hoods.length > 0) {
                    diagnostics.push({
                        type: 'hood', name: '배기량 부족', status: 'danger',
                        issues: [`[${hoodIssueMap.volume.hoods.join(', ')}] 현재 배기량이 필요 배기량에 미달합니다.`],
                        solutions: Array.from(hoodIssueMap.volume.sols),
                        references: Array.from(hoodIssueMap.volume.refs)
                    });
                }
                if (hoodIssueMap.particle.hoods.length > 0) {
                    diagnostics.push({
                        type: 'hood', name: '후드 형태 부적합', status: 'danger',
                        issues: [`[${hoodIssueMap.particle.hoods.join(', ')}] 분진(입자상) 공정에 캐노피 후드가 설치되었습니다.`],
                        solutions: Array.from(hoodIssueMap.particle.sols),
                        references: Array.from(hoodIssueMap.particle.refs)
                    });
                }
                if (goodHoodsList.length > 0) {
                    diagnostics.push({
                        type: 'hood', name: '기준 만족', status: 'success', issues: [],
                        solutions: [`[${goodHoodsList.join(', ')}] 제어풍속 및 배기량이 법적/기술적 기준을 완벽하게 만족합니다.`],
                        references: ['산업안전보건기준에 관한 규칙', 'KOSHA GUIDE W-1-2019']
                    });
                }

                // 1-5. 국소배기장치 미설치(유해물질) 공정 진단
                if (hazardNodes.length > 0) {
                    let issues = [];
                    hazardNodes.forEach(h => {
                        const pName = h.data.processName || '미상 공정';
                        const hName = h.data.hazardName || '미상 유해물질';
                        issues.push(`[${pName}] 공정은 관리대상 유해물질(${hName})을 취급하고 있으나, 현재 국소배기장치가 미설치된 상태입니다.`);
                    });

                    diagnostics.push({
                        type: 'system', name: '국소배기장치 미설치 공정', status: 'danger',
                        issues: issues,
                        solutions: [
                            '작업자 건강 장해 예방 및 산업안전보건법령 준수를 위해, 해당 공정의 비산 특성에 맞는 적절한 국소배기장치(포위식 또는 외부식 후드 등)를 조속히 신규 설치할 것을 강력히 권고합니다.',
                            '설비 신설 전까지는 전체환기장치 가동을 극대화하고, 작업자에게 적격한 호흡용 보호구(방독마스크 등)를 반드시 지급 및 착용토록 관리하시기 바랍니다.'
                        ],
                        references: ['산업안전보건기준에 관한 규칙 제422조 (관리대상 유해물질과 관련된 설비의 배기장치)']
                    });
                }

                // 2. 육안평가 종합 진단
                let visualIssuesGrouped = {};
                visualGroups.forEach(group => {
                    group.items.forEach(item => {
                        if (evaluationData.visual[item.id] === '미흡') {
                            const targets = evaluationData.visualTargets?.[item.id] || [];
                            const targetNames = targets.map(tId => {
                                const node = nodes.find(n => n.id === tId);
                                return node ? node.data.processName : '';
                            }).filter(Boolean);
                            
                            const targetStr = targetNames.length > 0 ? targetNames.join(', ') : '전체(또는 미지정)';
                            const issueText = `[${group.name.replace('\n', '')}] ${item.name}`;
                            
                            if (!visualIssuesGrouped[issueText]) visualIssuesGrouped[issueText] = { targets: new Set(), desc: item.desc };
                            targetNames.length > 0 ? targetNames.forEach(tn => visualIssuesGrouped[issueText].targets.add(tn)) : visualIssuesGrouped[issueText].targets.add('전체');
                        }
                    });
                });

                const visualKeys = Object.keys(visualIssuesGrouped);
                if (visualKeys.length > 0) {
                    let combinedIssues = [];
                    visualKeys.forEach(k => {
                        const targetArr = Array.from(visualIssuesGrouped[k].targets);
                        combinedIssues.push(`[${targetArr.join(', ')}] ➔ ${k} 불량 (${visualIssuesGrouped[k].desc})`);
                    });
                    diagnostics.push({
                        type: 'system', name: '육안평가 종합 결함', status: 'danger',
                        issues: combinedIssues,
                        solutions: ['지적된 설비의 물리적 파손 및 결함을 즉시 보수하십시오.', '연결부 및 댐퍼 불량은 누기(Leak)를 유발하여 시스템 전체의 배기 효율을 급감시킵니다.'],
                        references: ['KOSHA GUIDE W-1-2019 (유지관리)']
                    });
                }

                // 3. 기류 평가 진단
                if (evaluationData.airflow.status === '미흡') {
                    const targetNames = (evaluationData.airflowTargets || []).map(id => {
                        const node = nodes.find(n => n.id === id);
                        return node ? node.data.processName : '';
                    }).filter(Boolean);
                    const targetStr = targetNames.length > 0 ? targetNames.join(', ') : '일부 후드(미지정)';
                    
                    let issues = [];
                    if (!evaluationData.airflow.speedChecked) issues.push("흡인 속도가 현저히 느리거나 확산됨.");
                    if (!evaluationData.airflow.statusChecked) issues.push("연기가 원활하게 흡인되지 않고 외부로 누출됨.");
                    if (issues.length === 0) issues.push("기류 흐름 패턴 불량 (스모크 테스트 기준 미달).");

                    diagnostics.push({
                        type: 'system', name: `기류평가 불량 [${targetStr}]`, status: 'danger',
                        issues: issues,
                        solutions: ['제어풍속을 만족하더라도 현장 교란기류(선풍기, 외부바람 등)에 의해 기류가 이탈할 수 있습니다. 방풍벽(Flange) 설치 또는 교란기류 원인을 제거하십시오.'],
                        references: ['KOSHA GUIDE W-1-2019']
                    });
                }

                // 4. 송풍기 및 공기정화장치 효율 진단
                fansData.forEach(fan => {
                    const { data, calc } = fan;
                    let issues = [];
                    let solutions = [];
                    let refs = new Set();

                    // 송풍기 효율 평가
                    if (calc.status !== '양호' && calc.status !== '-') {
                        issues.push(`송풍기 효율이 ${calc.status}(${calc.eff.toFixed(1)}%) 상태입니다.`);
                        if (calc.suctionRatio > 100) {
                            issues.push(`연결된 후드들의 현재 배기량 합계(${calc.sumCurrentQ.toFixed(1)} CMM)가 송풍기 정격 풍량(${data.ratedQ} CMM)을 초과합니다.`);
                            solutions.push(`송풍기 과부하 상태입니다. 정격 용량이 더 큰 송풍기로 교체하거나, 공정 가동 스케줄을 분리하여 동시 사용률을 낮추십시오.`);
                            refs.add('ACGIH 산업환기 매뉴얼 (시스템 밸런싱)');
                        } else {
                            solutions.push(`풍량 저하의 주원인인 V-벨트 슬립(헐거움), 임펠러 마모 또는 부식, 배기구 측 압력 상승을 점검하십시오.`);
                            refs.add('KOSHA GUIDE W-1-2019');
                        }
                    }

                    const fanCapacity = parseFloat(data.measuredQ) > 0 ? parseFloat(data.measuredQ) : parseFloat(data.ratedQ);
                    if (fanCapacity > 0 && calc.sumRequiredQ > fanCapacity) {
                        issues.push(`연결된 후드들의 법정 필요 배기량 합계(${calc.sumRequiredQ.toFixed(1)} CMM)가 현재 송풍기 용량(${fanCapacity.toFixed(1)} CMM)보다 큽니다.`);
                        solutions.push(`송풍기의 근본적인 용량 부족입니다. 시스템이 법적 제어풍속을 만족하려면 최소 ${calc.sumRequiredQ.toFixed(1)} CMM 이상의 송풍기(또는 인버터 상향 조정)로 교체가 시급합니다.`);
                        refs.add('산업안전보건기준에 관한 규칙');
                        refs.add('KOSHA GUIDE W-1-2019');
                    }

                    // --- 공기정화장치 평가 연동 ---
                    if (data.hasPurifier && calc.purifierStatus.includes('미흡')) {
                        const pName = PURIFIER_TYPES.find(p=>p.id===data.purifierType)?.name || '공기정화장치';
                        if (calc.purifierStatus === '미흡(미만)') {
                            issues.push(`[${pName}] 측정 차압(${data.purifierDiffPress} mmH2O)이 적정 범위 미만입니다.`);
                            solutions.push(`공기정화장치 내부 필터의 찢어짐, 파손 또는 탈락이 의심됩니다. 유해물질이 정화되지 않고 외부로 배출될 수 있으므로 내부를 즉시 점검하십시오.`);
                            refs.add('KOSHA GUIDE W-1-2019 (공기정화장치 유지관리)');
                        } else if (calc.purifierStatus === '미흡(초과)') {
                            issues.push(`[${pName}] 측정 차압(${data.purifierDiffPress} mmH2O)이 적정 범위를 초과하여 과부하 상태입니다.`);
                            solutions.push(`필터(여재)의 눈막힘 현상이 심각하여 배기 시스템 전체의 유량을 급감시키고 있습니다. 즉시 필터를 교체하거나 털어내기(탈진)를 실시하십시오.`);
                            refs.add('KOSHA GUIDE W-1-2019 (공기정화장치 유지관리)');
                        }
                    }

                    if (issues.length > 0) {
                        diagnostics.push({
                            type: 'fan', id: fan.id, name: data.fanName, status: 'danger', issues, solutions, references: Array.from(refs)
                        });
                    } else if (calc.status === '양호' && calc.sumRequiredQ <= fanCapacity && calc.purifierStatus !== '미흡(미만)' && calc.purifierStatus !== '미흡(초과)') {
                        diagnostics.push({
                            type: 'fan', id: fan.id, name: data.fanName, status: 'success', issues: [],
                            solutions: ["송풍기 효율, 처리 용량, 공기정화장치 차압 모두 시스템 안정성을 충분히 유지하고 있습니다."],
                            references: ['KOSHA GUIDE W-1-2019']
                        });
                    }
                });

                setSmartDiagnostics(diagnostics);
                showAlert("스마트 진단이 완료되었습니다.");
            };

            const selectedNode = nodes.find(n => n.id === selectedNodeId);
            const selectedNodeCalc = selectedNode?.type === 'hood' ? calculateResult(selectedNode.data) : null;
            
            const totalHoods = hoodsData.length, goodHoods = hoodsData.filter(h => h.calc.isGood).length, badHoods = totalHoods - goodHoods;
            const pieDashArray = totalHoods > 0 ? (goodHoods / totalHoods) * 100 : 0;

            const evaluatedFans = fansData.filter(f => f.calc.status !== '-');
            const totalEvalFans = evaluatedFans.length;
            const goodFans = evaluatedFans.filter(f => f.calc.status === '양호').length;
            const fairFans = evaluatedFans.filter(f => f.calc.status === '미흡').length;
            const badFans = evaluatedFans.filter(f => f.calc.status === '불량').length;
            const fanGoodPct = totalEvalFans > 0 ? (goodFans / totalEvalFans) * 100 : 0;
            const fanFairPct = totalEvalFans > 0 ? (fairFans / totalEvalFans) * 100 : 0;

            // 출력용 목차 번호 자동 생성
            let sNum = 1;
            const sIdx = {
                layout: useLayout ? sNum++ : null,
                hood: sNum++, 
                fan: fansData.length > 0 ? sNum++ : null,
                overall: (hoodsData.length > 0 || fansData.length > 0) ? sNum++ : null,
                visual: sNum++,
                smart: (smartDiagnostics && smartDiagnostics.length > 0) ? sNum++ : null,
                review: sNum++
            };

            return (
                <div id="app-container" className="flex h-screen w-full font-sans text-slate-800 bg-[#f4f6f8] relative overflow-hidden">
                    
                    {toastMessage && (
                        <div className="fixed top-5 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-2xl z-[10000] text-sm font-bold">
                            {toastMessage}
                        </div>
                    )}

                    {isGeneratingPDF && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex flex-col items-center justify-center text-white print-hide">
                            <div className="bg-white p-8 rounded-2xl shadow-2xl flex flex-col items-center text-slate-800">
                                <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <h3 className="text-xl font-bold">PDF 문서 생성 중...</h3>
                                <p className="text-sm text-slate-500 mt-2">잠시만 기다려주세요.</p>
                            </div>
                        </div>
                    )}

                    {/* --- 서명(결재란) 모달 오버레이 --- */}
                    {signModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[10000] flex items-center justify-center print-hide px-4">
                            <div className="bg-white p-6 rounded-2xl shadow-2xl flex flex-col w-full max-w-[380px]">
                                <h3 className="text-lg font-black mb-4 text-slate-800 flex items-center gap-2">
                                    <Edit2Icon className="w-5 h-5 text-[#3b82f6]" />
                                    {signModal.role === 'evaluator' ? '평가자' : signModal.role === 'manager' ? '보건관리자' : '근로자 대표'} 서명
                                </h3>
                                <p className="text-xs text-slate-500 mb-3 font-medium">아래 영역에 마우스나 터치로 서명해 주세요.</p>
                                <div className="border-2 border-dashed border-slate-300 rounded-xl mb-5 bg-slate-50 overflow-hidden relative">
                                    {/* touch-none 클래스 적용 및 이벤트 제어 추가 */}
                                    <canvas
                                        ref={signCanvasRef}
                                        width={400}
                                        height={200}
                                        className="cursor-crosshair w-full h-[150px] bg-white touch-none"
                                        onPointerDown={startDrawingSignature}
                                        onPointerMove={drawSignature}
                                        onPointerUp={stopDrawingSignature}
                                        onPointerLeave={stopDrawingSignature}
                                        style={{ touchAction: 'none' }} // 강제 스크롤 방지
                                    />
                                    <div className="absolute inset-0 pointer-events-none flex items-center justify-center opacity-10 text-2xl font-black tracking-widest select-none">
                                        SIGN HERE
                                    </div>
                                </div>
                                <div className="flex justify-between gap-2">
                                    <button onClick={clearSignature} className="px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg font-bold text-sm transition-colors">지우기</button>
                                    <div className="flex gap-2">
                                        <button onClick={() => setSignModal({isOpen: false, role: null})} className="px-4 py-2.5 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-lg font-bold text-sm transition-colors">취소</button>
                                        <button onClick={saveSignature} className="px-5 py-2.5 bg-[#3b82f6] hover:bg-blue-600 text-white rounded-lg font-bold text-sm transition-colors shadow-sm">저장</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleFileUpload} />

                    {/* Left Sidebar (Desktop Only) */}
                    <aside id="dashboard-sidebar" className="hidden lg:flex flex-col w-64 xl:w-72 bg-white border-r border-slate-200 z-20 flex-shrink-0 h-full shadow-sm print-hide">
                        <div className="bg-[#3b82f6] text-white p-5 flex items-center gap-3">
                            <div className="w-12 h-12 bg-emerald-400 rounded-full flex items-center justify-center text-sm font-black shadow-inner border-2 border-white/20">보건</div>
                            <div>
                                <div className="font-bold text-base tracking-tight">연보건</div>
                            </div>
                        </div>

                        <div className="p-4 border-b border-slate-100">
                            <div className="relative">
                                <SearchIcon className="w-4 h-4 absolute left-3 top-2.5 text-slate-400" />
                                <input type="text" placeholder="메뉴 검색" className="w-full bg-slate-100 rounded-full py-2 pl-9 pr-4 text-sm font-medium text-slate-700 outline-none focus:ring-2 focus:ring-[#3b82f6] transition-shadow placeholder:text-slate-400" />
                            </div>
                        </div>

                        <nav className="flex-1 overflow-y-auto py-4 px-3 space-y-1 hide-scroll">
                            {APP_MENUS.map(menu => {
                                const isActive = activeMenu === menu.id;
                                return (
                                    <button 
                                        key={menu.id}
                                        onClick={() => setActiveMenu(menu.id)}
                                        className={`w-full flex items-center gap-3 px-3 py-3 text-sm font-bold rounded-lg transition-colors relative ${isActive ? 'text-[#3b82f6] bg-blue-50' : 'text-slate-500 hover:bg-slate-50'}`}
                                    >
                                        {isActive && <div className="absolute left-0 top-1/2 transform -translate-y-1/2 w-1 h-6 bg-[#3b82f6] rounded-r-md"></div>}
                                        {menu.icon}
                                        <span className="flex-1 text-left">{menu.label}</span>
                                    </button>
                                );
                            })}
                        </nav>
                        
                        <div className="p-4 border-t border-slate-100 text-center">
                            <p className="text-[10px] text-slate-400 font-medium tracking-tight">
                                © Copyright 2022582@kiha21.or.kr. All rights reserved.
                            </p>
                        </div>
                    </aside>

                    {/* Mobile Only Top Header */}

                        <div className="flex gap-2">

                        </div>
                    </header>

                    <main id="dashboard-main" className="flex-1 flex flex-col h-full overflow-hidden relative pt-[60px] lg:pt-0">

                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => fileInputRef.current.click()} className="px-4 py-2 bg-white hover:bg-slate-50 border border-slate-200 rounded-full text-slate-600 text-sm font-bold flex items-center gap-2 transition shadow-sm">
                                    <Upload className="w-4 h-4"/> 불러오기

                                <button onClick={handleSaveFile} className="px-4 py-2 bg-[#e0e7ff] hover:bg-indigo-200 text-indigo-700 rounded-full text-sm font-bold flex items-center gap-2 transition shadow-sm">

                        {/* Mobile Nav Tabs (Under Header) */}
                        {mobileTab === 'edit' && (
                            <div id="mobile-nav-scroll" className="lg:hidden flex overflow-x-auto bg-white border-b border-slate-200 hide-scroll flex-shrink-0">
                                {APP_MENUS.map(menu => (
                                    <button 
                                        key={menu.id}
                                        onClick={() => setActiveMenu(menu.id)}
                                        className={`px-4 py-3 text-xs font-bold whitespace-nowrap border-b-2 transition-colors ${activeMenu === menu.id ? 'border-[#3b82f6] text-[#3b82f6]' : 'border-transparent text-slate-500'}`}
                                    >
                                        {menu.label}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* Tool Layout Container */}
                        <div id="tool-container" className="flex-1 flex overflow-hidden p-0 lg:p-6 lg:gap-6 relative bg-slate-50">
                            
                            {/* --- 좌측 패널 (입력 폼) --- */}
                            <div id="input-panel" className={`w-full lg:w-[400px] xl:w-[450px] flex-shrink-0 bg-white lg:rounded-2xl lg:shadow-sm lg:border border-slate-200 flex flex-col h-full print-hide ${mobileTab === 'edit' ? 'flex' : 'hidden lg:flex'}`}>
                                
                                <div className="p-5 border-b border-slate-100 flex-shrink-0 bg-slate-50/50 lg:rounded-t-2xl">
                                    <h2 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                        {APP_MENUS.find(m => m.id === activeMenu)?.icon}
                                        {APP_MENUS.find(m => m.id === activeMenu)?.label}
                                    </h2>
                                </div>

                                <div className="p-5 space-y-6 flex-1 overflow-y-auto hide-scroll">
                                    
                                    {activeMenu === 'info' && (
                                        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-2">
                                            <div className="space-y-3">
                                                <label className="block text-xs font-bold text-slate-600">사업장 명칭</label>
                                                <div className="relative">
                                                    <Factory className="absolute left-3 top-3 w-5 h-5 text-slate-400" />
                                                    <input type="text" placeholder="사업장 명칭을 입력하세요" 
                                                        value={factoryName} onChange={e => setFactoryName(e.target.value)}
                                                        className="w-full pl-10 p-2.5 border border-slate-200 bg-slate-50 rounded-xl focus:bg-white focus:ring-2 focus:ring-[#3b82f6] outline-none font-bold text-slate-800 transition-all" />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-3">
                                                    <label className="block text-xs font-bold text-slate-600">대표자 성명</label>
                                                    <input type="text" placeholder="대표자 성명" 
                                                        value={representativeName} onChange={e => setRepresentativeName(e.target.value)}
                                                        className="w-full p-2.5 border border-slate-200 bg-slate-50 rounded-xl focus:bg-white focus:ring-2 focus:ring-[#3b82f6] outline-none text-sm font-bold text-slate-800 transition-all" />
                                                </div>
                                                <div className="space-y-3">
                                                    <label className="block text-xs font-bold text-slate-600">업종</label>
                                                    <input type="text" placeholder="예: 제조업" 
                                                        value={industryType} onChange={e => setIndustryType(e.target.value)}
                                                        className="w-full p-2.5 border border-slate-200 bg-slate-50 rounded-xl focus:bg-white focus:ring-2 focus:ring-[#3b82f6] outline-none text-sm font-bold text-slate-800 transition-all" />
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                <label className="block text-xs font-bold text-slate-600">소재지 (주소)</label>
                                                <input type="text" placeholder="소재지(주소)" 
                                                    value={address} onChange={e => setAddress(e.target.value)}
                                                    className="w-full p-2.5 border border-slate-200 bg-slate-50 rounded-xl focus:bg-white focus:ring-2 focus:ring-[#3b82f6] outline-none text-sm font-bold text-slate-800 transition-all" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 border-t border-slate-100 pt-4">
                                                <div className="space-y-3">
                                                    <label className="block text-xs font-bold text-slate-600">측정 시작일</label>
                                                    <input type="date" value={measurementDate} onChange={e => setMeasurementDate(e.target.value)}
                                                        className="w-full p-2.5 border border-slate-200 bg-slate-50 rounded-xl focus:bg-white focus:ring-2 focus:ring-[#3b82f6] outline-none text-sm font-bold text-slate-800 transition-all" />
                                                </div>
                                                <div className="space-y-3">
                                                    <label className="block text-xs font-bold text-slate-600">측정 기간</label>
                                                    <select value={measurementDuration} onChange={e => setMeasurementDuration(e.target.value)}
                                                        className="w-full p-2.5 border border-slate-200 bg-slate-50 rounded-xl focus:bg-white focus:ring-2 focus:ring-[#3b82f6] outline-none text-sm font-bold text-slate-800 transition-all">
                                                        <option value="1">1일간</option>
                                                        <option value="2">2일간</option>
                                                        <option value="3">3일간</option>
                                                        <option value="4">4일간</option>
                                                        <option value="5">5일간</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-between mt-6 bg-blue-50 p-4 rounded-xl border border-blue-100">
                                                <div className="flex flex-col">
                                                    <span className="text-sm font-bold text-slate-800">도면(Lay-out) 사용</span>
                                                    <span className="text-[10px] text-slate-500">끄면 도면 없이 목록 관리 모드로 전환됩니다.</span>
                                                </div>
                                                <label className="relative inline-flex items-center cursor-pointer">
                                                    <input type="checkbox" className="sr-only peer" checked={useLayout} onChange={e => {
                                                        setUseLayout(e.target.checked);
                                                        if (!e.target.checked) setTool('select');
                                                    }} />
                                                    <div className="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#3b82f6]"></div>
                                                </label>
                                            </div>
                                        </div>
                                    )}

                                    {activeMenu === 'layout' && (
                                        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-2">
                                            {useLayout ? (
                                                <div>
                                                    <h3 className="text-sm font-bold text-slate-600 mb-3 flex justify-between items-center">
                                                        도면 도구
                                                    </h3>
                                                    <div className="grid grid-cols-5 gap-2 bg-slate-50 p-2 rounded-xl border border-slate-200">
                                                        <button onClick={() => setTool('select')} className={`flex flex-col items-center p-2.5 rounded-lg transition-colors ${tool === 'select' ? 'bg-white text-[#3b82f6] shadow-sm font-bold' : 'text-slate-500 hover:bg-slate-200 font-medium'}`}>
                                                            <MousePointer2 className="w-5 h-5 mb-1" /> <span className="text-[10px]">선택/이동</span>
                                                        </button>
                                                        <button onClick={() => setTool('fan')} className={`flex flex-col items-center p-2.5 rounded-lg transition-colors ${tool === 'fan' ? 'bg-white text-indigo-600 shadow-sm font-bold' : 'text-slate-500 hover:bg-slate-200 font-medium'}`}>
                                                            <Fan className="w-5 h-5 mb-1" /> <span className="text-[10px]">송풍기</span>
                                                        </button>
                                                        <button onClick={() => setTool('hood')} className={`flex flex-col items-center p-2.5 rounded-lg transition-colors ${tool === 'hood' ? 'bg-white text-[#3b82f6] shadow-sm font-bold' : 'text-slate-500 hover:bg-slate-200 font-medium'}`}>
                                                            <Square className="w-5 h-5 mb-1" /> <span className="text-[10px]">후드</span>
                                                        </button>
                                                        <button onClick={() => setTool('hazard')} className={`flex flex-col items-center p-2.5 rounded-lg transition-colors ${tool === 'hazard' ? 'bg-white text-orange-500 shadow-sm font-bold' : 'text-slate-500 hover:bg-slate-200 font-medium'}`}>
                                                            <AlertTriangle className="w-5 h-5 mb-1" /> <span className="text-[10px]">유해물질</span>
                                                        </button>
                                                        <button onClick={() => setTool('line')} className={`flex flex-col items-center p-2.5 rounded-lg transition-colors ${tool === 'line' ? 'bg-white text-[#3b82f6] shadow-sm font-bold' : 'text-slate-500 hover:bg-slate-200 font-medium'}`}>
                                                            <Minus className="w-5 h-5 mb-1" /> <span className="text-[10px]">덕트</span>
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="space-y-5">
                                                    <div>
                                                        <h3 className="text-sm font-bold text-slate-600 mb-3 flex justify-between items-center">
                                                            송풍기 목록
                                                            <button onClick={() => createFan()} className="text-[10px] bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-full font-bold hover:bg-indigo-100 transition-colors">+ 추가</button>
                                                        </h3>
                                                        <div className="grid grid-cols-2 gap-2">
                                                            {nodes.filter(n => n.type === 'fan').map(n => (
                                                                <button key={n.id} onClick={() => setSelectedNodeId(n.id)} className={`p-2.5 text-xs font-bold rounded-xl border text-left truncate transition-all ${selectedNodeId === n.id ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-slate-50 text-slate-700 border-slate-200 hover:bg-white hover:border-indigo-300'}`}>
                                                                    <Fan className="w-3.5 h-3.5 inline mr-1.5"/>{n.data.fanName}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-sm font-bold text-slate-600 mb-3 flex justify-between items-center">
                                                            후드 목록

                                                            {nodes.filter(n => n.type === 'hood').map(n => (

                                                                    <Square className="w-3.5 h-3.5 inline mr-1.5"/>{n.data.processName}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
