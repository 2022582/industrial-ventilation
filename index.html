<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국소배기 전문가용 진단 앱</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ✅ 인쇄(A4) 최적화를 위한 전용 CSS ✅ */
    @media print {
      @page {
        size: A4 portrait;
        margin: 15mm;
      }
      body { 
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact; 
        background-color: white !important; 
      }
      html, body, #root {
        height: auto !important;
        overflow: visible !important;
      }
      .page-break-inside-avoid { 
        page-break-inside: avoid; 
        break-inside: avoid; 
      }
      ::-webkit-scrollbar { display: none; }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    const Factory = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></svg>;
    const MousePointer2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/></svg>;
    const Fan = ({className, x, y, width, height}) => <svg className={className||""} x={x} y={y} width={width||24} height={height||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.827 16.379a6.082 6.082 0 0 1-8.618-7.002l5.412 1.45a6.082 6.082 0 0 1 7.002-8.618l-1.45 5.412a6.082 6.082 0 0 1 8.618 7.002l-5.412-1.45a6.082 6.082 0 0 1-7.002 8.618l1.45-5.412Z"/><path d="M12 12v.01"/></svg>;
    const Square = ({className, x, y, width, height}) => <svg className={className||""} x={x} y={y} width={width||24} height={height||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>;
    const Minus = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>;
    const Trash2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const Camera = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
    const CheckCircle2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const XCircle = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const Printer = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const Activity = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;

    function App() {
      const [factoryName, setFactoryName] = useState("");
      const [useLayout, setUseLayout] = useState(true); 
      const [nodes, setNodes] = useState([]);
      const [edges, setEdges] = useState([]);
      
      const [tool, setTool] = useState("select"); 
      const [selectedNodeId, setSelectedNodeId] = useState(null);
      const [selectedEdgeId, setSelectedEdgeId] = useState(null);
      
      const [draggingNodeId, setDraggingNodeId] = useState(null);
      const [draggingEdgeId, setDraggingEdgeId] = useState(null);

      const [drawingEdge, setDrawingEdge] = useState(null);
      const svgRef = useRef(null);

      // 법정 제어풍속 산출 (KOSHA)
      const getAutoControlVelocity = (type, state, isPermitted) => {
        if (type === 'enclosure' && isPermitted) return state === 'gas' ? 0.5 : 1.0;
        if (state === 'gas') {
          if (type === 'enclosure') return 0.4;
          if (type === 'ext_up') return 1.0;
          return 0.5;
        } else {
          if (type === 'enclosure') return 0.7;
          if (type === 'ext_up') return 1.2;
          return 1.0;
        }
      };

      // 마우스 좌표 및 스냅
      const getMousePos = (e) => {
        if (!useLayout || !svgRef.current) return { rawX: 0, rawY: 0, x: 0, y: 0 };
        const svg = svgRef.current;
        const CTM = svg.getScreenCTM();
        let clientX = e.clientX, clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
        }
        const rawX = (clientX - CTM.e) / CTM.a;
        const rawY = (clientY - CTM.f) / CTM.d;
        return { rawX, rawY, x: Math.round((rawX - 10) / 20) * 20 + 10, y: Math.round((rawY - 10) / 20) * 20 + 10 };
      };

      const findSnapTarget = (rawX, rawY, excludeNodeId) => {
        const snapNode = nodes.find(n => n.id !== excludeNodeId && Math.abs(n.x - rawX) < 20 && Math.abs(n.y - rawY) < 20);
        if (snapNode) return { type: 'node', node: snapNode, x: snapNode.x, y: snapNode.y };

        for (let e of edges) {
          if (e.from === excludeNodeId || e.to === excludeNodeId) continue;
          const fromNode = nodes.find(n => n.id === e.from);
          const toNode = nodes.find(n => n.id === e.to);
          if (!fromNode || !toNode) continue;

          const isHorizontal = Math.abs(fromNode.y - toNode.y) < 1;
          const isVertical = Math.abs(fromNode.x - toNode.x) < 1;

          if (isHorizontal && rawX >= Math.min(fromNode.x, toNode.x) && rawX <= Math.max(fromNode.x, toNode.x) && Math.abs(rawY - fromNode.y) < 20) 
            return { type: 'edge', edge: e, x: Math.round((rawX - 10) / 20) * 20 + 10, y: fromNode.y };
          else if (isVertical && rawY >= Math.min(fromNode.y, toNode.y) && rawY <= Math.max(fromNode.y, toNode.y) && Math.abs(rawX - fromNode.x) < 20) 
            return { type: 'edge', edge: e, x: fromNode.x, y: Math.round((rawY - 10) / 20) * 20 + 10 };
        }
        return null;
      };

      // 생성 함수
      const createHood = (x = 110, y = 110) => {
        const newNode = {
          id: `hood-${Date.now()}`, type: 'hood', x, y,
          data: {
            processName: `공정-${nodes.filter(n => n.type === 'hood').length + 1}`, photo: null, 
            hoodType: "enclosure", materialState: "gas", isPermitted: false, distanceX: 0, 
            controlVelocity: 0.4, measuredControlVelocity: "", shape: "rect",
            width: "", height: "", diameter: "", measuredVelocity: "",
            openingWidth: "", openingHeight: "", manualFanId: ""
          }
        };
        setNodes([...nodes, newNode]);
        setSelectedNodeId(newNode.id);
      };

      const createFan = (x = 210, y = 110) => {
        const newNode = {
          id: `fan-${Date.now()}`, type: 'fan', x, y,
          data: {
            fanName: `송풍기-${nodes.filter(n => n.type === 'fan').length + 1}`,
            ratedQ: "", ratedSP: "", measuredQ: "", measuredSP: ""
          }
        };
        setNodes([...nodes, newNode]);
        setSelectedNodeId(newNode.id);
      };

      const handlePointerDown = (e) => {
        if (!useLayout) return;
        const { x, y } = getMousePos(e);
        
        if (tool === 'select') {
          setSelectedNodeId(null); setSelectedEdgeId(null);
        } else if (tool === 'hood') {
          createHood(x, y); setTool('select');
        } else if (tool === 'fan') {
          createFan(x, y); setTool('select');
        } else if (tool === 'line') {
          const snapTarget = findSnapTarget(x, y, null);
          let startNodeId = snapTarget && snapTarget.type === 'node' ? snapTarget.node.id : (() => {
            const n = { id: `joint-${Date.now()}`, type: 'joint', x, y, data: {} };
            setNodes([...nodes, n]); return n.id;
          })();
          setDrawingEdge({ startNodeId, x, y, cornerX: null, cornerY: null, snapTarget: null });
        }
      };

      const handlePointerMove = (e) => {
        if (!useLayout) return;
        let { x, y, rawX, rawY } = getMousePos(e);

        if (draggingNodeId) {
          setNodes(prev => prev.map(n => n.id === draggingNodeId ? { ...n, x, y } : n)); return;
        }
        if (draggingEdgeId) {
          const edge = edges.find(ed => ed.id === draggingEdgeId);
          if (!edge) return;
          const fromNode = nodes.find(n => n.id === edge.from), toNode = nodes.find(n => n.id === edge.to);
          if (!fromNode || !toNode) return;
          if (Math.abs(fromNode.y - toNode.y) < 1) setNodes(prev => prev.map(n => (n.id === edge.from || n.id === edge.to) ? { ...n, y } : n));
          else if (Math.abs(fromNode.x - toNode.x) < 1) setNodes(prev => prev.map(n => (n.id === edge.from || n.id === edge.to) ? { ...n, x } : n));
          return;
        }

        if (!drawingEdge) return;
        const startNode = nodes.find(n => n.id === drawingEdge.startNodeId);
        if (!startNode) return;

        const isHorizontal = Math.abs(rawX - startNode.x) > Math.abs(rawY - startNode.y);
        let currentX = isHorizontal ? x : startNode.x, currentY = isHorizontal ? startNode.y : y;
        let cornerX = null, cornerY = null, snapTarget = findSnapTarget(rawX, rawY, startNode.id);

        if (snapTarget) {
          currentX = snapTarget.x; currentY = snapTarget.y;
          if (startNode.x !== currentX && startNode.y !== currentY) {
            cornerX = isHorizontal ? currentX : startNode.x; cornerY = isHorizontal ? startNode.y : currentY;
          }
        }
        setDrawingEdge({ ...drawingEdge, x: currentX, y: currentY, cornerX, cornerY, snapTarget });
      };

      const handlePointerUp = (e) => {
        if (!useLayout) return;
        if (draggingNodeId || draggingEdgeId) { setDraggingNodeId(null); setDraggingEdgeId(null); return; }
        if (!drawingEdge) return;
        
        let newNodes = [...nodes], newEdges = [...edges], lastEndId = drawingEdge.startNodeId;

        if (drawingEdge.cornerX !== null) {
          const cornerNode = { id: `joint-${Date.now()}-c`, type: 'joint', x: drawingEdge.cornerX, y: drawingEdge.cornerY, data: {} };
          newNodes.push(cornerNode); newEdges.push({ id: `edge-${Date.now()}-c`, from: lastEndId, to: cornerNode.id });
          lastEndId = cornerNode.id;
        }

        let targetNodeId;
        if (drawingEdge.snapTarget) {
          if (drawingEdge.snapTarget.type === 'node') targetNodeId = drawingEdge.snapTarget.node.id;
          else {
            const splitEdge = drawingEdge.snapTarget.edge;
            const splitJoint = { id: `joint-${Date.now()}-s`, type: 'joint', x: drawingEdge.x, y: drawingEdge.y, data: {} };
            newNodes.push(splitJoint);
            newEdges = newEdges.filter(e => e.id !== splitEdge.id);
            newEdges.push({ id: `edge-${Date.now()}-s1`, from: splitEdge.from, to: splitJoint.id });
            newEdges.push({ id: `edge-${Date.now()}-s2`, from: splitJoint.id, to: splitEdge.to });
            targetNodeId = splitJoint.id;
          }
        } else {
          const endJoint = { id: `joint-${Date.now()}-e`, type: 'joint', x: drawingEdge.x, y: drawingEdge.y, data: {} };
          newNodes.push(endJoint); targetNodeId = endJoint.id;
        }

        if (lastEndId !== targetNodeId) newEdges.push({ id: `edge-${Date.now()}-e`, from: lastEndId, to: targetNodeId });

        setNodes(newNodes); setEdges(newEdges); setDrawingEdge(null); setTool('select');
      };

      const handleNodePointerDown = (e, id) => {
        if (!useLayout) return;
        e.stopPropagation();
        if (tool === 'select') { setSelectedEdgeId(null); setSelectedNodeId(id); setDraggingNodeId(id); } 
        else if (tool === 'line' && !drawingEdge) {
          const node = nodes.find(n => n.id === id);
          setDrawingEdge({ startNodeId: id, x: node.x, y: node.y, cornerX: null, cornerY: null, snapTarget: null });
        }
      };

      const handleEdgePointerDown = (e, id) => {
        if (!useLayout) return;
        e.stopPropagation();
        if (tool === 'select') { setSelectedNodeId(null); setSelectedEdgeId(id); setDraggingEdgeId(id); }
      };

      const deleteSelected = () => {
        if (selectedNodeId) {
          setNodes(nodes.filter(n => n.id !== selectedNodeId));
          setEdges(edges.filter(e => e.from !== selectedNodeId && e.to !== selectedNodeId));
          setSelectedNodeId(null);
        } else if (selectedEdgeId) {
          setEdges(edges.filter(e => e.id !== selectedEdgeId));
          setSelectedEdgeId(null);
        }
      };

      const updateNodeData = (field, value) => {
        if (!selectedNodeId) return;
        setNodes(nodes.map(n => {
          if (n.id === selectedNodeId) {
            let newData = { ...n.data, [field]: value };
            if (field === 'hoodType' && value !== 'enclosure') newData.isPermitted = false;
            if (['hoodType', 'materialState', 'isPermitted'].includes(field) || (field === 'hoodType' && newData.isPermitted)) {
              newData.controlVelocity = getAutoControlVelocity(newData.hoodType, newData.materialState, newData.isPermitted || false);
            }
            return { ...n, data: newData };
          }
          return n;
        }));
      };

      const handlePhotoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => updateNodeData('photo', ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      // 배기량 계산 로직
      const calculateResult = (data) => {
        const { hoodType, distanceX, controlVelocity, measuredControlVelocity, shape, width, height, diameter, measuredVelocity, openingWidth, openingHeight } = data;
        let area = shape === 'rect' ? (parseFloat(width) || 0) * (parseFloat(height) || 0) : Math.PI * Math.pow(((parseFloat(diameter) || 0) / 1000) / 2, 2);
        const vc = parseFloat(controlVelocity) || 0, vmc = parseFloat(measuredControlVelocity) || 0, vm = parseFloat(measuredVelocity) || 0, x = parseFloat(distanceX) || 0;
        
        let openingArea = (parseFloat(openingWidth) || 0) * (parseFloat(openingHeight) || 0);
        let requiredQ = hoodType === 'enclosure' ? 60 * vc * openingArea : 60 * vc * (10 * Math.pow(x, 2) + area);
        const currentQ = 60 * vm * area;

        return { 
          area: area.toFixed(3), openingArea: openingArea.toFixed(3), 
          requiredQ: requiredQ.toFixed(2), currentQ: currentQ.toFixed(2), 
          isVelocityGood: vmc >= vc, isVolumeGood: currentQ >= requiredQ, isGood: vmc >= vc && currentQ >= requiredQ && currentQ > 0 
        };
      };

      // 그래프 탐색으로 후드와 연결된 송풍기 찾기 (BFS)
      const hoodsData = useMemo(() => {
        const getConnectedFan = (startId) => {
          let visited = new Set(), queue = [startId];
          visited.add(startId);
          while(queue.length > 0) {
            let curr = queue.shift();
            let node = nodes.find(n => n.id === curr);
            if (node && node.type === 'fan') return node;
            let neighbors = edges.filter(e => e.from === curr || e.to === curr).map(e => e.from === curr ? e.to : e.from);
            for(let n of neighbors) if(!visited.has(n)) { visited.add(n); queue.push(n); }
          }
          return null;
        };

        return nodes.filter(n => n.type === 'hood').map(n => {
          const calc = calculateResult(n.data);
          let connectedFan = useLayout ? getConnectedFan(n.id) : (nodes.find(fn => fn.type === 'fan' && fn.id === n.data.manualFanId) || null);
          return { ...n, calc, connectedFan };
        });
      }, [nodes, edges, useLayout]);

      // 송풍기 효율 및 밸런스 계산
      const fansData = useMemo(() => {
        return nodes.filter(n => n.type === 'fan').map(fan => {
          const connectedHoods = hoodsData.filter(h => h.connectedFan?.id === fan.id);
          const sumCurrentQ = connectedHoods.reduce((sum, h) => sum + parseFloat(h.calc.currentQ || 0), 0);
          
          const rQ = parseFloat(fan.data.ratedQ) || 0, mQ = parseFloat(fan.data.measuredQ) || 0;
          const eff = rQ > 0 ? (mQ / rQ) * 100 : 0;
          const suctionRatio = mQ > 0 ? (sumCurrentQ / mQ) * 100 : (rQ > 0 ? (sumCurrentQ / rQ) * 100 : 0);

          let status = '-';
          if (rQ > 0 && mQ > 0) {
             if (eff >= 80) status = '양호';
             else if (eff >= 60) status = '미흡';
             else status = '불량';
          }
          return { ...fan, calc: { connectedHoods, sumCurrentQ, eff, suctionRatio, status } };
        });
      }, [nodes, hoodsData]);

      const selectedNode = nodes.find(n => n.id === selectedNodeId);
      const selectedNodeCalc = selectedNode?.type === 'hood' ? calculateResult(selectedNode.data) : null;
      
      // 통계 계산 (후드)
      const totalHoods = hoodsData.length, goodHoods = hoodsData.filter(h => h.calc.isGood).length, badHoods = totalHoods - goodHoods;
      const pieDashArray = totalHoods > 0 ? (goodHoods / totalHoods) * 100 : 0;

      // 통계 계산 (송풍기)
      const evaluatedFans = fansData.filter(f => f.calc.status !== '-');
      const totalEvalFans = evaluatedFans.length;
      const goodFans = evaluatedFans.filter(f => f.calc.status === '양호').length;
      const fairFans = evaluatedFans.filter(f => f.calc.status === '미흡').length;
      const badFans = evaluatedFans.filter(f => f.calc.status === '불량').length;
      const fanGoodPct = totalEvalFans > 0 ? (goodFans / totalEvalFans) * 100 : 0;
      const fanFairPct = totalEvalFans > 0 ? (fairFans / totalEvalFans) * 100 : 0;

      return (
        <div className="flex flex-col lg:flex-row h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden print:block print:h-auto print:overflow-visible">
          
          {/* 좌측 패널 (인쇄 시 숨김) */}
          <div className="w-full lg:w-[400px] flex-shrink-0 bg-white border-r border-slate-200 shadow-xl z-10 flex flex-col h-full print:hidden">
            <div className="p-4 bg-blue-800 text-white flex justify-between items-center">
              <div>
                <h1 className="text-lg font-black flex items-center gap-2"><Activity className="w-5 h-5" /> 국소배기 자체검사 앱 <span className="bg-blue-600 text-[10px] px-1.5 py-0.5 rounded">Expert</span></h1>
                <p className="text-blue-200 text-xs mt-1">현장 스마트 진단 및 시스템 밸런싱</p>
              </div>
              <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-500 p-2 rounded-lg flex items-center gap-1 text-sm font-bold shadow-sm border border-blue-500 transition-colors">
                <Printer className="w-4 h-4" /> 출력
              </button>
            </div>

            <div className="flex-1 overflow-y-auto p-5 space-y-6">
              
              <div>
                <h2 className="text-sm font-bold text-slate-400 mb-2">1. 기본 정보 설정</h2>
                <div className="relative mb-3">
                  <Factory className="absolute left-3 top-3 w-5 h-5 text-slate-400" />
                  <input type="text" placeholder="공장/사업장 명칭을 입력하세요" 
                    value={factoryName} onChange={e => setFactoryName(e.target.value)}
                    className="w-full pl-10 p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700" />
                </div>
                
                <div className="flex items-center justify-between bg-slate-50 p-3 rounded-lg border border-slate-200">
                  <div className="flex flex-col">
                    <span className="text-sm font-bold text-slate-700">도면(Lay-out) 사용</span>
                    <span className="text-[10px] text-slate-500">끄면 도면 없이 목록으로만 관리합니다</span>
                  </div>
                  <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" className="sr-only peer" checked={useLayout} onChange={e => {
                      setUseLayout(e.target.checked);
                      if (!e.target.checked) setTool('select');
                    }} />
                    <div className="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                  </label>
                </div>
              </div>

              <hr className="border-slate-100" />

              {useLayout ? (
                <div>
                  <h2 className="text-sm font-bold text-slate-400 mb-2 flex justify-between items-center">
                    2. Lay-out (도면) 도구
                    <span className="text-xs font-normal text-slate-500">우측 캔버스에 클릭하여 배치</span>
                  </h2>
                  <div className="grid grid-cols-4 gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
                    <button onClick={() => setTool('select')} className={`flex flex-col items-center p-2 rounded ${tool === 'select' ? 'bg-blue-100 text-blue-700 border-blue-300 border' : 'hover:bg-slate-200'}`}>
                      <MousePointer2 className="w-5 h-5 mb-1" /> <span className="text-[10px] font-bold">선택/이동</span>
                    </button>
                    <button onClick={() => setTool('fan')} className={`flex flex-col items-center p-2 rounded ${tool === 'fan' ? 'bg-blue-100 text-blue-700 border-blue-300 border' : 'hover:bg-slate-200'}`}>
                      <Fan className="w-5 h-5 mb-1" /> <span className="text-[10px] font-bold">송풍기</span>
                    </button>
                    <button onClick={() => setTool('hood')} className={`flex flex-col items-center p-2 rounded ${tool === 'hood' ? 'bg-blue-100 text-blue-700 border-blue-300 border' : 'hover:bg-slate-200'}`}>
                      <Square className="w-5 h-5 mb-1" /> <span className="text-[10px] font-bold">후드</span>
                    </button>
                    <button onClick={() => setTool('line')} className={`flex flex-col items-center p-2 rounded ${tool === 'line' ? 'bg-blue-100 text-blue-700 border-blue-300 border' : 'hover:bg-slate-200'}`}>
                      <Minus className="w-5 h-5 mb-1" /> <span className="text-[10px] font-bold">직선(덕트)</span>
                    </button>
                  </div>
                </div>
              ) : (
                <div className="space-y-4">
                  <div>
                    <h2 className="text-sm font-bold text-slate-400 mb-2 flex justify-between items-center">
                      2-1. 송풍기 목록
                      <button onClick={() => createFan()} className="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-bold border border-indigo-300 hover:bg-indigo-200">+ 송풍기 추가</button>
                    </h2>
                    <div className="grid grid-cols-2 gap-2">
                      {nodes.filter(n => n.type === 'fan').map(n => (
                        <button key={n.id} onClick={() => setSelectedNodeId(n.id)} className={`p-2 text-xs font-bold rounded border text-left truncate transition-colors ${selectedNodeId === n.id ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                          <Fan className="w-3 h-3 inline mr-1"/>{n.data.fanName}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <h2 className="text-sm font-bold text-slate-400 mb-2 flex justify-between items-center">
                      2-2. 후드 목록
                      <button onClick={() => createHood()} className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold border border-blue-300 hover:bg-blue-200">+ 후드 추가</button>
                    </h2>
                    <div className="grid grid-cols-2 gap-2">
                      {nodes.filter(n => n.type === 'hood').map(n => (
                        <button key={n.id} onClick={() => setSelectedNodeId(n.id)} className={`p-2 text-xs font-bold rounded border text-left truncate transition-colors ${selectedNodeId === n.id ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                          {n.data.processName}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              <hr className="border-slate-100" />

              <div className="min-h-[400px]">
                <div className="flex justify-between items-center mb-3">
                  <h2 className="text-sm font-bold text-slate-400">3. 선택 객체 제원 입력</h2>
                  {(selectedNodeId || selectedEdgeId) && (
                    <button onClick={deleteSelected} className="text-red-500 hover:text-red-700 flex items-center gap-1 text-xs font-bold bg-red-50 px-2 py-1 rounded">
                      <Trash2 className="w-3 h-3" /> 삭제
                    </button>
                  )}
                </div>

                {!selectedNode && !selectedEdgeId ? (
                  <div className="bg-slate-50 border border-dashed border-slate-300 rounded-lg p-6 text-center text-slate-400 text-sm">
                    목록이나 도면에서<br/>송풍기 또는 후드를 선택해주세요.
                  </div>
                ) : selectedEdgeId || (selectedNode && selectedNode.type === 'joint') ? (
                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-6 text-center text-slate-500 text-sm font-bold">
                    {selectedEdgeId ? '배관(직선)이 선택되었습니다.' : '배관 조인트가 선택되었습니다.'}
                  </div>
                ) : selectedNode.type === 'fan' ? (
                  /* ✅ 송풍기 제원 입력 폼 ✅ */
                  <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2">
                    <div>
                      <label className="block text-xs font-bold mb-1">송풍기 명칭</label>
                      <input type="text" value={selectedNode.data.fanName || ""} onChange={e => updateNodeData('fanName', e.target.value)}
                             className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:border-indigo-500" />
                    </div>
                    <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg space-y-3">
                      <h3 className="text-xs font-bold text-slate-500 border-b pb-2">정격 사양 (명판 기준)</h3>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] font-bold mb-1 text-slate-600">정격 송풍량 (CMM)</label>
                          <input type="number" step="0.1" value={selectedNode.data.ratedQ || ""} onChange={e => updateNodeData('ratedQ', e.target.value)}
                                 className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold mb-1 text-slate-600">정격 정압 (mmAq)</label>
                          <input type="number" step="0.1" value={selectedNode.data.ratedSP || ""} onChange={e => updateNodeData('ratedSP', e.target.value)}
                                 className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                        </div>
                      </div>
                    </div>
                    <div className="p-3 bg-indigo-50 border border-indigo-200 rounded-lg space-y-3">
                      <h3 className="text-xs font-bold text-indigo-800 border-b border-indigo-200 pb-2">현장 측정 결과</h3>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] font-bold mb-1 text-indigo-700">측정 송풍량 (CMM)</label>
                          <input type="number" step="0.1" value={selectedNode.data.measuredQ || ""} onChange={e => updateNodeData('measuredQ', e.target.value)}
                                 className="w-full p-2 border border-indigo-300 rounded text-sm outline-none focus:border-indigo-500 bg-white" />
                        </div>
                        <div>
                          <label className="block text-[10px] font-bold mb-1 text-indigo-700">측정 정압 (mmAq)</label>
                          <input type="number" step="0.1" value={selectedNode.data.measuredSP || ""} onChange={e => updateNodeData('measuredSP', e.target.value)}
                                 className="w-full p-2 border border-indigo-300 rounded text-sm outline-none focus:border-indigo-500 bg-white" />
                        </div>
                      </div>
                    </div>
                    {/* 송풍기 효율 평가 박스 */}
                    {(() => {
                      const fData = fansData.find(f => f.id === selectedNode.id);
                      if (!fData || !fData.data.ratedQ) return null;
                      return (
                        <div className={`p-3 rounded border font-bold text-sm flex items-center justify-between ${fData.calc.status === '양호' ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : fData.calc.status === '미흡' ? 'bg-orange-50 border-orange-300 text-orange-700' : 'bg-red-50 border-red-300 text-red-700'}`}>
                           <span>송풍기 종합 효율: {fData.calc.eff.toFixed(1)}%</span>
                           <span>{fData.calc.status}</span>
                        </div>
                      );
                    })()}
                  </div>
                ) : (
                  /* ✅ 후드 제원 입력 폼 ✅ */
                  <div className="space-y-4 animate-in fade-in slide-in-from-bottom-2">
                    <div>
                      <label className="block text-xs font-bold mb-1">공정명</label>
                      <input type="text" value={selectedNode.data.processName} onChange={e => updateNodeData('processName', e.target.value)}
                        className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:border-blue-500" />
                    </div>

                    {!useLayout && (
                      <div className="bg-indigo-50 p-2 rounded border border-indigo-200">
                        <label className="block text-[10px] font-bold mb-1 text-indigo-700">연결될 송풍기 선택 (수동 지정)</label>
                        <select value={selectedNode.data.manualFanId || ""} onChange={e => updateNodeData('manualFanId', e.target.value)}
                                className="w-full p-2 border border-indigo-300 rounded text-xs outline-none bg-white">
                          <option value="">-- 송풍기 선택 안함 --</option>
                          {nodes.filter(n => n.type === 'fan').map(f => <option key={f.id} value={f.id}>{f.data.fanName}</option>)}
                        </select>
                      </div>
                    )}

                    <div>
                      <label className="block text-xs font-bold mb-1">현장 사진</label>
                      <div className="flex gap-2">
                        <label className="flex-1 bg-slate-100 hover:bg-slate-200 border border-slate-300 rounded p-2 flex justify-center items-center gap-2 cursor-pointer transition-colors text-sm font-bold">
                          <Camera className="w-4 h-4 text-slate-600" /> 촬영 또는 첨부
                          <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoUpload} />
                        </label>
                      </div>
                      {selectedNode.data.photo && (
                        <div className="mt-2 relative rounded overflow-hidden border border-slate-200">
                          <img src={selectedNode.data.photo} alt="현장" className="w-full h-32 object-cover" />
                          <button onClick={() => updateNodeData('photo', null)} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 shadow"><XCircle className="w-4 h-4" /></button>
                        </div>
                      )}
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-xs font-bold mb-1">후드 형식</label>
                        <select value={selectedNode.data.hoodType} onChange={e => updateNodeData('hoodType', e.target.value)}
                          className="w-full p-2 border border-slate-300 rounded text-xs outline-none bg-white">
                          <option value="enclosure">포위식/부스식</option>
                          <option value="ext_up">외부식 상방형</option>
                          <option value="ext_side">외부식 측방형</option>
                          <option value="ext_down">외부식 하방형</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold mb-1">물질 상태</label>
                        <select value={selectedNode.data.materialState} onChange={e => updateNodeData('materialState', e.target.value)}
                          className="w-full p-2 border border-slate-300 rounded text-xs outline-none bg-white">
                          <option value="gas">가스상</option>
                          <option value="particle">입자상</option>
                        </select>
                      </div>
                    </div>

                    <div className={`mt-2 p-2 rounded flex items-center gap-2 transition-colors ${selectedNode.data.hoodType === 'enclosure' ? 'bg-red-50 border border-red-200 cursor-pointer' : 'bg-slate-100 border border-slate-200 opacity-50 cursor-not-allowed'}`}>
                      <input type="checkbox" id={`permit-${selectedNode.id}`} checked={selectedNode.data.isPermitted || false} onChange={e => updateNodeData('isPermitted', e.target.checked)} disabled={selectedNode.data.hoodType !== 'enclosure'}
                        className={`w-4 h-4 rounded focus:ring-red-500 ${selectedNode.data.hoodType === 'enclosure' ? 'text-red-600 border-red-300' : 'text-slate-400 border-slate-300'}`} />
                      <label htmlFor={`permit-${selectedNode.id}`} className={`text-xs font-bold select-none ${selectedNode.data.hoodType === 'enclosure' ? 'text-red-700 cursor-pointer' : 'text-slate-500 cursor-not-allowed'}`}>
                        허가대상 유해물질 취급 (포위식/부스식 전용)
                      </label>
                    </div>

                    <div className="grid grid-cols-2 gap-3 mt-4">
                      <div>
                        <label className="block text-xs font-bold mb-1 text-indigo-700">법정 제어풍속 (m/s)</label>
                        <input type="number" step="0.1" value={selectedNode.data.controlVelocity} onChange={e => updateNodeData('controlVelocity', e.target.value)}
                          className="w-full p-2 border border-indigo-300 rounded text-sm outline-none bg-indigo-50 text-indigo-900 font-bold" />
                      </div>
                      {selectedNode.data.hoodType !== 'enclosure' && (
                        <div>
                          <label className="block text-xs font-bold mb-1">제어거리 X (m)</label>
                          <input type="number" step="0.1" value={selectedNode.data.distanceX} onChange={e => updateNodeData('distanceX', e.target.value)}
                            className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                        </div>
                      )}
                    </div>

                    {selectedNode.data.hoodType === 'enclosure' && (
                      <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                        <label className="block text-[10px] font-bold mb-2 text-blue-800">▶ 포위식 개구면 크기 (필요 배기량 산정용)</label>
                        <div className="flex gap-2">
                          <div className="flex-1 flex items-center gap-1">
                            <input type="number" step="0.1" placeholder="가로" value={selectedNode.data.openingWidth || ""} onChange={e => updateNodeData('openingWidth', e.target.value)} className="w-full p-2 border border-blue-300 rounded text-sm outline-none bg-white" />
                            <span className="text-xs font-bold text-blue-700">m</span>
                          </div>
                          <div className="flex-1 flex items-center gap-1">
                            <input type="number" step="0.1" placeholder="세로" value={selectedNode.data.openingHeight || ""} onChange={e => updateNodeData('openingHeight', e.target.value)} className="w-full p-2 border border-blue-300 rounded text-sm outline-none bg-white" />
                            <span className="text-xs font-bold text-blue-700">m</span>
                          </div>
                        </div>
                      </div>
                    )}
                    
                    <div className="mt-4">
                      <label className="block text-xs font-bold mb-1 text-emerald-700">▶ 현장 측정 제어풍속 (m/s)</label>
                      <input type="number" step="0.1" placeholder="현장에서 측정한 제어풍속" value={selectedNode.data.measuredControlVelocity} onChange={e => updateNodeData('measuredControlVelocity', e.target.value)}
                        className="w-full p-2 border-2 border-emerald-400 rounded text-sm outline-none bg-emerald-50 text-emerald-900 font-bold" />
                    </div>

                    <div className="pt-2">
                      <h2 className="text-sm font-bold text-slate-400 mb-3 border-t border-slate-200 pt-4">4. 현재 배기량 산정 (덕트 등 측정부)</h2>
                      <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg space-y-3">
                        <div className="flex gap-4">
                          <label className="text-xs font-bold flex items-center gap-1 cursor-pointer">
                            <input type="radio" checked={selectedNode.data.shape === 'rect'} onChange={() => updateNodeData('shape', 'rect')} /> 사각형
                          </label>
                          <label className="text-xs font-bold flex items-center gap-1 cursor-pointer">
                            <input type="radio" checked={selectedNode.data.shape === 'circle'} onChange={() => updateNodeData('shape', 'circle')} /> 원형
                          </label>
                        </div>
                        
                        {selectedNode.data.shape === 'rect' ? (
                          <div className="flex gap-4">
                            <div className="flex-1 flex items-center gap-2"><input type="number" step="0.1" placeholder="가로" value={selectedNode.data.width} onChange={e => updateNodeData('width', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" /><span className="text-slate-500 font-bold text-sm">m</span></div>
                            <div className="flex-1 flex items-center gap-2"><input type="number" step="0.1" placeholder="세로" value={selectedNode.data.height} onChange={e => updateNodeData('height', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" /><span className="text-slate-500 font-bold text-sm">m</span></div>
                          </div>
                        ) : (
                          <div className="flex items-center gap-2"><input type="number" step="1" placeholder="직경" value={selectedNode.data.diameter} onChange={e => updateNodeData('diameter', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" /><span className="text-slate-500 font-bold text-sm">mm</span></div>
                        )}

                        <div>
                          <label className="block text-[10px] font-bold mb-1 text-blue-700">▶ 배기량 산출용 측정 풍속 (m/s)</label>
                          <input type="number" step="0.1" placeholder="개구면/덕트 내 측정 풍속" value={selectedNode.data.measuredVelocity} onChange={e => updateNodeData('measuredVelocity', e.target.value)}
                            className="w-full p-2 border border-blue-300 rounded text-sm outline-none bg-white" />
                        </div>
                      </div>
                    </div>

                    {selectedNodeCalc && (
                      <div className={`p-3 rounded border font-bold text-sm flex items-center justify-between ${selectedNodeCalc.isGood ? 'bg-emerald-50 border-emerald-300 text-emerald-700' : 'bg-red-50 border-red-300 text-red-700'}`}>
                        <span className="flex items-center gap-1">
                          {selectedNodeCalc.isGood ? <CheckCircle2 className="w-4 h-4" /> : <XCircle className="w-4 h-4" />}
                          {selectedNodeCalc.isGood ? '풍속 및 배기량 만족' : '기준 미달 (개선 필요)'}
                        </span>
                        <span>{selectedNodeCalc.currentQ} CMM</span>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* 우측 도면 및 보고서 영역 */}
          <div className="flex-1 bg-slate-200 overflow-y-auto relative p-4 lg:p-8 print:p-0 print:bg-white print:overflow-visible print:block">
            <div className="w-full max-w-[210mm] min-h-[297mm] mx-auto bg-white shadow-2xl p-[20mm] print:max-w-none print:min-h-0 print:shadow-none print:p-0 print:m-0">
              
              <div className="border-b-4 border-slate-800 pb-4 mb-6 text-center relative page-break-inside-avoid">
                <h1 className="text-3xl font-black text-slate-900 tracking-tight">국소배기장치 성능평가 보고서</h1>
                <div className="mt-3 text-lg font-bold text-slate-700 bg-slate-100 py-2 rounded">
                  {factoryName || "공장명을 입력해주세요"}
                </div>
              </div>

              {/* 도면 렌더링 */}
              {useLayout && (
                <div className="mb-8 print:mb-6 page-break-inside-avoid">
                  <h2 className="text-lg font-black border-l-4 border-blue-600 pl-2 mb-3">1. 설비 Lay-out (Network)</h2>
                  <div className={`w-full h-[400px] bg-slate-50 border-2 ${tool === 'select' ? 'border-slate-300' : 'border-blue-400 border-dashed'} rounded-xl relative overflow-hidden print:border-slate-300 print:bg-white print:border-solid`}>
                    <svg ref={svgRef} className={`w-full h-full ${tool !== 'select' ? 'cursor-crosshair' : 'cursor-default'}`}
                         onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}>
                      <defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1" fill="#cbd5e1" className="print:hidden"/></pattern></defs>
                      <rect width="100%" height="100%" fill="url(#grid)" className="print:hidden" />
                      {edges.map(e => {
                        const fromNode = nodes.find(n => n.id === e.from), toNode = nodes.find(n => n.id === e.to);
                        if(!fromNode || !toNode) return null;
                        const isSelected = selectedEdgeId === e.id;
                        return (
                          <g key={e.id}>
                            <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke="transparent" strokeWidth="20" className={tool === 'select' ? "cursor-move print:hidden" : "pointer-events-none"} onPointerDown={(ev) => handleEdgePointerDown(ev, e.id)} />
                            <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke={isSelected ? "#3b82f6" : "#475569"} strokeWidth="4" strokeLinecap="round" className="pointer-events-none" />
                          </g>
                        );
                      })}
                      {drawingEdge && (
                        <g className="pointer-events-none">
                          {drawingEdge.cornerX !== null ? (
                            <>
                              <line x1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.x} y1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.y} x2={drawingEdge.cornerX} y2={drawingEdge.cornerY} stroke="#3b82f6" strokeWidth="4" strokeDasharray="5,5" />
                              <line x1={drawingEdge.cornerX} y1={drawingEdge.cornerY} x2={drawingEdge.x} y2={drawingEdge.y} stroke="#3b82f6" strokeWidth="4" strokeDasharray="5,5" />
                            </>
                          ) : <line x1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.x} y1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.y} x2={drawingEdge.x} y2={drawingEdge.y} stroke="#3b82f6" strokeWidth="4" strokeDasharray="5,5" />}
                          {drawingEdge.snapTarget?.type === 'edge' && <circle cx={drawingEdge.x} cy={drawingEdge.y} r="6" fill="#ef4444" />}
                          {drawingEdge.snapTarget?.type === 'node' && <circle cx={drawingEdge.x} cy={drawingEdge.y} r="14" fill="none" stroke="#ef4444" strokeWidth="2" />}
                        </g>
                      )}
                      {nodes.map(n => {
                        const isSelected = n.id === selectedNodeId;
                        if (n.type === 'joint') return <circle key={n.id} cx={n.x} cy={n.y} r="10" fill="transparent" onPointerDown={(e) => handleNodePointerDown(e, n.id)} className={tool === 'select' ? "cursor-move hover:fill-blue-500/20 print:hidden" : "cursor-pointer print:hidden"} />;
                        return (
                          <g key={n.id} transform={`translate(${n.x - 12}, ${n.y - 12})`} onPointerDown={(e) => handleNodePointerDown(e, n.id)} className={tool === 'select' ? "cursor-move" : "cursor-pointer"}>
                            <rect width="24" height="24" rx="4" fill={n.type === 'fan' ? '#e0e7ff' : (isSelected ? '#eff6ff' : '#ffffff')} stroke={isSelected ? '#3b82f6' : (n.type==='fan'?'#4f46e5':'#94a3b8')} strokeWidth={isSelected ? "2" : "1.5"} />
                            {n.type === 'fan' ? (
                              <>
                                <Fan x="4" y="4" width="16" height="16" className="text-indigo-700" />
                                <text x="12" y="-4" textAnchor="middle" className="text-[10px] font-bold fill-indigo-900 print:block drop-shadow-md">{n.data.fanName}</text>
                              </>
                            ) : (
                              <>
                                <Square x="4" y="4" width="16" height="16" className="text-blue-600" />
                                <text x="12" y="34" textAnchor="middle" className="text-[8px] font-bold fill-slate-700 print:block">{n.data.processName}</text>
                              </>
                            )}
                          </g>
                        );
                      })}
                    </svg>
                    {nodes.length === 0 && (
                      <div className="absolute inset-0 flex items-center justify-center pointer-events-none print:hidden">
                        <div className="bg-white/80 p-4 rounded-lg font-bold text-slate-500 flex flex-col items-center gap-2"><MousePointer2 className="w-8 h-8 opacity-50" />도구를 이용해 설계도를 작성하세요.</div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* 후드 성능 테이블 */}
              <div className="mb-8">
                <div className="flex justify-between items-end border-l-4 border-blue-600 pl-2 mb-3 page-break-inside-avoid">
                  <h2 className="text-lg font-black">{useLayout ? '2.' : '1.'} 후드 배기 및 제어풍속 결과</h2>
                </div>
                {hoodsData.length === 0 ? (
                  <div className="p-8 border border-slate-200 rounded-lg text-center text-slate-400 text-sm print:hidden">등록된 후드가 없습니다.</div>
                ) : (
                  <div className="overflow-x-auto print:overflow-visible">
                    <table className="w-full border-collapse border border-slate-300 text-[11px] lg:text-xs">
                      <thead>
                        <tr className="bg-slate-100 text-slate-700">
                          <th className="border border-slate-300 p-2 text-center w-8">No</th>
                          <th className="border border-slate-300 p-2 text-center w-20">현장 사진</th>
                          <th className="border border-slate-300 p-2 text-left">공정명 / 형식</th>
                          <th className="border border-slate-300 p-2 text-center w-24">제어풍속 (m/s)<br/><span className="text-[9px] text-slate-500">측정 / 법정</span></th>
                          <th className="border border-slate-300 p-2 text-center w-24">배기량 (CMM)<br/><span className="text-[9px] text-slate-500">현재 / 필요</span></th>
                          <th className="border border-slate-300 p-2 text-center w-14">판정</th>
                        </tr>
                      </thead>
                      <tbody>
                        {hoodsData.map((hood, idx) => {
                          const { data, calc, connectedFan } = hood;
                          const typeLabel = data.hoodType === 'enclosure' ? '포위식' : data.hoodType === 'ext_up' ? '외부식 상방' : data.hoodType === 'ext_side' ? '외부식 측방' : '외부식 하방';
                          const permitLabel = (data.hoodType === 'enclosure' && data.isPermitted) ? '(허가대상)' : '';
                          return (
                            <tr key={hood.id} className={`${calc.isGood ? 'bg-blue-50/30' : 'bg-red-50/30'} page-break-inside-avoid`}>
                              <td className="border border-slate-300 p-2 text-center font-bold text-slate-500">{idx + 1}</td>
                              <td className="border border-slate-300 p-1 text-center align-middle">
                                {data.photo ? <img src={data.photo} alt="현장" className="w-16 h-10 object-cover mx-auto rounded shadow-sm print:w-20 print:h-12" /> : <span className="text-[9px] text-slate-400">사진없음</span>}
                              </td>
                              <td className="border border-slate-300 p-2">
                                <div className="font-bold text-slate-800">{data.processName}</div>
                                <div className="text-[10px] text-slate-500 mt-0.5">
                                  {typeLabel} | {data.materialState === 'gas' ? '가스상' : '입자상'} <span className="text-red-500">{permitLabel}</span>
                                  {connectedFan && <span className="ml-1 text-indigo-600 font-bold">[연결: {connectedFan.data.fanName}]</span>}
                                  <div className="mt-1">{data.hoodType === 'enclosure' ? `개구 A=${calc.openingArea}㎡ | 측정부 A=${calc.area}㎡` : `측정부 A=${calc.area}㎡`}</div>
                                </div>
                              </td>
                              <td className="border border-slate-300 p-2 text-center">
                                <div className="flex flex-col items-center"><span className={`font-bold ${calc.isVelocityGood ? 'text-blue-600' : 'text-red-600'}`}>{data.measuredControlVelocity || '0'}</span><hr className="w-8 my-0.5 border-slate-300" /><span className="text-slate-500">{data.controlVelocity || '0'}</span></div>
                              </td>
                              <td className="border border-slate-300 p-2 text-center">
                                <div className="flex flex-col items-center"><span className={`font-bold ${calc.isVolumeGood ? 'text-blue-600' : 'text-red-600'}`}>{calc.currentQ}</span><hr className="w-10 my-0.5 border-slate-300" /><span className="text-slate-500">{calc.requiredQ}</span></div>
                              </td>
                              <td className="border border-slate-300 p-2 text-center font-black">
                                {calc.isGood ? <span className="text-blue-600 flex flex-col items-center"><CheckCircle2 className="w-4 h-4 mb-1"/>양호</span> : <span className="text-red-600 flex flex-col items-center"><XCircle className="w-4 h-4 mb-1"/>불량</span>}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

              {/* 송풍기 성능 평가 테이블 */}
              {fansData.length > 0 && (
                <div className="mb-8 page-break-inside-avoid">
                  <div className="flex justify-between items-end border-l-4 border-indigo-600 pl-2 mb-3">
                    <h2 className="text-lg font-black">{useLayout ? '3.' : '2.'} 송풍기 성능 및 시스템 밸런스 평가</h2>
                  </div>
                  <div className="overflow-x-auto print:overflow-visible">
                    <table className="w-full border-collapse border border-slate-300 text-[11px] lg:text-xs">
                      <thead>
                        <tr className="bg-indigo-50 text-indigo-900 border-b-2 border-indigo-200">
                          <th className="border border-slate-300 p-2 text-center w-10">No</th>
                          <th className="border border-slate-300 p-2 text-left">송풍기 명칭</th>
                          <th className="border border-slate-300 p-2 text-center">정격 사양<br/><span className="text-[9px] font-normal text-indigo-500">(풍량 CMM / 정압 mmAq)</span></th>
                          <th className="border border-slate-300 p-2 text-center">현장 측정<br/><span className="text-[9px] font-normal text-indigo-500">(풍량 CMM / 정압 mmAq)</span></th>
                          <th className="border border-slate-300 p-2 text-center w-24">후드 연결<br/><span className="text-[9px] font-normal text-indigo-500">배기량 합계 / 흡입비</span></th>
                          <th className="border border-slate-300 p-2 text-center w-20">송풍기 효율<br/><span className="text-[9px] font-normal text-indigo-500">종합 판정</span></th>
                        </tr>
                      </thead>
                      <tbody>
                        {fansData.map((fan, idx) => {
                          const { data, calc } = fan;
                          return (
                            <tr key={fan.id} className={`${calc.status === '양호' ? 'bg-emerald-50/20' : calc.status === '미흡' ? 'bg-orange-50/20' : 'bg-red-50/20'} page-break-inside-avoid`}>
                              <td className="border border-slate-300 p-2 text-center font-bold text-slate-500">{idx + 1}</td>
                              <td className="border border-slate-300 p-2 font-black text-indigo-800">
                                {data.fanName}
                                <div className="text-[9px] font-normal text-slate-500 mt-1">연결 후드: {calc.connectedHoods.length}개소</div>
                              </td>
                              <td className="border border-slate-300 p-2 text-center font-bold text-slate-600">
                                {data.ratedQ || '-'} / {data.ratedSP || '-'}
                              </td>
                              <td className="border border-slate-300 p-2 text-center font-bold text-indigo-700">
                                {data.measuredQ || '-'} / {data.measuredSP || '-'}
                              </td>
                              <td className="border border-slate-300 p-2 text-center">
                                <div className="font-bold text-slate-800">{calc.sumCurrentQ.toFixed(1)} CMM</div>
                                <div className="text-[10px] text-slate-500 mt-0.5">흡입비: {calc.suctionRatio.toFixed(1)}%</div>
                              </td>
                              <td className="border border-slate-300 p-2 text-center">
                                <div className={`font-black text-sm ${calc.status === '양호' ? 'text-emerald-600' : calc.status === '미흡' ? 'text-orange-500' : 'text-red-600'}`}>
                                  {calc.eff > 0 ? `${calc.eff.toFixed(1)}%` : '-'}
                                </div>
                                <div className={`text-[10px] inline-block font-bold mt-0.5 px-1.5 py-0.5 rounded ${calc.status === '양호' ? 'bg-emerald-100 text-emerald-700' : calc.status === '미흡' ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'}`}>
                                  {calc.status}
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* ✅ 사업장 종합 평가 (후드 + 송풍기 통합 요약) ✅ */}
              {(hoodsData.length > 0 || fansData.length > 0) && (
                <div className="border-t-2 border-slate-800 pt-6 mt-6 page-break-inside-avoid">
                  <h2 className="text-lg font-black border-l-4 border-blue-600 pl-2 mb-4">
                    {useLayout ? (fansData.length > 0 ? '4.' : '3.') : (fansData.length > 0 ? '3.' : '2.')} 사업장 종합 평가
                  </h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 print:grid-cols-2 gap-6 bg-slate-50 border border-slate-200 rounded-xl p-6">
                    
                    {/* 후드 종합 평가 */}
                    {hoodsData.length > 0 && (
                      <div className="flex items-center justify-center gap-6">
                        <div className="relative w-28 h-28 transform -rotate-90">
                          <svg width="100%" height="100%" viewBox="0 0 36 36" className="drop-shadow-sm">
                            <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#fca5a5" strokeWidth="6" />
                            <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#3b82f6" strokeWidth="6" strokeDasharray={`${pieDashArray} ${100 - pieDashArray}`} strokeDashoffset="0" className="transition-all duration-1000 ease-out" />
                          </svg>
                          <div className="absolute inset-0 flex flex-col items-center justify-center transform rotate-90">
                            <span className="text-xl font-black text-slate-700">{Math.round(pieDashArray)}%</span>
                            <span className="text-[9px] font-bold text-slate-500">후드 적합률</span>
                          </div>
                        </div>
                        <div className="space-y-3">
                          <div className="flex items-center gap-2">
                            <div className="w-3 h-3 bg-blue-500 rounded-sm"></div>
                            <div>
                              <div className="text-xs font-bold text-slate-700">양호 후드</div>
                              <div className="text-lg font-black text-blue-600">{goodHoods} <span className="text-[10px] font-normal text-slate-500">개소</span></div>
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            <div className="w-3 h-3 bg-red-300 rounded-sm"></div>
                            <div>
                              <div className="text-xs font-bold text-slate-700">불량 후드</div>
                              <div className="text-lg font-black text-red-500">{badHoods} <span className="text-[10px] font-normal text-slate-500">개소</span></div>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}

                    {/* 송풍기 종합 평가 */}
                    {fansData.length > 0 && (
                      <div className={`flex items-center justify-center gap-4 ${hoodsData.length > 0 ? 'border-t md:border-t-0 print:border-t-0 md:border-l print:border-l border-slate-200 pt-6 md:pt-0 print:pt-0 pl-0 md:pl-4 print:pl-4' : ''}`}>
                        <div className="relative w-28 h-28 transform -rotate-90">
                          <svg width="100%" height="100%" viewBox="0 0 36 36" className="drop-shadow-sm">
                            {/* Bad Base */}
                            <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#fca5a5" strokeWidth="6" />
                            {/* Fair */}
                            <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#fb923c" strokeWidth="6" strokeDasharray={`${fanFairPct} ${100 - fanFairPct}`} strokeDashoffset={-fanGoodPct} className="transition-all duration-1000 ease-out" />
                            {/* Good */}
                            <circle cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="#10b981" strokeWidth="6" strokeDasharray={`${fanGoodPct} ${100 - fanGoodPct}`} strokeDashoffset="0" className="transition-all duration-1000 ease-out" />
                          </svg>
                          <div className="absolute inset-0 flex flex-col items-center justify-center transform rotate-90">
                            <span className="text-xl font-black text-slate-700">{totalEvalFans > 0 ? Math.round(fanGoodPct) : 0}%</span>
                            <span className="text-[9px] font-bold text-slate-500">송풍기 양호율</span>
                          </div>
                        </div>
                        <div className="space-y-1.5">
                          <div className="flex items-center gap-2">
                            <div className="w-3 h-3 bg-emerald-500 rounded-sm"></div>
                            <div>
                              <div className="text-[10px] font-bold text-slate-700">양호 (80%↑)</div>
                              <div className="text-sm font-black text-emerald-600">{goodFans} <span className="text-[9px] font-normal text-slate-500">대</span></div>
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            <div className="w-3 h-3 bg-orange-400 rounded-sm"></div>
                            <div>
                              <div className="text-[10px] font-bold text-slate-700">미흡 (60~80%)</div>
                              <div className="text-sm font-black text-orange-500">{fairFans} <span className="text-[9px] font-normal text-slate-500">대</span></div>
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            <div className="w-3 h-3 bg-red-400 rounded-sm"></div>
                            <div>
                              <div className="text-[10px] font-bold text-slate-700">불량 (60%↓)</div>
                              <div className="text-sm font-black text-red-500">{badFans} <span className="text-[9px] font-normal text-slate-500">대</span></div>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
